name: Validate with hassfest

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.repository_owner == 'make-all'

    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master
