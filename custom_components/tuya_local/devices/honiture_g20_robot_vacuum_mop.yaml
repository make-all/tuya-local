name: Robot vacuum and mop
products:
  - id: rxmacvgkaz640r4q
    manufacturer: Honiture
    model: G20
entities:
  - entity: vacuum
    dps:
      - id: 2
        type: boolean
        name: activate
      - id: 3
        type: string
        name: command
        mapping:
          - dps_val: standby
            value: stop
          - dps_val: smart
            value: clean
          - dps_val: spiral
            value: clean_spot
          - dps_val: wall_follow
            value: wall_follow
          - dps_val: chargego
            value: return_to_base
          - dps_val: random
            value: random
          - dps_val: partial_bow
            value: partial_bow
      - id: 4
        type: string
        name: direction_control
        optional: true
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: backward
            value: reverse
          - dps_val: turn_left
            value: left
          - dps_val: turn_right
            value: right
          - dps_val: stop
            value: stop
      - id: 5
        type: string
        name: status
        mapping:
          - dps_val: standby
            value: standby
          - dps_val: smart_clean
            value: smart_clean
          - dps_val: wall_clean
            value: wall_clean
          - dps_val: spot_clean
            value: spot_clean
          - dps_val: mop_clean
            value: mop_clean
          - dps_val: random_clean
            value: random_clean
          - dps_val: cleaning
            value: cleaning
          - dps_val: clean_done
            value: returning
          - dps_val: goto_charge
            value: returning
          - dps_val: charging
            value: charging
          - dps_val: charging_dc
            value: charging
          - dps_val: charge_done
            value: charged
          - dps_val: fault
            value: error
          - dps_val: sleep
            value: sleep
      - id: 13
        type: boolean
        name: locate
      - id: 14
        type: string
        name: fan_speed
        mapping:
          - dps_val: gentle
            value: low
          - dps_val: normal
            value: medium
          - dps_val: strong
            value: high

  - entity: sensor
    class: battery
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Edge brush life
    category: diagnostic
    dps:
      - id: 7
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Roll brush life
    category: diagnostic
    dps:
      - id: 8
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    translation_key: filter_life
    category: diagnostic
    dps:
      - id: 9
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: button
    name: Reset edge brush
    category: config
    dps:
      - id: 10
        type: boolean
        name: button

  - entity: button
    name: Reset roll brush
    category: config
    dps:
      - id: 11
        type: boolean
        name: button

  - entity: button
    translation_key: filter_reset
    category: config
    dps:
      - id: 12
        type: boolean
        name: button

  - entity: sensor
    name: Cleaning area
    category: diagnostic
    class: area
    dps:
      - id: 16
        type: integer
        name: sensor
        unit: "m²"

  - entity: sensor
    name: Cleaning time
    category: diagnostic
    class: duration
    dps:
      - id: 17
        type: integer
        name: sensor
        unit: min

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 18
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 18
        type: bitfield
        name: fault_code
      - id: 18
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: ok
          - dps_val: 1
            value: edge_sweep
          - dps_val: 2
            value: middle_sweep
          - dps_val: 4
            value: left_wheel
          - dps_val: 8
            value: right_wheel
          - dps_val: 16
            value: garbage_box
          - dps_val: 32
            value: land_check
          - dps_val: 64
            value: collision

  - entity: select
    translation_key: mopping
    category: config
    icon: "mdi:cup-water"
    dps:
      - id: 20
        name: option
        type: string
        mapping:
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: high
            value: high

  - entity: select
    translation_key: cleaning_mode
    category: config
    dps:
      - id: 24
        name: option
        type: string
        mapping:
          - dps_val: only_sweep
            value: sweep
          - dps_val: only_mop
            value: mop
          - dps_val: both_work
            value: sweep_and_mop

  - entity: switch
    name: Carpet boost
    category: config
    dps:
      - id: 101
        type: boolean
        name: switch

  - entity: switch
    name: Carpet detection
    category: config
    dps:
      - id: 102
        type: boolean
        name: switch

  - entity: select
    name: Volume
    category: config
    dps:
      - id: 104
        name: option
        type: string
        mapping:
          - dps_val: vol_mute
            value: mute
          - dps_val: vol_normal
            value: normal
          - dps_val: vol_max
            value: max

  - entity: select
    translation_key: language
    category: config
    dps:
      - id: 105
        name: option
        type: string
        mapping:
          - dps_val: english
            value: english
          - dps_val: german
            value: german
          - dps_val: french
            value: french
          - dps_val: italian
            value: italian
          - dps_val: spanish
            value: spanish
          - dps_val: japanese
            value: japanese
