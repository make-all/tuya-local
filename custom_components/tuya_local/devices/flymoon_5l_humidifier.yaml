name: Humidifier
products:
  - id: e1n23s20
    manufacturer: FLYMOON
    model: Top Fill 5L Cool Mist Humidifier

entities:
  # Main humidifier (power + target humidity)
  - entity: humidifier
    class: humidifier
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 13
        type: integer
        name: humidity
        range:
          min: 30
          max: 90
        mapping:
          - step: 5
      - id: 14
        type: integer
        name: current_humidity

  # Mist level control
  - entity: select
    name: Mist Level
    icon: mdi:water
    dps:
      - id: 3
        type: string
        name: option
        mapping:
          - dps_val: small
            value: Small
          - dps_val: middle
            value: Medium
          - dps_val: large
            value: Large

  # Sleep mode
  - entity: switch
    translation_key: sleep
    category: config
    icon: mdi:bed
    dps:
      - id: 16
        type: boolean
        name: switch

  # Timer
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 19
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: "Off"
          - dps_val: 1h
            value: "1 hour"
          - dps_val: 2h
            value: "2 hours"
          - dps_val: 3h
            value: "3 hours"
          - dps_val: 4h
            value: "4 hours"
          - dps_val: 5h
            value: "5 hours"
          - dps_val: 6h
            value: "6 hours"
          - dps_val: 7h
            value: "7 hours"
          - dps_val: 8h
            value: "8 hours"
          - dps_val: 9h
            value: "9 hours"
          - dps_val: 10h
            value: "10 hours"
          - dps_val: 11h
            value: "11 hours"
          - dps_val: 12h
            value: "12 hours"

  # Remaining countdown time
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 20
        type: integer
        name: sensor
        unit: min

  # Water shortage alarm
  - entity: binary_sensor
    name: Water Shortage
    class: problem
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 1
            value: true
          - dps_val: 0
            value: false
