# Custom config for Frizzlife LP365 Smart Water Meter with Shutoff Valve
name: Smart Water Meter
products:
  - id: ebcdb1af2581dca2b06m5c
    manufacturer: Frizzlife
    model: LP365

entities:
  # Valve
  - entity: valve
    class: water
    dps:
      - id: 1
        type: boolean
        name: valve

  # Temperature sensor (converted to F)
  - entity: sensor
    class: temperature
    dps:
      - id: 12
        type: integer
        name: sensor
        unit: °F
        class: measurement
        mapping:
          - scale: 10.0
            invert: false
            transform: value * 9/5 + 32
        range:
          min: 32 # 0C
          max: 428 # 212C

  # Protection Enabled Switch
  - entity: switch
    name: Protection Enabled
    dps:
      - id: 101
        type: boolean
        name: switch

  # Volume Today (Total, in gallons)
  - entity: sensor
    name: Volume Today
    class: water
    dps:
      - id: 103
        type: integer
        optional: true
        name: sensor
        class: total_increasing
        unit: gal
        mapping:
          - scale: 10.0
            transform: value / 3.785

  # Flow Rate per Minute (in gal/min)
  - entity: sensor
    class: volume_flow_rate
    name: Flow Rate per Minute
    dps:
      - id: 104
        type: integer
        optional: true
        name: sensor
        class: measurement
        unit: gal/min
        mapping:
          - scale: 1
            # Device gives L/h, convert to gal/min
            transform: (value / 3.785) / 60

  # Current Flow Rate (in gal/min)
  - entity: sensor
    class: volume_flow_rate
    name: Current Flow Rate
    dps:
      - id: 105
        type: integer
        name: sensor
        class: measurement
        unit: gal/min
        mapping:
          - scale: 1000.0
            transform: (value / 3.785) / 60

  # Leak Warning
  - entity: sensor
    name: Leak Warning
    dps:
      - id: 106
        type: boolean
        name: sensor

  # Leak Alarm
  - entity: sensor
    name: Leak Alarm
    dps:
      - id: 107
        type: boolean
        name: sensor

  # Alarm Clear Button
  - entity: button
    name: Alarm Clear
    dps:
      - id: 108
        type: boolean
        name: button

  # Protection Mode Select
  - entity: select
    name: Protection Mode
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "AUTO"
            value: "Auto"
          - dps-val: "ADVANCED_SETTING"
            value: "Advanced"

  # AUTO Mode #
  - entity: select
    name: "AUTO Mode #"
    category: config
    dps:
      - id: 110
        type: string
        name: option
        mapping:
          - dps_val: "mode1"
            value: "Mode 1"
          - dps_val: "mode2"
            value: "Mode 2"
          - dps_val: "mode3"
