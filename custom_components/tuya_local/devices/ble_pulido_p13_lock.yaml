name: Smart lock
products:
  - id: kdq0tdbz
    manufacturer: Pulido
    model: P13
entities:
  - entity: lock
    dps:
      - id: 12
        type: integer
        name: unlock_fingerprint
        optional: true
        persist: false
      - id: 13
        name: unlock_password
        type: integer
        optional: true
        persist: false
      - id: 15
        name: unlock_card
        type: integer
        optional: true
        persist: false
      - id: 19
        name: unlock_ble
        type: integer
        optional: true
        persist: false
      - id: 47 # Lock motor state
        name: lock_state
        type: boolean
        mapping:
          - dps_val: true # Unlocked
            value: false
          - dps_val: false # Locked
            value: true
      - id: 61
        type: base64
        optional: true
        name: code_unlock
      - id: 55
        name: unlock_temporary
        type: integer
        optional: true
        persist: false        
      - id: 62
        name: unlock_phone_remote
        type: integer
        optional: true
        persist: false
      - id: 63
        name: unlock_voice_remote
        type: integer
        optional: true
        persist: false
  - entity: sensor
    name: Alert
    class: enum
    category: diagnostic
    dps:
      - id: 21
        type: string
        name: sensor
        optional: true
        persist: false
        mapping:
          - dps_val: null
            value: ok
          - dps_val: wrong_finger
            value: Wrong Finger
          - dps_val: wrong_password
            value: Wrong Password
          - dps_val: wrong_card
            value: Wrong Card
          - dps_val: wrong_face
            value: Wrong Face
          - dps_val: tongue_bad
            value: Tongue Bad
          - dps_val: too_hot
            value: Too Hot
          - dps_val: unclosed_time
            value: Unclosed Time
          - dps_val: tongue_not_out
            value: Tongue Not Out
          - dps_val: pry
            value: Pry
          - dps_val: key_in
            value: Key In
          - dps_val: low_battery
            value: Low Battery
          - dps_val: power_off
            value: Power Off
          - dps_val: shock
            value: Shock
          - dps_val: defense
            value: Defense
          - dps_val: wrong_unlock
            value: Wrong Unlock
  - entity: switch
    name: Auto lock
    category: config
    icon: "mdi:lock-reset"
    dps:
      - id: 33
        type: boolean
        name: switch
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: select
    name: Auto lock delay
    icon: "mdi:lock-clock"
    category: config
    dps:
      - id: 26
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: 5s
            value: 5s
          - dps_val: 10s
            value: 10s
          - dps_val: 15s
            value: 15s
          - dps_val: 30s
            value: 30s
          - dps_val: 60s
            value: 60s
  - entity: select
    name: Lock Volume
    category: config
    dps:
      - id: 31
        type: string
        name: option
        mapping:
          - dps_val: mute
            value: "Mute"
            icon: "mdi:volume-mute"
          - dps_val: low
            value: "Low"
            icon: "mdi:volume-low"
          - dps_val: normal
            value: "Normal"
            icon: "mdi:volume-medium"
          - dps_val: high
            value: "High"
            icon: "mdi:volume-high"
  - entity: switch
    name: Double verification unlocking
    category: config
    icon: "mdi:gesture-two-double-tap"
    dps:
      - id: 68
        type: string
        name: switch
        optional: true
        mapping:
          - dps_val: function1
            value: false
          - dps_val: function2
            value: true
          - value: false
  - entity: sensor
    name: Battery Level
    category: diagnostic
    class: enum
    icon: "mdi:battery-check"
    dps:
      - id: 9
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: high
            value: "High"
          - dps_val: medium
            value: "Medium"
          - dps_val: low
            value: "Low"
          - dps_val: poweroff
            value: "Off"
  - entity: select
    translation_key: language
    category: config
    dps:
      - id: 28
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: chinese_simplified
            value: chinese
          - dps_val: english
            value: english
          - dps_val: spanish
            value: spanish
          - dps_val: Portuguese
            value: portuguese
  - entity: sensor
    name: Offline Password Last Sync
    category: diagnostic
    device_class: timestamp
    dps:
      - id: 64
        type: string
        name: sensor
