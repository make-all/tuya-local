name: Fan coil thermostat
products:
  - id: "tnvv9nnqnz8nljgt"
    manufacturer: Engo
    model: EFAN230W
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 2
        name: hvac_mode
        type: string
        mapping:
          - dps_val: heat
            value: heat
          - dps_val: cool
            value: cool
      - id: 3
        name: hvac_action
        type: string
        mapping:
          - dps_val: heating
            value: heating
          - dps_val: cooling
            value: cooling
          - dps_val: idle
            value: idle
      - id: 16
        name: temperature
        type: integer
        unit: C
        range:
          min: 70
          max: 350
        mapping:
          - scale: 10
            step: 5
      - id: 24
        name: current_temperature
        type: integer
        mapping:
          - scale: 10
      - id: 58
        name: preset_mode
        type: string
        mapping:
          - dps_val: manual
            value: manual
          - dps_val: program
            value: program
          - dps_val: eco
            value: eco
      - id: 109
        name: fan_mode
        type: string
        mapping:
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: high
            value: high
          - dps_val: auto
            value: auto
  - entity: sensor
    class: humidity
    dps:
      - id: 108
        name: sensor
        type: integer
        unit: "%"

  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        name: lock
        type: boolean
  - entity: switch
    name: Fan control
    category: config
    dps:
      - id: 132
        name: switch
        type: boolean
