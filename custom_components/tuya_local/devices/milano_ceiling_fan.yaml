name: Fan with light
products:
  - id: kbhfiv4zxa3qkcsf
    manufacturer: Milano
    model: Ceiling Fan

entities:
  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch

      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: Nature
            value: nature
          - dps_val: Normal
            value: normal
          - dps_val: Sleep
            value: sleep

      - id: 3
        name: speed
        type: integer
        optional: true
        range:
          min: 1
          max: 100

      - id: 8
        name: direction
        type: string
        optional: true
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: reverse
            value: reverse

  - entity: light
    hidden: unavailable
    dps:
      - id: 15
        type: boolean
        optional: true
        name: switch
      - id: 16
        type: integer
        optional: true
        name: brightness
        range:
          min: 10
          max: 1000
        mapping:
          - step: 10
      - id: 15
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
  - entity: select
    translation_key: timer
    dps:
      - id: 22
        name: option
        type: string
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "7h"
            value: "7h"
          - dps_val: "8h"
            value: "8h"
          - dps_val: "9h"
            value: "9h"
          - dps_val: "10h"
            value: "10h"
          - dps_val: "11h"
            value: "11h"
          - dps_val: "12h"
            value: "12h"

  - entity: sensor
    name: timer_remaining
    category: diagnostic
    dps:
      - id: 23
        name: sensor
        type: integer
        unit: min

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 24
        type: bitfield
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 24
        type: bitfield
        optional: true
        name: fault_code
