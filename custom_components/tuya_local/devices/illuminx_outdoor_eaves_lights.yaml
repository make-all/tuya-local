name: Eaves Lights
products:
  - id: ycahigfmcomnpayt
    manufacturer: IlluminX
    model: SCW-KA-CBHC05-18
entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 58
        type: integer
        name: led_count
        hidden: true
      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: white
            value: color_temp
          - dps_val: colour
            value: hs
      - id: 22
        name: brightness
        type: integer
        range:
          min: 10
          max: 1000
      - id: 23
        name: color_temp
        type: integer
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
      - id: 24
        name: color
        type: hex
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 1000
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000

  - entity: number
    name: Countdown
    icon: "mdi:timer-outline"
    dps:
      - id: 26
        type: integer
        name: value
        range:
          min: 0
          max: 86400
        unit: s

  - entity: select
    translation_key: scene
    dps:
      - id: 56
        type: base64
        name: option
