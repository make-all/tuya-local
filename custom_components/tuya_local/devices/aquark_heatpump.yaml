name: Pool heat pump
products:
  - id: eeih95rmks0mjflz
    manufacturer: Aquark
    model: Mr. Silence
entities:
  - entity: climate
    translation_key: pool_heatpump
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: work_mode
            conditions:
              - dps_val: cool
                value: cool
              - dps_val: warm
                value: heat
              - dps_val: smart
                value: heat_cool
      - id: 102
        name: current_temperature
        type: integer
      - id: 103
        name: temperature_unit
        type: boolean
        mapping:
          - dps_val: false
            value: F
          - dps_val: true
            value: C
      - id: 105
        name: work_mode
        type: string
        hidden: true
      - id: 106
        name: temperature
        type: integer
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: false
                range:
                  min: 54
                  max: 104
        range:
          min: 12
          max: 40
      - id: 107
        name: min_temperature
        type: integer
      - id: 108
        name: max_temperature
        type: integer
      - id: 117
        name: preset_mode
        type: boolean
        mapping:
          - dps_val: false
            value: quiet
          - dps_val: true
            value: boost
  - entity: sensor
    name: Speed
    category: diagnostic
    icon: "mdi:speedometer"
    dps:
      - id: 104
        name: sensor
        type: integer
        class: measurement
        unit: "%"
  - entity: binary_sensor
    name: Water flow
    class: problem
    category: diagnostic
    dps:
      - id: 115
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 4
            value: true
          - value: false
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 103
        type: boolean
        name: option
        mapping:
          - dps_val: false
            value: fahrenheit
          - dps_val: true
            value: celsius
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 116
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: true
            constraint: fault_code
            conditions:
              - dps_val: [0, 4]
                value: false
          - value: true
      - id: 115
        type: bitfield
        name: fault_code
      - id: 116
        type: bitfield
        name: fault_code_2
