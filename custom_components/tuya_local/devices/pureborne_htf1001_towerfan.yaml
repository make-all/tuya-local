name: Tower fan
products:
  - id: vv3blwenchl2xnyj
    manufacturer: Pureborne
    model: HTF1001
  - id: 7vv5uaymmrsealcu
    manufacturer: Flanur
    model: HTF1003
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        mapping:  # device has messed up mappings
          - dps_val: nature
            value: normal
          - dps_val: sleep
            value: nature
          - dps_val: nomal
            value: sleep
            available: pureborne_variant
          - dps_val: Nomal
            value: sleep
            available: flanur_variant
          - dps_val: auto
            value: auto
      - id: 5
        type: boolean
        name: oscillate
      - id: 102
        type: string
        name: speed
        mapping:
          - dps_val: F1
            value: 25
            available: pureborne_variant
          - dps_val: F2
            value: 50
            available: pureborne_variant
          - dps_val: F3
            value: 75
            available: pureborne_variant
          - dps_val: F4
            value: 100
            available: pureborne_variant
          - dps_val: level_1
            value: 25
            available: flanur_variant
          - dps_val: level_2
            value: 50
            available: flanur_variant
          - dps_val: level_3
            value: 75
            available: flanur_variant
          - dps_val: level_4
            value: 100
            available: flanur_variant
      - id: 102
        type: string
        name: pureborne_variant
        mapping:
          - value: false
            conditions:
              - dps_val: [F1, F2, F3, F4]
                value: true
      - id: 102
        type: string
        name: flanur_variant
        mapping:
          - value: false
            conditions:
              - dps_val: [level_1, level_2, level_3, level_4]
                value: true
  - entity: switch
    translation_key: sound
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "7h"
            value: "7h"
          - dps_val: "8h"
            value: "8h"
          - dps_val: "9h"
            value: "9h"
          - dps_val: "10h"
            value: "10h"
          - dps_val: "11h"
            value: "11h"
          - dps_val: "12h"
            value: "12h"
