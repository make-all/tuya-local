name: EV charger
products:
  # Home&personal EV Charger v1
  - id: 728d28662f3bdd7c
    manufacturer: Afyeev
    model: "32A 22kW EV charger"
entities:
  - entity: sensor
    translation_key: status
    icon: "mdi:ev-station"
    class: enum
    dps:
      - id: 3
        type: string
        name: sensor
        mapping:
          - dps_val: charger_free
            value: available
          - dps_val: charger_insert
            value: plugged_in
          - dps_val: charger_free_fault
            value: fault_unplugged
          - dps_val: charger_charging
            value: charging
          - dps_val: charger_wait
            value: waiting
          - dps_val: charger_end
            value: charged
          - dps_val: charger_fault
            value: fault
          - dps_val: charger_pause
            value: paused
      - id: 23
        type: string
        optional: true
        name: system_version
  - entity: sensor
    class: energy
    category: diagnostic
    dps:
      - id: 1
        type: integer
        optional: true
        name: sensor
        unit: kWh
        class: total_increasing
        mapping:
          - scale: 100
  #- entity: number
  #  name: Set current
  #  category: config
  #  icon: "mdi:ev-plug-type2"
  #  dps:
  #    - id: 4
  #      type: integer
  #      name: value
  #      unit: A
  #      range:
  #        min: 6
  #        max: 32
  - entity: select
    name: Set current
    category: config
    icon: "mdi:ev-plug-type2"
    dps:
      - id: 4
        type: integer
        name: option
        mapping:
          - dps_val: 6
            value: "6 A"
          - dps_val: 8
            value: "8 A"
          - dps_val: 10
            value: "10 A"
          - dps_val: 13
            value: "13 A"
          - dps_val: 16
            value: "16 A"
          - dps_val: 20
            value: "20 A"
          - dps_val: 24
            value: "24 A"
          - dps_val: 32
            value: "32 A"
  - entity: sensor
    class: power
    category: diagnostic
    dps:
      - id: 9
        type: integer
        name: sensor
        unit: W
        class: measurement
        mapping:
          - scale: 1
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 10
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 10
        type: bitfield
        name: fault_code
      - id: 10
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: "Ready"
          - dps_val: 1
            value: "Ov2 Cr Fault"
          - dps_val: 2
            value: "OV Vol"
          - dps_val: 4
            value: "Undervoltage alarm"
          - dps_val: 8
            value: "Contactor adhesion"
          - dps_val: 16
            value: "Contactor fault"
          - dps_val: 32
            value: "Earth fault"
          - dps_val: 64
            value: "Meter Hardware alarm"
          - dps_val: 128
            value: "Scram fault"
          - dps_val: 256
            value: "CP fault"
          - dps_val: 512
            value: "Meter Commu fault"
          - dps_val: 1024
            value: "Card reader fault"
          - dps_val: 2048
            value: "Cir short fault"
          - dps_val: 4096
            value: "Adhesion fault"
          - dps_val: 8192
            value: "Self test alarm"
          - dps_val: 16384
            value: "Leakage current fault"
  - entity: select
    translation_key: charging_mode
    dps:
      - id: 14
        type: string
        name: option
        mapping:
          - dps_val: charge_now
            value: immediate
          - dps_val: charge_pct
            value: charge_to_percent
          - dps_val: charge_energy
            value: fixed_charge
          - dps_val: charge_schedule
            value: scheduled_charge
          - dps_val: charge_delay
            value: delayed_charge
  - entity: switch
    dps:
      - id: 18
        type: boolean
        optional: true
        name: switch
        mapping:
          - dps_val: null
            value: false
            hidden: true
  - entity: sensor
    name: Last charge
    dps:
      - id: 25
        type: integer
        name: sensor
        unit: kWh
        class: measurement
        optional: true
        mapping:
          - scale: 100
  - entity: binary_sensor
    class: connectivity
    category: diagnostic
    dps:
      - id: 27
        type: string
        optional: true
        name: sensor
        mapping:
          - dps_val: offline
            value: false
          - dps_val: online
            value: true
  - entity: number
    translation_key: timer
    class: duration
    dps:
      - id: 28
        type: integer
        name: value
        unit: h
        optional: true
        range:
          min: 0
          max: 15
  - entity: sensor
    name: Phase A voltage
    class: voltage
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        unit: V
        mask: "FFFF000000000000"
        mapping:
          - scale: 10
  - entity: sensor
    name: Phase A current
    class: current
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        unit: A
        mask: "000000FFFF000000"
        mapping:
          - scale: 1000
  - entity: sensor
    name: Phase A power
    class: power
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        unit: kW
        mask: "000000000000FFFF"
        mapping:
          - scale: 1000
  - entity: sensor
    name: Phase B voltage
    class: voltage
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        unit: V
        mask: "FFFF000000000000"
        mapping:
          - scale: 10
  - entity: sensor
    name: Phase B current
    class: current
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        unit: A
        mask: "000000FFFF000000"
        mapping:
          - scale: 1000
  - entity: sensor
    name: Phase B power
    class: power
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        unit: kW
        mask: "000000000000FFFF"
        mapping:
          - scale: 1000
  - entity: sensor
    name: Phase C voltage
    class: voltage
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        unit: V
        mask: "FFFF000000000000"
        mapping:
          - scale: 10
  - entity: sensor
    name: Phase C current
    class: current
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        unit: A
        mask: "000000FFFF000000"
        mapping:
          - scale: 1000
  - entity: sensor
    name: Phase C power
    class: power
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        unit: kW
        mask: "000000000000FFFF"
        mapping:
          - scale: 1000
  - entity: switch
    name: Plug & charge
    icon: "mdi:ev-station"
    dps:
      - id: 101
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: "Ground free"
    icon: "mdi:ev-station"
    invert_state: true
    dps:
      - id: 103
        type: boolean
        optional: true
        name: switch
