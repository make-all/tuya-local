name: Kettle
# Kogan SmarterHome 1.7L Smart Kettle (Stainless Steel)
# Model: KASMTSSKTLB
entities:
  - entity: switch
    name: Switch
    icon: "mdi:kettle-steam"
    dps:
      - id: 1
        type: boolean
        optional: true
        name: switch
        mapping:
          - dps_val: false
            value: false
            icon: "mdi:kettle-off"
          - dps_val: true
            value: true
            icon: "mdi:kettle-steam"
  - entity: water_heater
    translation_key: kettle
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: "on"
      - id: 2
        type: integer
        name: current_temperature
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: current_temperature_f
      - id: 3
        type: integer
        name: current_temperature_f
        hidden: true
      - id: 8
        type: integer
        name: temperature
        range:
          min: 0
          max: 100
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: temp_set_f
                range:
                  min: 32
                  max: 212
      - id: 9
        type: integer
        name: temp_set_f
        hidden: true
        range:
          min: 32
          max: 212
      - id: 12
        type: string
        name: temperature_unit
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
  - entity: select
    translation_key: kettle_mode
    # Tuya DP 16 work_type meanings for this kettle:
    # - temp_setting: direct heating to the selected target temperature.
    # - temp_boiling: boil first, then cool to the selected target temperature.
    dps:
      - id: 16
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: setting_quick
            value: quick_heat
          - dps_val: boiling_quick
            value: quick_boil
          # Direct heating mode.
          - dps_val: temp_setting
            value: heat
          # Boil and cool mode.
          - dps_val: temp_boiling
            value: boil
  - entity: select
    name: Quick heat temperature C
    icon: "mdi:water-thermometer-outline"
    category: config
    dps:
      - id: 4
        type: string
        optional: true
        name: option
        mapping:
          - constraint: unit
            conditions:
              - dps_val: c
                mapping:
                  - dps_val: "70"
                    value: "70"
                  - dps_val: "80"
                    value: "80"
                  - dps_val: "90"
                    value: "90"
                  - dps_val: "100"
                    value: "100"
              - dps_val: f
                invalid: true
      - id: 12
        type: string
        name: unit
  - entity: select
    name: Quick heat temperature F
    icon: "mdi:water-thermometer-outline"
    category: config
    dps:
      - id: 5
        type: string
        optional: true
        name: option
        mapping:
          - constraint: unit
            conditions:
              - dps_val: f
                mapping:
                  - dps_val: "158"
                    value: "158"
                  - dps_val: "176"
                    value: "176"
                  - dps_val: "194"
                    value: "194"
                  - dps_val: "212"
                    value: "212"
              - dps_val: c
                invalid: true
      - id: 12
        type: string
        name: unit
  - entity: select
    name: Quick boil temperature C
    icon: "mdi:water-thermometer"
    category: config
    dps:
      - id: 6
        type: string
        optional: true
        name: option
        mapping:
          - constraint: unit
            conditions:
              - dps_val: c
                mapping:
                  - dps_val: "70"
                    value: "70"
                  - dps_val: "80"
                    value: "80"
                  - dps_val: "90"
                    value: "90"
                  - dps_val: "100"
                    value: "100"
              - dps_val: f
                invalid: true
      - id: 12
        type: string
        name: unit
  - entity: select
    name: Quick boil temperature F
    icon: "mdi:water-thermometer"
    category: config
    dps:
      - id: 7
        type: string
        optional: true
        name: option
        mapping:
          - constraint: unit
            conditions:
              - dps_val: f
                mapping:
                  - dps_val: "158"
                    value: "158"
                  - dps_val: "176"
                    value: "176"
                  - dps_val: "194"
                    value: "194"
                  - dps_val: "212"
                    value: "212"
              - dps_val: c
                invalid: true
      - id: 12
        type: string
        name: unit
  - entity: number
    name: Boil temperature
    category: config
    icon: "mdi:coolant-temperature"
    dps:
      - id: 10
        type: integer
        optional: true
        name: value
        range:
          min: 0
          max: 100
        mapping:
          - constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_boiling_f
                range:
                  min: 32
                  max: 212
      - id: 11
        type: integer
        optional: true
        name: temp_boiling_f
        hidden: true
        range:
          min: 32
          max: 212
      - id: 12
        type: string
        name: unit
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 12
        type: string
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: switch
    name: Keep warm
    icon: "mdi:kettle-steam"
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: number
    name: Keep warm time
    class: duration
    category: config
    icon: "mdi:timer"
    dps:
      - id: 14
        type: integer
        name: value
        unit: min
        range:
          min: 0
          max: 360
  - entity: sensor
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 15
        type: string
        name: sensor
        mapping:
          - dps_val: standby
            value: standby
          - dps_val: heating
            value: heating
          - dps_val: cooling
            value: cooling
          - dps_val: warm
            value: keeping_warm
          - dps_val: heating_temp
            value: heating
          - dps_val: boiling_temp
            value: boiling
          - dps_val: reserve_1
            value: unknown
          - dps_val: reserve_2
            value: unknown
          - dps_val: reserve_3
            value: unknown
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 18
        type: integer
        name: sensor
        unit: min
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: fault_code
