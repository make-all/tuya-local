name: Heat recovery ventilator
products:
  - id: ddrpa4plk6fsvz9l
    manufacturer: Reventon / Holtop
    model: Smart ERV

entities:
  - entity: switch
    name: Ventilation
    dps:
      - id: 101
        name: switch
        type: boolean

  - entity: select
    name: Supply fan speed (10-step)
    icon: mdi:fan-plus
    category: config
    dps:
      - id: 102
        name: option
        type: string
        mapping:
          - dps_val: "0"
            value: "0"
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
          - dps_val: "6"
            value: "6"
          - dps_val: "7"
            value: "7"
          - dps_val: "8"
            value: "8"
          - dps_val: "9"
            value: "9"

  - entity: select
    name: Exhaust fan speed (10-step)
    icon: mdi:fan-minus
    category: config
    dps:
      - id: 103
        name: option
        type: string
        mapping:
          - dps_val: "0"
            value: "0"
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
          - dps_val: "6"
            value: "6"
          - dps_val: "7"
            value: "7"
          - dps_val: "8"
            value: "8"
          - dps_val: "9"
            value: "9"

  - entity: select
    name: Supply fan speed (3-step)
    icon: mdi:fan-plus
    category: config
    dps:
      - id: 104
        name: option
        type: string
        mapping:
          - dps_val: "0"
            value: low
          - dps_val: "1"
            value: medium
          - dps_val: "2"
            value: high

  - entity: select
    name: Exhaust fan speed (3-step)
    icon: mdi:fan-minus
    category: config
    dps:
      - id: 105
        name: option
        type: string
        mapping:
          - dps_val: "0"
            value: low
          - dps_val: "1"
            value: medium
          - dps_val: "2"
            value: high

  - entity: number
    name: Supply air target temperature
    class: temperature
    category: config
    dps:
      - id: 106
        name: value
        type: integer
        unit: C
        range:
          min: 10
          max: 25

  - entity: number
    name: Bypass temperature base
    class: temperature
    category: config
    dps:
      - id: 107
        name: value
        type: integer
        unit: C
        range:
          min: 5
          max: 30

  - entity: number
    name: Bypass temperature delta
    class: temperature
    category: config
    dps:
      - id: 108
        name: value
        type: integer
        unit: C
        range:
          min: 2
          max: 15

  - entity: select
    name: Filter life setting
    icon: mdi:air-filter
    category: config
    dps:
      - id: 109
        name: option
        type: string
        mapping:
          - dps_val: "45"
            value: 45 days
          - dps_val: "60"
            value: 60 days
          - dps_val: "90"
            value: 90 days
          - dps_val: "180"
            value: 180 days

  - entity: button
    translation_key: filter_reset
    category: config
    dps:
      - id: 110
        name: button
        type: boolean

  - entity: sensor
    class: carbon_dioxide
    dps:
      - id: 111
        name: sensor
        type: integer
        unit: ppm
        class: measurement

  - entity: sensor
    name: TVOC level
    class: enum
    icon: mdi:molecule
    dps:
      - id: 112
        name: sensor
        type: string
        force: true
        mapping:
          - dps_val: "0"
            value: unknown
          - dps_val: "1"
            value: excellent
          - dps_val: "2"
            value: good
          - dps_val: "3"
            value: moderate
          - dps_val: "4"
            value: poor

  - entity: sensor
    class: humidity
    dps:
      - id: 113
        name: sensor
        type: integer
        unit: "%"
        class: measurement

  - entity: sensor
    class: pm25
    dps:
      - id: 114
        name: sensor
        type: integer
        unit: μg/m³
        class: measurement

  - entity: sensor
    name: Indoor temperature
    class: temperature
    dps:
      - id: 117
        name: sensor
        type: integer
        unit: C
        class: measurement

  - entity: sensor
    name: Outdoor temperature
    class: temperature
    dps:
      - id: 118
        name: sensor
        type: integer
        unit: C
        class: measurement

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 119
        name: sensor
        type: bitfield
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 119
        name: fault_code
        type: bitfield

  - entity: binary_sensor
    name: Defrost active
    category: diagnostic
    dps:
      - id: 122
        name: sensor
        type: boolean

  - entity: binary_sensor
    name: Filter cleaning required
    class: problem
    category: diagnostic
    dps:
      - id: 123
        name: sensor
        type: boolean

  - entity: sensor
    name: Fan speed control mode
    category: diagnostic
    dps:
      - id: 125
        name: sensor
        type: boolean
        force: true
        mapping:
          - dps_val: false
            value: 3-step
          - dps_val: true
            value: 10-step

  - entity: sensor
    translation_key: filter_life
    class: duration
    category: diagnostic
    dps:
      - id: 126
        name: sensor
        type: integer
        unit: d
