name: Energy monitor
products:
  - id: dpowo5ivv7thze68
    manufacturer: Yagusmart
    model: iMeter 3PN
entities:
  - entity: sensor
    translation_key: energy_consumed
    class: energy
    dps:
      - id: 1
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        mapping:
          - scale: 100
      - id: 17
        type: string
        name: alarm_set_1
        optional: true
      - id: 18
        type: string
        name: alarm_set_2
        optional: true
      - id: 19
        type: string
        name: breaker_number
        optional: true

  - entity: sensor
    translation_key: energy_produced
    class: energy
    category: diagnostic
    dps:
      - id: 23
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        optional: true
        mapping:
          - scale: 100

  - entity: sensor
    class: frequency
    category: diagnostic
    dps:
      - id: 32
        type: integer
        name: sensor
        unit: Hz
        class: measurement
        optional: true
        mapping:
          - scale: 100

  - entity: button
    name: Refresh
    icon: "mdi:sync"
    category: config
    dps:
      - id: 35
        type: string
        optional: true
        name: button
        mapping:
          - dps_val: online
            value: true
  - entity: binary_sensor
    class: connectivity
    category: diagnostic
    deprecated: button_refresh  # 2026-06-29
    dps:
      - id: 35
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: online
            value: true
          - dps_val: offline
            value: false

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 9
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 9
        type: bitfield
        name: fault_code

  - entity: sensor
    translation_key: voltage_x
    translation_placeholders:
      x: A
    class: voltage
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "FFFF000000000000"
        unit: V
        mapping:
          - scale: 10

  - entity: sensor
    translation_key: current_x
    translation_placeholders:
      x: A
    class: current
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000FFFFFF000000"
        unit: A
        mapping:
          - scale: 1000

  - entity: sensor
    translation_key: power_x
    translation_placeholders:
      x: A
    class: power
    dps:
      - id: 6
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000000000FFFFFF"
        unit: W

  - entity: sensor
    translation_key: voltage_x
    translation_placeholders:
      x: B
    class: voltage
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "FFFF000000000000"
        unit: V
        mapping:
          - scale: 10

  - entity: sensor
    translation_key: current_x
    translation_placeholders:
      x: B
    class: current
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000FFFFFF000000"
        unit: A
        mapping:
          - scale: 1000

  - entity: sensor
    translation_key: power_x
    translation_placeholders:
      x: B
    class: power
    dps:
      - id: 7
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000000000FFFFFF"
        unit: W

  - entity: sensor
    translation_key: voltage_x
    translation_placeholders:
      x: C
    class: voltage
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "FFFF000000000000"
        unit: V
        mapping:
          - scale: 10

  - entity: sensor
    translation_key: current_x
    translation_placeholders:
      x: C
    class: current
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000FFFFFF000000"
        unit: A
        mapping:
          - scale: 1000

  - entity: sensor
    translation_key: power_x
    translation_placeholders:
      x: C
    class: power
    dps:
      - id: 8
        type: base64
        name: sensor
        optional: true
        force: true
        mask: "0000000000FFFFFF"
        unit: W
