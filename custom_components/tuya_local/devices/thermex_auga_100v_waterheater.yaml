name: Water heater
products:
  - id: mamroevbex1vpzwy
    manufacturer: Thermex
    model: Auga 100 V WIFI
entities:
  - entity: climate
    dps:
      - id: 101
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat
      - id: 105
        type: string
        name: preset_mode
        mapping:
          - dps_val: "3"
            value: eco
          - dps_val: "2"
            value: comfort
          - dps_val: "1"
            value: boost
      - id: 104
        type: integer
        name: temperature
        unit: C
        range:
          min: 30
          max: 75
      - id: 102
        type: integer
        name: current_temperature
  - entity: water_heater
    dps:
      - id: 101
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: away
          - dps_val: true
            constraint: work_mode
            conditions:
              - dps_val: "3"
                value: eco
                default: true
              - dps_val: "2"
                value: electric
              - dps_val: "1"
                value: performance
      - id: 105
        type: string
        name: work_mode
        hidden: true
      - id: 104
        type: integer
        name: temperature
        unit: C
        range:
          min: 30
          max: 75
      - id: 102
        type: integer
        name: current_temperature
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 106
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 106
        type: bitfield
        name: fault_code
  - entity: sensor
    name: Water temperature
    class: temperature
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: C
        mapping:
          - scale: 1
