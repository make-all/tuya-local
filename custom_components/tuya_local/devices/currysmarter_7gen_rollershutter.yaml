name: Curry Smarter 7-Gen roller shutter switch
products:
  - id: mxeyhho2cvjgqake
    manufacturer: Curry Smarter
    model: W7Pro
entities:
  # === Haupt-Entity: Rollladen ===
  - entity: cover
    class: shutter
    dps:
      - id: 1
        type: string
        name: control
        mapping:
          - dps_val: open
            value: open
          - dps_val: stop
            value: stop
          - dps_val: close
            value: close
      - id: 2
        type: integer
        name: position
        unit: "%"
        range:
          min: 0
          max: 100
        mapping:
          - invert: true

  # === Sensoren ===
  - entity: sensor
    name: Sensor-Batterie
    class: battery
    category: diagnostic
    dps:
      - id: 15
        type: integer
        name: sensor
        optional: true
        unit: "%"

  - entity: sensor
    name: Helligkeit
    class: illuminance
    dps:
      - id: 101
        type: integer
        name: sensor
        optional: true
        unit: "lx"

  - entity: binary_sensor
    name: Regen erkannt
    class: moisture
    dps:
      - id: 131
        type: boolean
        name: sensor

  # === Konfigurations-Switches ===
  - entity: switch
    name: Kindersicherung
    category: config
    icon: "mdi:account-lock"
    dps:
      - id: 105
        type: boolean
        name: switch

  - entity: switch
    name: Lichtsensor-Automatik
    category: config
    icon: "mdi:weather-sunny"
    dps:
      - id: 132
        type: boolean
        name: switch

  - entity: switch
    name: Regensensor-Automatik
    category: config
    icon: "mdi:weather-rainy"
    dps:
      - id: 133
        type: boolean
        name: switch

  - entity: switch
    name: Regen-Benachrichtigung
    category: config
    icon: "mdi:bell-ring"
    dps:
      - id: 104
        type: boolean
        name: switch

  - entity: switch
    name: Lichtsensor-LED
    category: config
    icon: "mdi:led-on"
    dps:
      - id: 128
        type: boolean
        name: switch

  # === Konfigurations-Selects ===
  - entity: select
    name: Hintergrundbeleuchtung
    category: config
    icon: "mdi:brightness-6"
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: max_light
            value: Hell
          - dps_val: micro_light
            value: Gedimmt
          - dps_val: close
            value: Aus

  - entity: select
    name: Kalibrierung
    category: config
    icon: "mdi:tune"
    dps:
      - id: 3
        type: string
        name: option
        mapping:
          - dps_val: start
            value: Start
          - dps_val: end
            value: Fertig
          - dps_val: pause
            value: Abbruch

  - entity: select
    name: Lichtsensor-Pairing
    category: config
    icon: "mdi:link-variant"
    dps:
      - id: 127
        type: string
        name: option
        mapping:
          - dps_val: start
            value: Start
          - dps_val: end
            value: Fertig
          - dps_val: pause
            value: Abbruch

  # === Buttons ===
  - entity: button
    name: Kalibrierung zurücksetzen
    category: config
    icon: "mdi:delete-sweep"
    dps:
      - id: 102
        type: boolean
        name: button

  - entity: button
    name: Kalibrierungsdaten synchronisieren
    category: config
    icon: "mdi:sync"
    dps:
      - id: 129
        type: boolean
        name: button