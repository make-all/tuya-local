name: Fan speed switch
products:
  - id: cwwc6ga2gz8mvrqo
    manufacturer: NHZS
entities:
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: integer
        name: speed
        range:
          min: 1
          max: 100
  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 2
        type: integer
        name: minute
        optional: true
        range:
          min: 0
          max: 1440
  - entity: select
    translation_key: initial_state
    category: config
    dps:
      - id: 11
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "on"
            value: "on"
          - dps_val: "off"
            value: "off"
          - dps_val: memory
            value: memory
  - entity: light
    translation_key: backlight
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
