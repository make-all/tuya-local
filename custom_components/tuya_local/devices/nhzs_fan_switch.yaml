name: Fan speed switch
products:
  - id: cwwc6ga2gz8mvrqo
    manufacturer: NHZS
    model: 风扇开关
entities:
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: integer
        name: speed
        range:
          min: 1
          max: 20
  - entity: number
    translation_key: timer
    category: config
    dps:
      - id: 2
        type: integer
        name: value
        unit: min
        optional: true
        range:
          min: 0
          max: 1440
  - entity: select
    name: Relay status
    category: config
    dps:
      - id: 11
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "on"
            value: "on"
          - dps_val: "off"
            value: "off"
          - dps_val: memory
            value: memory
  - entity: light
    name: Backlight
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch