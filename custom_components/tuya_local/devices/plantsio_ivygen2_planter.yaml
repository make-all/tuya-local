name: Smart planter
products:
  - id: il6e0dusjrlxxhgr
    manufacturer: PlantsIO
    model: Ivy Gen2
entities:
  - entity: sensor
    translation_key: water_level
    class: volume_storage
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: mL
        class: measurement
      - id: 123
        type: integer
        name: condition
  - entity: sensor
    class: illuminance
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: lx
        class: measurement
      - id: 124
        type: integer
        name: condition
  - entity: sensor
    class: temperature
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: C
        class: measurement
        mapping:
          - scale: 10
      - id: 125
        type: string
        name: secondary_status
  - entity: sensor
    class: humidity
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    class: moisture
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    class: battery
    dps:
      - id: 106
        type: integer
        name: sensor
        unit: "%"
      - id: 128
        type: integer
        name: status
  - entity: sensor
    name: Timer period
    category: config
    class: duration
    icon: "mdi:timer-sand"
    dps:
      - id: 107
        type: integer
        optional: true
        name: sensor
        unit: min
  - entity: text
    name: Plant details
    category: config
    icon: "mdi:sprout"
    hidden: true
    dps:
      - id: 108
        type: string
        name: value
      - id: 109
        type: string
        name: device_info
  - entity: text
    name: Plant detection
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 110
        type: string
        name: value
  - entity: text
    name: Display settings
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 111
        type: string
        name: value
  - entity: text
    name: Sleep settings
    category: config
    icon: "mdi:sleep"
    hidden: true
    dps:
      - id: 112
        type: string
        name: value
  - entity: text
    name: Sensor config
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 113
        type: string
        name: value
  - entity: text
    name: Animation settings
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 114
        type: string
        name: value
  - entity: text
    name: Localization settings
    category: config
    icon: "mdi:translate"
    hidden: true
    dps:
      - id: 115
        type: string
        name: value
  - entity: text
    name: Other settings
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 116
        type: string
        name: value
  - entity: number
    name: Command
    category: config
    icon: "mdi:console"
    hidden: true
    dps:
      - id: 117
        type: integer
        optional: true
        name: value
        range:
          min: 0
          max: 100
  - entity: number
    name: Tutorial
    category: config
    icon: "mdi:book-open"
    hidden: true
    dps:
      - id: 118
        type: integer
        name: value
        range:
          min: 0
          max: 2099999999
  - entity: event
    name: Left touch
    icon: "mdi:hand-pointing-right"
    class: button
    dps:
      - id: 120
        type: boolean
        name: event
        mapping:
          - dps_val: true
            value: pressed
          - value: null
  - entity: event
    name: Right touch
    icon: "mdi:hand-pointing-left"
    class: button
    dps:
      - id: 121
        type: boolean
        name: event
        mapping:
          - dps_val: true
            value: pressed
          - value: null
  - entity: event
    name: Plant touch
    icon: "mdi:hand-pointing-down"
    class: button
    dps:
      - id: 122
        type: boolean
        name: event
        optional: true
        mapping:
          - dps_val: true
            value: pressed
          - value: null
  - entity: event
    name: Hug
    class: button
    icon: "mdi:human-handsup"
    dps:
      - id: 119
        type: integer
        name: event
        optional: true
        mapping:
          - dps_val: 3
            value: pressed
          - value: null
  - entity: text
    name: Direct control
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 126
        type: string
        optional: true
        name: value
  - entity: text
    name: Behaviour
    category: config
    icon: "mdi:cogs"
    hidden: true
    dps:
      - id: 127
        type: string
        optional: true
        name: value
  - entity: text
    name: Timer settings
    category: config
    icon: "mdi:timer-cog"
    hidden: true
    dps:
      - id: 129
        type: string
        name: value
  - entity: sensor
    name: Photosynthetic active radiation
    dps:
      - id: 130
        type: integer
        name: sensor
        unit: DLI
        class: measurement
