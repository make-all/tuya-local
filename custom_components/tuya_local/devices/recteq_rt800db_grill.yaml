name: Grill
products:
  - id: js3ouva4uggbifzo
    manufacturer: RecTeq
    model: RT-800DB
entities:
  - entity: climate
    icon: "mdi:grill"
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat
      - id: 101
        type: integer
        name: temperature
        range:
          min: 180
          max: 700
        unit: F
      - id: 102
        type: integer
        name: current_temperature
        unit: F
  - entity: sensor
    name: Probe A temperature
    class: temperature
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: F
  - entity: sensor
    name: Probe B temperature
    class: temperature
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: F
  - entity: number
    name: Minimum feed rate
    dps:
      - id: 105
        type: integer
        name: value
        range:
          min: 0
          max: 255
        mapping:
          - step: 5
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 106
        type: integer
        name: value
        unit: F
        range:
          min: -127
          max: 128
  - entity: binary_sensor
    name: Power failure
    class: problem
    dps:
      - id: 107
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Ignition failure
    class: problem
    dps:
      - id: 108
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Probe fault
    class: problem
    dps:
      - id: 109
        type: boolean
        name: sensor
