#environ_aquaboost_100.yaml

name: Environ AquaBoost 100L
products:
  - id: bf10438b7b9928c3ddrnmb
    manufacturer: Environ
    model: "Aquaboost 100L"
entities:
  - entity: water_heater
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: off
          - dps_val: true
            constraint: work_mode
            conditions:
              - dps_val: ECO
                value: Eco
              - dps_val: HP
                value: Heat_Pump
              - dps_val: HYB
                value: Hybrid
              - dps_val: HYB1
                value: performance
              - dps_val: ELE
                value: E-Heater
      - id: 2
        type: string
        name: work_mode
        hidden: true
      - id: 4
        type: integer
        name: temperature
        unit: C
        range:
          min: 15
          max: 75
      - id: 7
        type: boolean
        name: defrosting
      - id: 14
        name: EEV_valve
        class: number
        type: integer
      - id: 16
        type: integer
        name: current_temperature
        unit: C
      - id: 17
        type: string
        name: phase_sequence_module
      - id: 19
        type: string
        name: fan
      - id: 20
        name: cold_suction_gas_temperature
        class: temperature
        unit: C
        type: integer
      - id: 23
        name: outlet_air_temperature
        class: temperature
        unit: C
        type: integer
      - id: 24
        name: condenser_heating_temperature
        class: temperature
        unit: C
        type: integer
      - id: 26
        name: inlet_air_temperature
        class: temperature
        unit: C
        type: integer
      - id: 27
        type: boolean
        name: compressor
      - id: 28
        type: boolean
        name: 28_dp_bool
      - id: 29
        type: boolean
        name: 29_dp_bool
      - id: 30
        type: boolean
        name: 30_dp_bool
      - id: 31
        type: boolean
        name: 31_dp_bool
      - id: 32
        type: boolean
        name: heater_element
      - id: 33
        type: boolean
        name: 33_dp_bool

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 15
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 15
        type: bitfield
        name: fault_code