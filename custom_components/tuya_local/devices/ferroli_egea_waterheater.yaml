name: Water heater
products:
  - id: ymvlwldw9f9alkee
    manufacturer: Ferroli
    model: EGEA LT
entities:
  - entity: water_heater
    dps:
      - id: 1
        name: operation_mode
        type: boolean
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: work_mode
            conditions:
              - dps_val: eco
                value: eco
              - dps_val: auto
                value: heat_pump
              - dps_val: boost
                value: high_demand
              - dps_val: electric_heating
                value: electric
      - id: 2
        name: temperature
        type: integer
        unit: C
        precision: 0
        range:
          min: 25
          max: 75
      - id: 4
        name: work_mode
        type: string
        hidden: true
      - id: 117
        name: current_temperature
        type: integer
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 9
        name: sensor
        type: bitfield
        mapping:
          - dps_val: 0
            value: false
          - value: true
  - entity: sensor
    name: Water temperature lower
    class: temperature
    category: diagnostic
    dps:
      - id: 118
        name: sensor
        type: integer
        unit: C
        class: measurement
  - entity: sensor
    class: temperature
    category: diagnostic
    dps:
      - id: 3
        name: sensor
        type: integer
        unit: C
        class: measurement
