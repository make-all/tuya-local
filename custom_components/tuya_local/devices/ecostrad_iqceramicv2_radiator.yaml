name: Radiator
products:
  - id: g8szwifd3zgozoxt
    manufacturer: Ecostrad
    name: iQ Ceramic
  - id: oqqreuepbc0g8lcg
    manufacturer: Ecostrad
    name: iQ Ceramic
entities:
  - entity: climate
    translation_key: heater
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - dps_val: true
            value: heat
          - dps_val: false
            value: "off"
      - id: 3
        name: temperature
        type: integer
        unit: C
        range:
          min: 70
          max: 300
        mapping:
          - scale: 10
            step: 5
      - id: 2
        name: preset_mode
        type: string
        optional: true
        mapping:
          - dps_val: hot
            value: heat
          - dps_val: Program
            value: program
      - id: 24
        name: current_temperature
        type: integer
        unit: C
        mapping:
          - scale: 10
      - id: 32
        name: hvac_action
        type: string
        optional: true
        mapping:
          - dps_val: heating
            value: heating
          - dps_val: warm
            value: idle
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        name: lock
        type: boolean
        optional: true
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 27
        name: value
        type: integer
        optional: true
        unit: C
        range:
          min: -5
          max: 5
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 42
        name: sensor
        type: integer
        optional: true
        unit: min
  - entity: select
    name: Open window detection
    translation_key: timer
    category: config
    dps:
      - id: 108
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: cancel
            icon: "mdi:window-closed"
          - dps_val: "60"
            value: "60m"
            icon: "mdi:window-open"
          - dps_val: "90"
            value: "1h30m"
            icon: "mdi:window-open"
  - entity: select
    name: PIR timeout
    category: config
    translation_key: timer
    icon: "mdi:timer-settings-outline"
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: "15"
            value: "15m"
          - dps_val: "30"
            value: "30m"
          - dps_val: "45"
            value: "45m"
          - dps_val: "60"
            value: "1h"
