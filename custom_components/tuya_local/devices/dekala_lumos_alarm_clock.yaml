# `tuya-local` configuration for the Dekala Lumos sunrise alarm clock (`e1xp7w`).
#
# Working features:
# - color, ambient and night lights with brightness/color control
# - Alarm 1/2 scheduling, snooze/stop, radio tuning, volume and display settings
# - manual clock time setting when network time sync is disabled
#
# Known limitations:
# - alarm raw payloads may need one-time initialization via `Alarm 1 reset` / `Alarm 2 reset` (using force:true is not working here)
# - light tones can differ slightly from the Tuya app
#
# Not yet exposed:
# - DP120 `lcd_icon_display`: LCD icon visibility for temperature / humidity / weather / UV
# - DP131 `radio_searching`: start / stop automatic FM station scan
# - DP132 `radio_list`: stored station list / presets after scan
# - decoded weather/alarm runtime sensors from DP113 / DP126 (raw diagnostics are present)

name: Sunrise alarm clock

products:
  - id: e1xp7w
    manufacturer: Dekala
    model: Dekala Lumos™-全屏闰年
    model_id: e1xp7w

entities:
  - entity: light
    translation_key: color_light
    dps:
      - id: "2"
        name: switch
        type: boolean
      - id: "101"
        name: brightness
        type: integer
        optional: true
        range:
          min: 10
          max: 1000
        step: 10
      - id: "11"
        name: rgbhsv
        type: hex
        optional: true
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 100
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000

  - entity: light
    translation_key: ambient_light
    dps:
      - id: "102"
        name: switch
        type: boolean
      - id: "123"
        name: brightness
        type: integer
        optional: true
        range:
          min: 10
          max: 1000
        step: 10

  - entity: light
    translation_key: night_light
    dps:
      - id: "104"
        name: switch
        type: boolean
      - id: "124"
        name: brightness
        type: integer
        optional: true
        range:
          min: 10
          max: 1000
        step: 10
      - id: "105"
        name: rgbhsv
        type: hex
        optional: true
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 100
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000

  - entity: number
    translation_key: volume
    mode: slider
    dps:
      - id: "5"
        name: value
        type: integer
        range:
          min: 5
          max: 100
        step: 1
        unit: "%"

  - entity: switch
    translation_key: sleep
    dps:
      - id: "106"
        name: switch
        type: boolean

  - entity: switch
    translation_key: alarm_x_enabled
    translation_placeholders:
      x: "1"
    category: config
    dps:
      - id: "108"
        name: switch
        type: boolean

  - entity: switch
    translation_key: alarm_x_enabled
    translation_placeholders:
      x: "2"
    category: config
    dps:
      - id: "110"
        name: switch
        type: boolean

  # Alarm 1 configuration (DP 109 raw payload)
  - entity: time
    translation_key: alarm_x_time
    translation_placeholders:
      x: "1"
    category: config
    dps:
      - id: "109"
        name: hour
        type: base64
        optional: true
        persist: true
        mask: "FF00000000000000000000000000"
      - id: "109"
        name: minute
        type: base64
        optional: true
        persist: true
        mask: "00FF000000000000000000000000"

  - entity: select
    translation_key: alarm_x_repeat
    translation_placeholders:
      x: "1"
    category: config
    dps:
      - id: "109"
        name: option
        type: base64
        optional: true
        persist: true
        mask: "0000FF0000000000000000000000"
        mapping:
          - dps_val: 0
            value: once
          - dps_val: 124
            value: weekdays
          - dps_val: 3
            value: weekends
          - dps_val: 127
            value: every_day

  # Repeat-day bits are assumed to map Monday..Sunday across the 7 low bits of Data[2].
  - entity: switch
    translation_key: alarm_x_day_sunday
    translation_placeholders:
