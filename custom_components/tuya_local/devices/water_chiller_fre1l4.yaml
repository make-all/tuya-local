# Tuya Local device profile — Water chiller
# Product: tmwafkxho3xaqhzt (model fre1l4), Tuya category "wk"
# Protocol 3.4. DP behavior verified by live experiment 2026-07:
#   - DP 125 acts as a DIRECT ozone/oxygenation on/off (despite its
#     "timer enable" name). Firmware enforces: 1-hour auto-off,
#     circulation-pump interlock, no persistence across power cycles.
#   - DPs 126-129 (daily timer window) are declared in the data model
#     but INERT in this MCU firmware — intentionally omitted.
#
# Ozone is modelled as a climate PRESET (Normal / Disinfect) rather than
# a standalone switch, so it lives inside the chiller card. DP 124 remains
# a read-only "Ozone running" binary_sensor for state feedback.
name: Water chiller
products:
  - id: tmwafkxho3xaqhzt
    manufacturer: Unbranded
    model: fre1l4 water chiller

entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cold
                value: cool
              - dps_val: hot
                value: heat
              - dps_val: auto
                value: heat_cool
      - id: 2
        type: string
        name: mode
        hidden: true
      - id: 3
        type: integer
        name: temperature
        range:
          min: 0
          max: 41
      - id: 24
        type: integer
        name: current_temperature
      - id: 23
        type: string
        name: temperature_unit
        optional: true
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
      # Ozone / oxygenation as a preset overlay (independent of hvac_mode).
      # Requires the circulation pump running; firmware auto-offs after 1h.
      - id: 125
        type: boolean
        name: preset_mode
        mapping:
          - dps_val: false
            value: Ozone Off
          - dps_val: true
            value: Ozone On

  # Read-only ozone running state (the actual pump, not the enable bit)
  - entity: binary_sensor
    name: Ozone running
    category: diagnostic
    icon: "mdi:air-purifier"
    dps:
      - id: 124
        type: boolean
        name: sensor

  # --- Running-state diagnostics ---
  - entity: binary_sensor
    name: Compressor
    category: diagnostic
    class: running
    dps:
      - id: 118
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Fan
    category: diagnostic
    class: running
    dps:
      - id: 119
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Circulation pump
    category: diagnostic
    class: running
    dps:
      - id: 120
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Defrosting
    category: diagnostic
    dps:
      - id: 121
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Anti-freeze protection
    category: diagnostic
    class: cold
    dps:
      - id: 122
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Electric auxiliary heat
    category: diagnostic
    class: heat
    dps:
      - id: 123
        type: boolean
        name: sensor

  # --- Fault code ---
  - entity: sensor
    name: Fault code
    category: diagnostic
    icon: "mdi:alert-circle-outline"
    dps:
      - id: 109
        type: integer
        name: sensor

  # --- Temperature diagnostics ---
  - entity: sensor
    name: Ambient temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 110
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Return water temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 111
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Outlet water temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 112
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Suction temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 113
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Discharge temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Evaporator coil temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 115
        type: integer
        name: sensor
        unit: C

  # --- Refrigeration-circuit diagnostics ---
  - entity: sensor
    name: Expansion valve opening
    category: diagnostic
    icon: "mdi:valve"
    dps:
      - id: 116
        type: integer
        name: sensor

  - entity: sensor
    name: Compressor current
    category: diagnostic
    class: current
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: A

  # --- Defrost / refrigeration tuning (installer settings; hidden by
  #     default. Enable individually only if you know what you are doing) ---
  - entity: number
    name: Defrost interval
    category: config
    hidden: true
    dps:
      - id: 101
        type: integer
        name: value
        range:
          min: 9
          max: 180

  - entity: number
    name: Defrost duration
    category: config
    hidden: true
    dps:
      - id: 102
        type: integer
        name: value
        range:
          min: 1
          max: 30

  - entity: number
    name: Defrost exit temperature
    category: config
    hidden: true
    dps:
      - id: 103
        type: integer
        name: value
        range:
          min: 1
          max: 60

  - entity: number
    name: Defrost entry ambient temperature
    category: config
    hidden: true
    dps:
      - id: 104
        type: integer
        name: value
        range:
          min: 0
          max: 60

  - entity: number
    name: Defrost entry differential 1
    category: config
    hidden: true
    dps:
      - id: 105
        type: integer
        name: value
        range:
          min: 0
          max: 60

  - entity: number
    name: Defrost entry differential 2
    category: config
    hidden: true
    dps:
      - id: 106
        type: integer
        name: value
        range:
          min: 0
          max: 60

  - entity: number
    name: Superheat compensation
    category: config
    hidden: true
    dps:
      - id: 107
        type: integer
        name: value
        range:
          min: 0
          max: 150

  - entity: number
    name: Cooling discharge temperature setting
    category: config
    hidden: true
    dps:
      - id: 108
        type: integer
        name: value
        range:
          min: 0
          max: 150
