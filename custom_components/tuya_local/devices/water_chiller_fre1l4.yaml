            value: C
          - dps_val: f
            value: F
  - entity: sensor
    name: Expansion valve opening
    category: diagnostic
    dps:
      - id: 116
        type: integer
        name: sensor
  - entity: sensor
    name: Compressor current
    class: current
    category: diagnostic
    dps:
      - id: 117
        type: integer
        name: sensor
        class: measurement
        unit: A
  - entity: number
    name: Defrost interval
    category: config
    hidden: true
    dps:
