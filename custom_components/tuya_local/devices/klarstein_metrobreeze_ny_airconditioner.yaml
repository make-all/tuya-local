name: "Klarstein - MetroBreeze New York Smart 12K"
products:
  - id: kowb3ace57kiq0jb
    manufacturer: Klarstein
    model: YPF1-12
    name: "MetroBreeze New York Smart 12K"
entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: COOL
                value: cool
              - dps_val: FAN
                value: fan_only
              - dps_val: DRY
                value: dry
      - id: 2
        type: integer
        name: temperature
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: C
                range:
                  min: 16
                  max: 31
              - dps_val: F
                range:
                  min: 61
                  max: 88
      - id: 3
        type: integer
        name: current_temperature
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: "1"
            value: low
          - dps_val: "2"
            value: medium
          - dps_val: "3"
            value: high
      - id: 19
        type: string
        name: temperature_unit
      - id: 102
        type: boolean
        name: defrost
        optional: true
      - id: 103
        type: integer
        name: timer
        optional: true
      - id: 104
        type: boolean
        name: swing_mode
        mapping:
          - dps_val: true
            value: "on"
          - dps_val: false
            value: "off"
      - id: 105
        type: integer
        name: countdown
        optional: true
      - id: 106
        type: bitfield
        name: alarm
        optional: true
      - id: 110
        type: string
        name: model
        optional: true
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 19
        type: string
        name: option
        mapping:
          - dps_val: C
            value: celsius
          - dps_val: F
            value: fahrenheit
