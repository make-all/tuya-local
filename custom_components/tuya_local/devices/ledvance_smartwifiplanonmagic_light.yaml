name: Ceiling light
products:
  - id: keyj3w8cmutjmwk5
    manufacturer: LEDVANCE
    model: SMART+ WiFi Planon Magic 36W
entities:
  - entity: light
    icon: "mdi:ceiling-light"
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: white
            value: color_temp
          - dps_val: colour
            value: hs
          - dps_val: scene
            value: scene
          - dps_val: music
            value: music
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
      - id: 24
        type: hex
        name: rgbhsv
        optional: true
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 1000
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000

  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 26
        type: integer
        name: second
        range:
          min: 0
          max: 86400

  - entity: sensor
    name: Light pixel count
    icon: "mdi:led-strip-variant"
    category: diagnostic
    dps:
      - id: 47
        type: integer
        name: sensor
