---
name: Dual channel energy meter
products:
  - id: zcmq0kvd01bn6s1n
    manufacturer: WMDL
    model: (WMDL-2C) Smart Energy Meter WIFI Bidirection 2 Channel
entities:
  - entity: sensor
    name: Power Phase A
    class: power
    dps:
      - id: 19
        type: integer
        name: sensor
        unit: W
        class: measurement
        precision: 1
        force: true
        mapping:
          - scale: 10
  - entity: sensor
    name: Voltage Phase A
    class: voltage
    category: diagnostic
    dps:
      - id: 20
        type: integer
        name: sensor
        unit: V
        class: measurement
        precision: 1
        force: true
        mapping:
          - scale: 10
  - entity: sensor
    name: Current Phase A
    class: current
    category: diagnostic
    dps:
      - id: 18
        type: integer
        name: sensor
        unit: A
        class: measurement
        force: true
        mapping:
          - scale: 1000
  - entity: sensor
    name: Power Phase B
    class: power
    dps:
      - id: 113
        type: integer
        name: sensor
        unit: W
        class: measurement
        force: true
        precision: 1
        mapping:
          - scale: 10
  - entity: sensor
    name: Voltage Phase B
    class: voltage
    category: diagnostic
    hidden: true
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: V
        class: measurement
        precision: 1
        force: true
        mapping:
          - scale: 10
  - entity: sensor
    name: Current Phase B
    class: current
    category: diagnostic
    dps:
      - id: 112
        type: integer
        name: sensor
        unit: A
        class: measurement
        force: true
        mapping:
          - scale: 1000
  - entity: sensor
    name: Total Forward Energy
    class: energy
    dps:
      - id: 119
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: sensor
    name: Total Reverse Energy
    class: energy
    dps:
      - id: 121
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: number
    name: Limit Power Phase A
    category: config
    class: power
    dps:
      - id: 107
        type: integer
        name: value
        unit: W
        range:
          min: 0
          max: 150000
        mapping:
          - dps_val:
            invalid: true
          - scale: 1
            step: 100
  - entity: number
    name: Limit Power Phase B
    category: config
    class: power
    dps:
      - id: 110
        type: integer
        name: value
        unit: W
        range:
          min: 0
          max: 150000
        mapping:
          - dps_val:
            invalid: true
          - scale: 1
            step: 100
  - entity: sensor
    name: Forward Energy A
    class: energy
    icon: mdi:transmission-tower-import
    dps:
      - id: 17
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: sensor
    name: Reverse Energy A
    class: energy
    icon: mdi:transmission-tower-export
    dps:
      - id: 115
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: sensor
    name: Forward Energy B
    class: energy
    icon: mdi:transmission-tower-import
    dps:
      - id: 111
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: sensor
    name: Reverse Energy B
    class: energy
    icon: mdi:transmission-tower-export
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        precision: 2
        mapping:
          - scale: 100
  - entity: sensor
    name: Cur State A
    class: enum
    icon: mdi:swap-horizontal
    dps:
      - id: 105
        type: string
        name: sensor
        mapping:
          - dps_val: work_p
            value: importing
          - dps_val: work_n
            value: exporting
          - dps_val: close
            value: idle
          - dps_val: produce
            value: producing
          - default: true
            value: unknown
  - entity: sensor
    name: Cur State B
    class: enum
    icon: mdi:swap-horizontal
    dps:
      - id: 108
        type: string
        name: sensor
        mapping:
          - dps_val: work_p
            value: importing
          - dps_val: work_n
            value: exporting
          - dps_val: close
            value: idle
          - dps_val: produce
            value: producing
          - default: true
            value: unknown
