name: Energy monitor switch
products:
  - id: labfkgzm2ikdcpdp
    manufacturer: Aubess
    model: Smart Switch/EM
  - id: m4jtkjc43ltrilru
    model: T34 Smart Plug+
  - id: apwf3sfwz51xuvht
    manufacturer: Moes
    model: WM-104-M
entities:
  - entity: switch
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 24
        name: test_bit
        type: integer
        optional: true
      - id: 42
        name: random_time
        type: string
        optional: true
      - id: 43
        name: cycle_time
        type: string
        optional: true
      - id: 44
        name: switch_inching
        type: string
        optional: true
  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 9
        type: integer
        name: second
        range:
          min: 0
          max: 86399
  - entity: number
    translation_key: timer
    deprecated: time.timer  # 2026-01-20
    class: duration
    category: config
    dps:
      - id: 9
        name: value
        type: integer
        range:
          min: 0
          max: 86400
        mapping:
          - scale: 60
            step: 60
  - entity: select
    translation_key: initial_state
    category: config
    dps:
      - id: 38
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: "0"
            value: "off"
            available: numeric_values
          - dps_val: "1"
            value: "on"
            available: numeric_values
          - dps_val: "2"
            value: memory
            available: numeric_values
          - dps_val: "off"
            value: "off"
            available: word_values
          - dps_val: "on"
            value: "on"
            available: word_values
          - dps_val: "memory"
            value: memory
            available: word_values
      - id: 38
        type: string
        optional: true
        name: numeric_values
        mapping:
          - dps_val: "0"
            value: true
          - dps_val: "1"
            value: true
          - dps_val: "2"
            value: true
          - value: false
      - id: 38
        type: string
        optional: true
        name: word_values
        mapping:
          - dps_val: "0"
            value: false
          - dps_val: "1"
            value: false
          - dps_val: "2"
            value: false
          - value: true
  - entity: sensor
    name: Energy
    category: diagnostic
    hidden: true
    dps:
      - id: 20
        name: sensor
        type: integer
        optional: true
        class: measurement
        unit: Wh
  - entity: sensor
    class: current
    category: diagnostic
    dps:
      - id: 21
        name: sensor
        type: integer
        optional: true
        class: measurement
        force: true
        unit: mA
  - entity: sensor
    class: power
    category: diagnostic
    dps:
      - id: 22
        name: sensor
        type: integer
        optional: true
        class: measurement
        force: true
        unit: W
        mapping:
          - scale: 10
  - entity: sensor
    class: voltage
    category: diagnostic
    dps:
      - id: 23
        name: sensor
        type: integer
        optional: true
        force: true
        class: measurement
        unit: V
        mapping:
          - scale: 10
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 29
        type: bitfield
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 29
        type: bitfield
        optional: true
        name: fault_code
  - entity: select
    name: Switch type
    icon: "mdi:toggle-switch"
    category: config
    dps:
      - id: 47
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: sync
            value: Synchronized switch
          - dps_val: flip
            value: Toggle switch
          - dps_val: button
            value: Momentary button
      - id: 47
        type: string
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
