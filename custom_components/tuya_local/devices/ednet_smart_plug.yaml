name: Simple switch with timer
products:
  - id: A0F6MxOOAt2r3OoJ
    manufacturer: ednet
    model: Smart Plug
entities:
  - entity: switch
    dps:
      - id: 1
        name: switch
        type: boolean
  - entity: number
    category: config
    class: duration
    translation_key: timer
    dps:
      - id: 2
        type: integer
        name: value
        unit: s
        range:
          min: 0
          max: 86400
