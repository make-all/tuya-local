name: GoPool IG1 Variable Speed Pool Pump
products:
  - id: IG1-1515VS
    manufacturer: GoPool
    model: IG1 1.65HP Variable Speed
entities:
  - entity: switch
    icon: "mdi:water-pump"
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: binary_sensor
    name: Running
    class: running
    category: diagnostic
    dps:
      - id: 102
        type: boolean
        name: sensor

  - entity: number
    name: Set speed
    icon: "mdi:speedometer"
    dps:
      - id: 103
        type: integer
        name: value
        unit: rpm
        range:
          min: 600
          max: 3600
        mapping:
          - step: 50

  - entity: number
    name: Mode 1 start-up time
    category: config
    class: duration
    icon: "mdi:timer-play"
    dps:
