name: Ceiling fan
products:
  - id: ftqsaibnb3insvp9
    manufacturer: Ovlaim
    model: "809"
entities:
  - entity: light
    dps:
      - id: 20
        name: switch
        type: boolean
      - id: 21
        name: work_mode
        type: string
        optional: true
      - id: 22
        name: brightness
        type: integer
        optional: true
        range:
          min: 10
          max: 1000
      - id: 23
        name: color_temp
        type: integer
        optional: true
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 7000
  - entity: fan
    dps:
      - id: 60
        name: switch
        type: boolean
      - id: 61
        name: preset_mode
        type: string
        optional: true
        mapping:
          - dps_val: fresh
            value: fresh
          - dps_val: nature
            value: nature
          - dps_val: sleep
            value: sleep
      - id: 62
        name: speed
        type: integer
        optional: true
        range:
          min: 1
          max: 6
      - id: 63
        name: direction
        type: string
        optional: true
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 64
        type: integer
        optional: true
        name: sensor
        unit: min
