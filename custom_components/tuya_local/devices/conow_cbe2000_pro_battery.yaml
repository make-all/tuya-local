name: Battery storage
products:
  - id: c4ilzd7aybycece9
    manufacturer: Conow
    model: CBE2000 Pro
entities:
  - entity: sensor
    category: diagnostic
    name: Battery capacity
    dps:
      - id: 2
        type: integer
        name: sensor
        unit: kWh
        mapping:
          - scale: 1000
  - entity: binary_sensor
    name: Fault
    category: diagnostic
    class: problem
    dps:
      - id: 11
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 10
        type: string
        name: error_code
      - id: 11
        type: bitfield
        name: fault_code
      - id: 11
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: No Fault
          - dps_val: 1
            value: pack1_warning
          - dps_val: 2
            value: pack2_warning
          - dps_val: 4
            value: pack3_warning
          - dps_val: 8
            value: pack4_warning
          - dps_val: 16
            value: pack5_warning
          - dps_val: 32
            value: pack6_warning
          - dps_val: 64
            value: infrared_module_failure
          - dps_val: 128
            value: led_strip_comm_fault
          - dps_val: 256
            value: master_slave_comm_fault
          - dps_val: 512
            value: panel_comm_fault
          - dps_val: 1024
            value: inverter_comm_fault
          - dps_val: 2048
            value: inverter_failure
          - dps_val: 4096
            value: wifi_module_comm_fault
          - dps_val: 8192
            value: pv1_fault
          - dps_val: 16384
            value: pv2_fault
          - dps_val: 32768
            value: pv3_fault
          - dps_val: 65536
            value: pv4_fault
          - dps_val: 131072
            value: grid_failure
          - dps_val: 262144
            value: inverter_output_fault
          - dps_val: 524288
            value: inverter_other_fault
          - dps_val: 1048576
            value: meter_comm_failure
          - dps_val: 2097152
            value: system_temp_diff_protection
      - id: 1
        type: string
        name: serial_number
  - entity: sensor
    name: Connection state
    category: diagnostic
    class: enum
    hidden: true
    dps:
      - id: 12
        type: string
        name: sensor
        mapping:
          - dps_val: paired_connected
            value: Paired and connected
          - dps_val: unpaired_uncon
            value: Unpaired and not connected
          - dps_val: paired_uncon
            value: Paired and not connected
  - entity: sensor
    class: signal_strength
    category: diagnostic
    hidden: true
    dps:
      - id: 13
        type: integer
