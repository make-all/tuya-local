    name: Error Code
    category: diagnostic
    dps:
      - id: 10
        type: string
        name: sensor
  - entity: sensor
    name: Fault
    category: diagnostic
    class: enum
    dps:
      - id: 11
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: No Fault
          - dps_val: 1
            value: pack1_warning
          - dps_val: 2
            value: pack2_warning
          - dps_val: 4
            value: pack3_warning
          - dps_val: 8
            value: pack4_warning
          - dps_val: 16
            value: pack5_warning
          - dps_val: 32
            value: pack6_warning
          - dps_val: 64
            value: infrared_module_failure
          - dps_val: 128
            value: led_strip_comm_fault
          - dps_val: 256
            value: master_slave_comm_fault
          - dps_val: 512
            value: panel_comm_fault
          - dps_val: 1024
            value: inverter_comm_fault
          - dps_val: 2048
            value: inverter_failure
          - dps_val: 4096
            value: wifi_module_comm_fault
          - dps_val: 8192
            value: pv1_fault
          - dps_val: 16384
            value: pv2_fault
          - dps_val: 32768
            value: pv3_fault
          - dps_val: 65536
            value: pv4_fault
          - dps_val: 131072
            value: grid_failure
          - dps_val: 262144
            value: inverter_output_fault
          - dps_val: 524288
            value: inverter_other_fault
          - dps_val: 1048576
            value: meter_comm_failure
          - dps_val: 2097152
            value: system_temp_diff_protection
  - entity: sensor
    name: Connection State
    category: diagnostic
    class: enum
    hidden: true
    dps:
      - id: 12
        type: string
        name: sensor
        mapping:
          - dps_val: paired_connected
            value: Paired and connected
          - dps_val: unpaired_uncon
            value: Unpaired and not connected
          - dps_val: paired_uncon
            value: Paired and not connected
  - entity: sensor
