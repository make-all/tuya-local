name: Battery storage
products:
  - id: c4ilzd7aybycece9
    manufacturer: Conow
    model: CBE2000 Pro
entities:
  - entity: sensor
    name: Serial Number
    category: diagnostic
    dps:
      - id: 1
        type: string
        name: sensor
  - entity: sensor
    category: diagnostic
    name: Battery Capacity
    dps:
      - id: 2
        type: integer
        name: sensor
        unit: kWh
        mapping:
          - scale: 1000
