name: Smart plug
# products:
#   - id: UNKNOWN
#     manufacturer: CE Smart Home
#     model: Litesun
entities:
  - entity: switch
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 7
        type: integer
        optional: true
        name: test_result
  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 2
        type: integer
        name: second
        range:
          min: 0
          max: 86399
  - entity: sensor
    name: Add electricity
    category: diagnostic
    hidden: true
    dps:
      - id: 3
        type: integer
        optional: true
        persist: false
        name: sensor
        unit: kWh
        mapping:
          - scale: 1000
      - id: 11
        type: integer
        optional: true
        name: calibration
  - entity: sensor
    class: current
    dps:
      - id: 4
        type: integer
        name: sensor
        unit: mA
        class: measurement
      - id: 9
        type: integer
        optional: true
        name: calibration
  - entity: sensor
    class: power
    dps:
      - id: 5
        type: integer
        name: sensor
        unit: W
        class: measurement
        mapping:
          - scale: 10
      - id: 10
        type: integer
        optional: true
        name: calibration
  - entity: sensor
    class: voltage
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: V
        class: measurement
        mapping:
          - scale: 10
      - id: 8
        type: integer
        optional: true
        name: calibration
