name: Pool Heat pump
products:
  - id: cjfj60binlzftdqw
    manufacturer: Aquaviva
    model: Superior Split
entities:
  - entity: climate
    translation_key: pool_heatpump
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: heat
                value: "Smart Heating"
              - dps_val: h_powerful
                value: "Powerful Heating"
              - dps_val: h_silent
                value: "Silent Heating"
              - dps_val: cool
                value: "Smart cooling"
              - dps_val: c_powerful
                value: "Powerful cooling"
      - id: 2
        type: integer
        name: temperature
        range:
          min: 15
          max: 40
        unit: C
      - id: 4
        type: string
        name: mode
        hidden: true
  - entity: sensor
    class: temperature
    dps:
      - id: 3
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 9
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 9
        type: bitfield
        name: fault_code
