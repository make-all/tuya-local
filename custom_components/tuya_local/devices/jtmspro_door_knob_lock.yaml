name: Door Knob Lock
products:
  - id: bf7920otpjfk9cqr
    manufacturer: jtmspro
    model: LA-T01
entities:
  - entity: lock
    dps:
      # [Report unlocking record] is used for the device to report the record
      # of fingerprint unlocking. This dp is only enabled when the smart lock
      # product has a fingerprint recognition function in the hardware.
      - id: 12
        type: integer
        name: unlock_fingerprint
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # [Report unlocking record] is used for the device to report the record
      # of unlocking with ordinary password. This dp is enabled only when the
      # hardware of this smart lock product has a password button that can be
      # used to unlock the door with a password.
      - id: 13
        name: unlock_password
        type: integer
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # [Report unlocking record] is used for the device to report the door
      # card unlocking record. This dp is enabled only when the smart lock
      # product has a card swiping function in the hardware and can report the
      # card swiping record.
      - id: 15
        name: unlock_card
        type: integer
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # [Report unlocking record] If the device supports detection of door
      # opening from the inside, it is used for the device to report the record
      # of door opening from the inside. This dp is enabled only when the
      # hardware of this smart lock product can detect and identify unlocking
      # from the inside and can report the data.
      - id: 18
        name: open_inside
        type: boolean
        optional: true
      # [Report unlocking record] is used for the device to report the door
      # opening record generated by the mobile phone app Bluetooth unlocking.
      # Generally, all Bluetooth locks support this function.
      - id: 19
        name: unlock_ble
        type: integer
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # lock_motor_state: reports motor / bolt position (not the same as older
      # dp 46 "lock" command on some Hornbill models). Inverted for HA locked.
      - id: 47
        type: boolean
        optional: true
        name: lock_state
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
      # unlock_temporary (cloud) -> unlock_temp_pwd for HA lock integration.
      - id: 55
        type: integer
        name: unlock_temp_pwd
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # remote_no_dp_key (raw): 8-digit remote lock/unlock protocol (see lock.py).
      - id: 61
        type: base64
        optional: true
        persist: false
        sensitive: true
        name: code_unlock
      # unlock_phone_remote -> unlock_app
      - id: 62
        type: integer
        name: unlock_app
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      # unlock_voice_remote -> unlock_voice
      - id: 63
        type: integer
        name: unlock_voice
        optional: true
        persist: false
        range:
          min: 0
          max: 999
      - id: 67
        type: base64
        name: unlock_offline_pwd
        optional: true
        persist: false
        sensitive: true
      - id: 70
        type: base64
        name: check_code_set
        optional: true
        persist: false
        sensitive: true
      - id: 71
        type: base64
        name: ble_unlock_check
        optional: true
        persist: false
        sensitive: true
      - id: 73
        type: base64
        name: remote_pd_setkey_check
        optional: true
        persist: false
        sensitive: true
  - entity: event
    name: Alert
    dps:
      # [Alarm record] When an alarm occurs locally, it is used to report the
      # alarm record of the device. Corresponding value description:
      # 0=fingerprint trial error alarm
      # 1=password trial error alarm
      # 2=card trial error alarm
      # 3=face trial error alarm
      # 4=fake lock (lock tongue stuck)
      # 5=high temperature alarm
      # 6=timeout failure to close the door
      # 7=electronic lock tongue not popped up
      # 8=anti-pry alarm, 9=key insertion
      # 10=low power alarm,
      # 11=battery exhaustion alarm
      # 12=vibration alarm
      # 13=arming alarm
      # If the device only uses a few items in the alarm dp, the redundant
      # content does not need to be deleted. If deleted, the serial number of
      # the MCU needs to be adjusted when reporting. It is recommended that
      # developers do not change the enumeration value in the alarm. In special
      # circumstances, please add, delete, and configure multiple languages
      # under the guidance of pm.
      - id: 21
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: wrong_finger
            value: wrong_finger
          - dps_val: wrong_password
            value: wrong_password
          - dps_val: wrong_card
            value: wrong_card
          - dps_val: wrong_face
            value: wrong_face
          - dps_val: tongue_bad
            value: tongue_bad
          - dps_val: too_hot
            value: too_hot
          - dps_val: unclosed_time
            value: unclosed_time
          - dps_val: tongue_not_out
            value: tongue_not_out
          - dps_val: pry
            value: pry
          - dps_val: key_in
            value: key_in
          - dps_val: low_battery
            value: low_battery
          - dps_val: power_off
            value: power_off
          - dps_val: shock
            value: shock
          - dps_val: defense
            value: defense
          - dps_val: wrong_unlock
            value: wrong_unlock
  # residual_electricity (dp 8)
  - entity: sensor
    class: battery
    dps:
      - id: 8
        type: integer
        name: sensor
        unit: "%"
        optional: true
  # beep_volume (dp 31)
  - entity: select
    name: Beep volume
    category: config
    dps:
      - id: 31
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: mute
            value: Mute
          - dps_val: low
            value: Low
          - dps_val: normal
            value: Normal
          - dps_val: high
            value: High
  # reverse_lock (dp 32)
  - entity: switch
    name: Reverse lock
    category: config
    icon: "mdi:lock-outline"
    dps:
      - id: 32
        type: boolean
        name: switch
        optional: true
  # [Automatic Lock] is used to set the switch of the automatic locking
  # function. Through this dp, you can set "Enable automatic locking" and "No
  # automatic locking", that is, the device will not automatically lock, and it
  # can also be used as a normally open mode. Only when the door lock hardware
  # supports this setting, enable this dp and dp36, "Automatic Lock Delay" can
  # be used together to achieve "Automatic Lock after Unlocking xx Seconds" to
  # set the waiting time for automatic locking after unlocking.
  - entity: switch
    name: Automatic lock
    category: config
    icon: "mdi:lock-reset"
    dps:
      - id: 33
        type: boolean
        name: switch
        optional: true
  # closed_opened (dp 40)
  - entity: sensor
    category: diagnostic
    class: enum
    name: Door position
    dps:
      - id: 40
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: unknown
            value: unknown
          - dps_val: open
            value: open
          - dps_val: closed
            value: closed
  # manual_lock (dp 46)
  - entity: binary_sensor
    name: Manual lock
    class: lock
    category: diagnostic
    dps:
      - id: 46
        type: boolean
        name: sensor
        optional: true
  # arming_switch (dp 58)
  - entity: switch
    name: Arming
    category: config
    icon: "mdi:shield-home"
    dps:
      - id: 58
        type: boolean
        name: switch
        optional: true
  # special_function (dp 68)
  - entity: select
    name: Special function
    category: config
    icon: "mdi:tune-variant"
    dps:
      - id: 68
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: function1
            value: function1
  # auto_lock_time (dp 36)
  - entity: number
    name: Automatic lock delay
    icon: "mdi:lock-clock"
    category: config
    dps:
      - id: 36
        type: integer
        name: value
        optional: true
        unit: s
        range:
          min: 1
          max: 1800
  - entity: text
    name: New credential
    category: config
    icon: "mdi:card-plus"
    hidden: true
    dps:
      # [Add unlocking method] After the device is online, add unlocking
      # methods. Support adding fingerprint, password, card and face unlocking
      # methods; support administrator tagging.
      - id: 1
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Delete credential
    category: config
    icon: "mdi:card-minus"
    hidden: true
    dps:
      # [Delete unlocking method] After the device is online, delete the
      # unlocking method. Supports deleting fingerprint, password, card and
      # face unlocking methods. This dp appears in pairs with the added dp.
      - id: 2
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Modify credential
    category: config
    icon: "mdi:pencil-lock"
    hidden: true
    dps:
      # [Modify unlocking method] After the device is online, you can modify
      # the name of the unlocking method and the content of the password.
      - id: 3
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: New temp password
    category: config
    icon: "mdi:lock-open-plus"
    hidden: true
    dps:
      # [Online Temporary Password] is used to add an online temporary
      # password, and supports setting time periods and recurring time limits.
      - id: 51
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Delete temp password
    category: config
    icon: "mdi:lock-open-minus"
    hidden: true
    dps:
      # [Online temporary password] is used to delete the online temporary
      # password.
      - id: 52
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Modify temp password
    category: config
    icon: "mdi:pencil-lock"
    hidden: true
    dps:
      # [Online temporary password] is used to modify the password content and
      # corresponding validity period of the online temporary password.
      - id: 53
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Sync credentials
    category: config
    icon: "mdi:lock-reset"
    hidden: true
    dps:
      # [Synchronous unlocking method] is used to synchronize all unlocking
      # methods on the local device with the mobile phone. It is strongly
      # recommended to enable this function.
      - id: 54
        type: base64
        optional: true
        sensitive: true
        name: value
  - entity: text
    name: Offline password timestamp
    category: config
    icon: "mdi:clock-digital"
    hidden: true
    dps:
      # [Offline Password] is used to synchronize the timestamp between the
      # cloud and the device. If it is not selected or not synchronized, the
      # offline password will not be available.
      - id: 64
        type: string
        optional: true
        name: value
  - entity: sensor
    name: Used offline password
    category: diagnostic
    hidden: true
    dps:
      # [Offline password clear] When a single offline password is cleared
      # locally on the device, the clearing operation record is reported.
      - id: 65
        type: base64
        optional: true
        name: sensor
  - entity: sensor
    name: Cleared offline passwords
    category: diagnostic
    hidden: true
    dps:
      # [Offline password clear] When all offline passwords are cleared locally
      # on the device, the clearing operation record is reported.
      - id: 66
        type: base64
        optional: true
        sensitive: true
        name: sensor
