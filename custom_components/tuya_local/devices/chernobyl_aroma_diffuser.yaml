name: Aroma diffuser
products:
  - id: rfautxbsykmgxthv
    model: Chernobyl
    manufacturer: HOM
entities:

  - entity: switch
    name: Power
    dps:
      - id: 1
        name: switch
        type: boolean

  - entity: fan
    translation_key: aroma_diffuser
    dps:
      - id: 2
        type: boolean
        name: switch
      - id: 3
        type: string
        name: preset_mode
        mapping:
          - dps_val: middle
            value: low
          - dps_val: large
            value: high
          - dps_val: small
            value: intermittent

  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 4
        type: string
        name: option
        mapping:
          - dps_val: "cancel"
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"

  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 5
        type: integer
        name: sensor
        unit: min

  - entity: switch
    translation_key: sound
    category: config
    dps:
      - id: 6
        type: boolean
        name: switch

  - entity: light
    translation_key: nightlight
    dps:
      - id: 7
        name: switch
        type: boolean
      - id: 8
        name: brightness
        type: integer
        range:
          min: 10
          max: 1000
      - id: 9
        name: color_mode
        type: string
        mapping:
          - dps_val: white
            value: white
          - dps_val: colour
            value: hs
          - dps_val: colourful1
            value: Cycle
      - id: 10
        name: rgbhsv
        type: hex
        format:
          - name: r
            bytes: 1
          - name: g
            bytes: 1
          - name: b
            bytes: 1
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 1
            range:
              min: 0
              max: 255
          - name: v
            bytes: 1
            range:
              min: 0
              max: 255

  - entity: binary_sensor
    translation_key: tank_empty
    category: diagnostic
    dps:
      - id: 11
        type: bitfield
        name: sensor
        optional: true
        mapping:
          - dps_val: 1
            value: true
          - value: false
      - id: 11
        type: bitfield
        name: fault_code
