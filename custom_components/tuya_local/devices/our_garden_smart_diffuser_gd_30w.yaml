name: Aroma diffuser
products:
  - id: uwP5ueRSh5k5Ccuw
    manufacturer: Our Garden
    model: GD-30W
entities:
  - entity: fan
    translation_key: aroma_diffuser
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 103
        type: string
        name: preset_mode
        mapping:
          - dps_val: "small"
            value: small
          - dps_val: "big"
            value: large

  - entity: light
    category: config
    dps:
      - id: 11
        type: boolean
        name: switch
      - id: 111
        type: integer
        name: brightness
        range:
          min: 0
          max: 255
      - id: 109
        type: string
        name: color_mode
        mapping:
          - dps_val: "white"
            value: white
          - dps_val: "colour"
            value: hs
          - dps_val: "colourful1"
            value: effect
      - id: 108
        name: rgbhsv
        type: hex
        format:
          - name: r
            bytes: 1
          - name: g
            bytes: 1
          - name: b
            bytes: 1
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 1
            range:
              min: 0
              max: 255
          - name: v
            bytes: 1
            range:
              min: 0
              max: 255
      - id: 110
        type: string
        name: effect
        mapping:
          - dps_val: "2"
            value: "off"
          - dps_val: "1"
            value: Gradient
          - dps_val: "3"
            value: Night Light
