            value: "8h"
          - dps_val: "9h"
            value: "9h"
          - dps_val: "10h"
            value: "10h"
          - dps_val: "11h"
            value: "11h"
          - dps_val: "12h"
            value: "12h"
  - entity: select
    name: Hot dry timer
    translation_key: timer
    category: config
    dps:
      - id: 10
        type: string
