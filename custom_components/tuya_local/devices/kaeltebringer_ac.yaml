name: Kältebringer Split AC (R290)
products:
  - id: 64z8cyptsfd23tas
    manufacturer: Kältebringer
    model: KBO Series (Split R290)

entities:
  - entity: climate
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: "cold"
                value: cool
              - dps_val: "hot"
                value: heat
              - dps_val: "auto"
                value: auto
              - dps_val: "wet"
                value: dry
              - dps_val: "wind"
                value: fan_only

      - id: 2
        name: temperature
        type: integer
        range:
          min: 16
          max: 31
        unit: C

      - id: 3
        name: current_temperature
        type: integer
        unit: C

      - id: 4
        name: mode
        type: string
        hidden: true

      - id: 5
        name: fan_mode
        type: string
        mapping:
          - dps_val: "1"
            value: auto
          - dps_val: "2"
            value: turbo
          - dps_val: "3"
            value: low
          - dps_val: "4"
            value: medium
          - dps_val: "5"
            value: high

  - entity: switch
    name: Eco mode
    icon: "mdi:leaf"
    category: config
    dps:
      - id: 8
        name: switch
        type: boolean

  - entity: switch
    name: Sleep mode
    icon: "mdi:sleep"
    category: config
    dps:
      - id: 101
        name: switch
        type: boolean

  - entity: switch
    name: Display
    icon: "mdi:led-on"
    category: config
    dps:
      - id: 104
        name: switch
        type: boolean

  - entity: switch
    name: Vertical swing
    icon: "mdi:arrow-up-down"
    category: config
    dps:
      - id: 106
        name: switch
        type: boolean

  - entity: switch
    name: Horizontal swing
    icon: "mdi:arrow-left-right"
    category: config
    dps:
      - id: 107
        name: switch
        type: boolean
