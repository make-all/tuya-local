name: Ceiling fan
products:
  - id: 8r39c874v4r9j5yc
    manufacturer: Sofucor
    model: KBS-52144
entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        optional: true
        name: work_mode
      - id: 22
        type: integer
        name: brightness
        range:
          min: 1
          max: 100
        mapping:
          - step: 10
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 3000
              max: 5000
            step: 500

  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 60
        type: boolean
        name: switch
      - id: 61
        type: string
        name: preset_mode
        mapping:
          - dps_val: Natural
            value: nature
          - dps_val: WakeUp
            value: fresh
      - id: 62
        type: integer
        optional: true
        name: speed
        range:
          min: 1
          max: 6
      - id: 63
        type: string
        optional: true
        name: direction
  - entity: number
    name: Fan timer
    translation_key: timer
    category: config
    icon: "mdi:fan-clock"
    dps:
      - id: 64
        type: integer
        optional: true
        name: value
        unit: min
        range:
          min: 0
          max: 540
  - entity: switch
    category: config
    translation_key: sound
    icon: "mdi:volume-high"
    dps:
      - id: 66
        type: boolean
        name: switch
        optional: true
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 67
        type: bitfield
        name: sensor
        optional: true
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 67
        type: bitfield
        name: fault_code
        optional: true
