name: Ceiling fan with light
products:
  - id: k8j78n65zeu3orz7
    manufacturer: Eglo
    model: Surf with Light
entities:
  - entity: fan
    name: Ceiling Fan
    dps:
      - id: 60
        type: boolean
        name: switch
      - id: 61
        type: string
        name: preset_mode
        mapping:
          - dps_val: fresh
            value: Normal
          - dps_val: nature
            value: Natural
      - id: 62
        type: integer
        name: speed
        mapping:
          - dps_val: 0
            value: 0
          - dps_val: 1
            value: 20
          - dps_val: 2
            value: 40
          - dps_val: 3
            value: 60
          - dps_val: 4
            value: 80
          - dps_val: 5
            value: 100
          - dps_val: -1
            value: 10
      - id: 63
        type: string
        name: direction
  - entity: light
    name: Fan Light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 3000
              max: 5000
            step: 500
  - entity: number
    name: Light Timer
    icon: mdi:timer-outline
    class: duration
    category: config
    dps:
      - id: 26
        type: integer
        optional: true
        name: value
        unit: min
        precision: 0
        range:
          min: 0
          max: 86400
        mapping:
          - scale: 60
            step: 60
  - entity: number
    name: Fan Timer
    icon: "mdi:fan-clock"
    class: duration
    category: config
    dps:
      - id: 64
        type: integer
        name: value
        range:
          min: 0
          max: 480
        unit: min
