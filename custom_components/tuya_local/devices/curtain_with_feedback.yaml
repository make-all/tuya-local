name: Curtain module
products:
  - id: uoa3mayicscacseb
    model: QS-WIFI-S10-C04
entities:
  - entity: cover
    class: curtain
    dps:
      - id: 1
        name: control
        type: string
        mapping:
          - dps_val: open
            value: open
          - dps_val: close
            value: close
          - dps_val: stop
            value: stop
      - id: 2
        name: position
        type: integer
        unit: "%"
        range:
          min: 0
          max: 100
        mapping:
          - step: 10
      - id: 2
        name: current_position
        type: integer
  - entity: select
    name: Motor reverse mode
    category: config
    icon: "mdi:sign-direction"
    dps:
      - id: 8
        name: option
        type: string
        mapping:
          - dps_val: forward
            value: Forward
          - dps_val: back
            value: Back
  - entity: number
    name: Travel time
    category: config
    class: duration
    icon: "mdi:timer"
    dps:
      - id: 10
        name: value
        type: integer
        unit: s
        range:
          min: 1
          max: 60
  - entity: button
    name: Calibration start
    category: config
    hidden: true
    dps:
      - id: 3
        type: string
        optional: true
        name: button
        mapping:
          - dps_val: start
            value: true
  - entity: button
    name: Calibration end
    category: config
    hidden: true
    dps:
      - id: 3
        type: string
        optional: true
        name: button
        mapping:
          - dps_val: end
            value: true
  - entity: select
    name: Switch type
    icon: "mdi:toggle-switch"
    category: config
    hidden: unavailable
    dps:
      - id: 12
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: rock
            value: Rocker switch
          - dps_val: push
            value: Push button
      - id: 12
        type: string
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
