name: Pedestal fan
products:
  - id: smrux6jwhnrmbbyl
    manufacturer: Ausclimate
    model: EcoSmart Pedestal Air Circulator
    model_id: ACAC300
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: integer
        name: speed
        range:
          min: 1
          max: 8
      - id: 5
        type: boolean
        name: oscillate
      - id: 102
        type: string
        name: preset_mode
        mapping:
          - dps_val: sleep
            value: sleep
          - dps_val: natural
            value: nature
          - dps_val: normal
            value: normal
  - entity: switch
    name: Vertical oscillation
    icon: "mdi:pan-vertical"
    category: config
    dps:
      - id: 4
        type: boolean
        name: switch
  - entity: select
    name: "On timer"
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "4h"
            value: "4h"
  - entity: select
    translation_key: timer
    name: "Off timer"
    category: config
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1H"
            value: "1h"
          - dps_val: "2H"
            value: "2h"
          - dps_val: "4H"
            value: "4h"
  - entity: switch
    name: Turbo
    dps:
      - id: 104
        type: boolean
        name: switch
