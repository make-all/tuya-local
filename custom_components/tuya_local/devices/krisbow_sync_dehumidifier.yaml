name: Krisbow Sync Dehumidifier 36W
products:
  - id: ymfznwejbhviuhjk
    manufacturer: Krisbow
    model: Sync Dehumidifier 36W
entities:
  - entity: humidifier
    class: dehumidifier
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: string
        name: humidity
        mapping:
          - dps_val: "30"
            value: 30
          - dps_val: "40"
            value: 40
          - dps_val: "50"
            value: 50
      - id: 6
        type: integer
        name: current_humidity

  - entity: sensor
    class: temperature
    dps:
      - id: 7
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: humidity
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: "%"

  - entity: switch
    translation_key: sleep
    dps:
      - id: 14
        type: boolean
        name: switch

  - entity: select
    name: Water Tank Reminder
    category: config
    dps:
      - id: 25
        type: string
        name: option
        mapping:
          - dps_val: "on"
            value: "on"
          - dps_val: "off"
            value: "off"

  - entity: light
    name: Indicator Light
    dps:
      - id: 29
        type: boolean
        name: switch
      - id: 31
        type: string
        name: effect
        mapping:
          - dps_val: "light_red"
            value: Red
          - dps_val: "light_green"
            value: Green
          - dps_val: "light_blue"
            value: Blue
          - dps_val: "light_pink"
            value: Pink
          - dps_val: "light_white"
            value: White
          - dps_val: "light_yellow"
            value: Yellow
          - dps_val: "light_purple"
            value: Purple
          - dps_val: "light_warm_yellow"
            value: Warm Yellow
          - dps_val: "light_orange"
            value: Orange
          - dps_val: "colorful"
            value: Colorful
  - entity: select
    translation_key: timer
    icon: "mdi:timer-outline"
    category: config
    dps:
      - id: 17
        type: string
        name: option
        mapping:
          - dps_val: "cancel"
            value: "Off"
          - dps_val: "1h"
            value: "1 Hour"
          - dps_val: "2h"
            value: "2 Hours"
          - dps_val: "3h"
            value: "3 Hours"
