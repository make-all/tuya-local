name: Yamazen Living Fan
products:
  - id: yjxegyhiawfedgah
    manufacturer: Yamazen
    model: AHX-ALD30
entities:
  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: normal
          - dps_val: nature
            value: nature
          - dps_val: sleep
            value: sleep
      - id: 3
        type: string
        name: speed
        mapping:
          - dps_val: "1"
            value: 13
          - dps_val: "2"
            value: 25
          - dps_val: "3"
            value: 37
          - dps_val: "4"
            value: 50
          - dps_val: "5"
            value: 63
          - dps_val: "6"
            value: 75
          - dps_val: "7"
            value: 87
          - dps_val: "8"
            value: 100
      - id: 4
        type: string
        name: oscillate
        mapping:
          # --- Write to Device: Map HA boolean to DPS value (Angle) ---
          # Uncomment the lines below to enable the toggle function.
          # This example sends "120" (Can be changed to 30/60/90 as desired).
          #   - value: true
          #     dps_val: "120"
          #   - value: false
          #     dps_val: "OFF"

          # --- Read from Device: Map DPS to HA boolean (oscillating: True) ---
          - dps_val: "OFF"
            value: false
          - dps_val: "120"
            value: true
          - dps_val: "30"
            value: true
          - dps_val: "60"
            value: true
          - dps_val: "90"
            value: true
  - entity: number
    translation_key: timer
    class: duration
    category: config
    dps:
      - id: 6
        type: integer
        name: value
        unit: h
        range:
          min: 0
          max: 8
