name: Temperature and humidity sensor
products:
  - id: xlk3mtpjo1zkmdvh
    manufacturer: Zitech
    model: TH08
  - id: ykdqgxukxt7rjyft
    manufacturer: Zitech
    model: TH09B
  - id: scyh3efocxxfgryg
    manufacturer: Zitech
    model: TH08BCBU
  - id: idypkbokardxt823
    manufacturer: Zitech
    model: TH08CBU
entities:
  - entity: sensor
    class: temperature
    dps:
      - id: 1
        name: sensor
        type: integer
        unit: C
        mapping:
          - scale: 10
        class: measurement
  - entity: sensor
    class: humidity
    dps:
      - id: 2
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    class: battery
    category: diagnostic
    dps:
      - id: 3
        type: integer
        name: sensor
        unit: "%"
        mapping:
          - dps_val: low
            value: 20
          - dps_val: middle
            value: 50
          - dps_val: high
            value: 80
  - entity: sensor
    name: Power state
    class: enum
    category: diagnostic
    deprecated: sensor_battery  # 2026-06-23
    dps:
      - id: 3
        type: string
        name: sensor
        mapping:
          - dps_val: low
            value: low
          - dps_val: middle
            value: middle
          - dps_val: high
            value: high
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 9
        name: option
        type: string
        mapping:
          - dps_val: "f"
            value: fahrenheit
          - dps_val: "c"
            value: celsius
  - entity: number
    translation_key: temperature_calibration
    category: config
    class: temperature_delta
    hidden: unavailable
    dps:
      - id: 23
        type: integer
        optional: true
        name: value
        unit: C
        range:
          min: -20
          max: 20
        mapping:
          - scale: 10
      - id: 23
        type: integer
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
  - entity: number
    name: Humidity calibration
    category: config
    hidden: unavailable
    icon: "mdi:water-check"
    dps:
      - id: 24
        type: integer
        optional: true
        name: value
        unit: "%"
        range:
          min: -10
          max: 10
      - id: 24
        type: integer
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
