name: Fresh air heat pump

#     manufacturer: Airwoods
#     model: AV-HTPF35 / AV-HTPF60 / AV-HTPF90

entities:
  - entity: climate
    name: Fresh air heat pump
    dps:
      - id: 101
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: "3"
                value: auto
              - dps_val: "5"
                value: cool
              - dps_val: "6"
                value: heat
              - dps_val: "8"
                value: dry
              - dps_val: "10"
                value: fan_only

      - id: 115
        type: string
        name: mode
        hidden: true

      - id: 106
        type: integer
        name: temperature
        unit: C
        range:
          min: 10
          max: 40
        mapping:
          - step: 1

      - id: 130
        type: integer
        name: current_temperature
        unit: C

  - entity: number
    name: Supply air speed
    icon: "mdi:fan-chevron-up"
    dps:
      - id: 102
        type: string
        name: value
        mapping:
          - dps_val: "0"
            value: 1
          - dps_val: "1"
            value: 2
          - dps_val: "2"
            value: 3
          - dps_val: "3"
            value: 4
          - dps_val: "4"
            value: 5
          - dps_val: "5"
            value: 6
          - dps_val: "6"
            value: 7
          - dps_val: "7"
            value: 8
          - dps_val: "8"
            value: 9
          - dps_val: "9"
            value: 10
        range:
          min: 1
          max: 10

  - entity: number
    name: Exhaust air speed
    icon: "mdi:fan-chevron-down"
    dps:
      - id: 103
        type: string
        name: value
        mapping:
          - dps_val: "0"
            value: 1
          - dps_val: "1"
            value: 2
          - dps_val: "2"
            value: 3
          - dps_val: "3"
            value: 4
          - dps_val: "4"
            value: 5
          - dps_val: "5"
            value: 6
          - dps_val: "6"
            value: 7
          - dps_val: "7"
            value: 8
          - dps_val: "8"
            value: 9
          - dps_val: "9"
            value: 10
        range:
          min: 1
          max: 10

  - entity: number
    name: Bypass lower limit temperature
    category: config
    icon: "mdi:valve"
    dps:
      - id: 107
        type: integer
        name: value
        unit: C
        range:
          min: 5
          max: 30
        mapping:
          - step: 1

  - entity: number
    name: Bypass temperature range
    category: config
    icon: "mdi:delta"
    dps:
      - id: 108
        type: integer
        name: value
        unit: C
        range:
          min: 2
          max: 15
        mapping:
          - step: 1

  - entity: sensor
    name: Indoor temperature
    class: temperature
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Outdoor temperature
    class: temperature
    dps:
      - id: 118
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Supply air temperature
    class: temperature
    dps:
      - id: 130
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Exhaust air temperature
    class: temperature
    dps:
      - id: 131
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    name: Stop code
    category: diagnostic
    icon: "mdi:alert-octagon-outline"
    dps:
      - id: 109
        type: integer
        name: sensor

  - entity: binary_sensor
    name: Alarm
    class: problem
    category: diagnostic
    dps:
      - id: 119
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 119
        type: bitfield
        name: fault_code

  - entity: binary_sensor
    name: Filter clean
    class: problem
    category: diagnostic
    dps:
      - id: 123
        type: boolean
        name: sensor

  - entity: binary_sensor
    name: Fan switch
    category: diagnostic
    icon: "mdi:fan"
    dps:
      - id: 125
        type: boolean
        name: sensor

  - entity: sensor
    name: Expansion valve pulse
    category: diagnostic
    icon: "mdi:valve"
    dps:
      - id: 124
        type: integer
        name: sensor

  - entity: sensor
    name: Filter left time
    class: duration
    category: diagnostic
    icon: "mdi:air-filter"
    dps:
      - id: 126
        type: integer
        name: sensor
        unit: d

  - entity: sensor
    name: Compressor frequency
    category: diagnostic
    icon: "mdi:sine-wave"
    dps:
      - id: 116
        type: integer
        name: sensor
        unit: Hz

  - entity: binary_sensor
    translation_key: defrost
    category: diagnostic
    icon: "mdi:snowflake-melt"
    dps:
      - id: 122
        type: boolean
        name: sensor
