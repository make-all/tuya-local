name: Universal remote control
products:
  - id: whs3cty93fzrqkpt
  - id: jbe3snv4tki8oo9c
    model: S09
entities:
  - entity: remote
    dps:
      - id: 201
        name: send
        type: string
        optional: true
      - id: 202
        name: receive
        type: string
        optional: true
        persist: false
  - entity: infrared
    dps:
      - id: 201
        name: send
        type: string
        optional: true
  - entity: sensor
    class: temperature
    dps:
      - id: 101
        name: sensor
        type: integer
        class: measurement
        unit: C
        mapping:
          - scale: 10
  - entity: sensor
    class: humidity
    dps:
      - id: 102
        name: sensor
        type: integer
        unit: "%"
        class: measurement
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    hidden: true
    dps:
      - id: 103
        type: integer
        optional: true
        name: value
        unit: C
        range:
          min: -20
          max: 20
        mapping:
          - scale: 10
  - entity: number
    name: Humidity calibration
    category: config
    class: humidity
    hidden: true
    dps:
      - id: 104
        type: integer
        optional: true
        name: value
        unit: "%"
        range:
          min: -10
          max: 10
