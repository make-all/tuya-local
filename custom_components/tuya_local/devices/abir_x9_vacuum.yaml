name: Robot vacuum
products:
  - id: euro9u3zwo9w1feu
    manufacturer: Abir
    model: X9
entities:
  - entity: vacuum
    dps:
      - id: 1
        type: boolean
        name: power
      - id: 2
        type: boolean
        name: activate
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
      - id: 4
        type: string
        name: command
        mapping:
          - dps_val: smart
            value: smart
          - dps_val: goto_charge
            value: return_to_base
          - dps_val: zone
            value: zone
          - dps_val: pose
            value: clean_spot
          - dps_val: part
            value: partial
          - dps_val: select_room
            value: select_room
      - id: 5
        type: string
        name: status
        mapping:
          - dps_val: standby
            value: standby
          - dps_val: smart
            value: smart
          - dps_val: zone_clean
            value: zone
          - dps_val: part_clean
            value: partial
          - dps_val: cleaning
            value: cleaning
          - dps_val: paused
            value: paused
          - dps_val: goto_pos
            value: seeking_spot
          - dps_val: pos_arrived
            value: located_spot
          - dps_val: pos_unarrive
            value: left_spot
          - dps_val: goto_charge
            value: returning
          - dps_val: charging
            value: charging
          - dps_val: charge_done
            value: charged
          - dps_val: sleep
            value: sleep
          - dps_val: select_room
            value: selecting_room
          - dps_val: seek_dust_bucket
            value: seek_dust_bucket
          - dps_val: collecting_dust
            value: collecting_dust
          - dps_val: self_clean
            value: self_clean
          - dps_val: mapping
            value: mapping
          - dps_val: mapping_done
            value: mapping_done
      - id: 9
        type: string
        name: fan_speed
        mapping:
          - dps_val: closed
            value: "Off"
          - dps_val: gentle
            value: Low
          - dps_val: normal
            value: Medium
          - dps_val: strong
            value: High
      - id: 11
        type: boolean
        name: locate
        optional: true
      - id: 12
        type: string
        name: direction_control
        optional: true
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: backward
            value: reverse
          - dps_val: turn_left
            value: left
          - dps_val: turn_right
            value: right
          - dps_val: stop
            value: stop
          - dps_val: exit
            value: exit
      - id: 28
        type: bitfield
        name: error
        hidden: true
      # Raw protocol DPs surfaced as attributes (opaque; reserved/diagnostic).
      # path_data (14) is "reserved, not yet used" per the data model, so it is
      # kept as a read attribute rather than a writable control.
      - id: 14
        type: base64
        name: path_data
        optional: true
      - id: 32
        type: base64
        name: device_timer
        optional: true
      - id: 33
        type: base64
        name: disturb_time_set
        optional: true
      - id: 34
        type: base64
        name: device_info
        optional: true
      - id: 35
        type: base64
        name: voice_data
        optional: true

  - entity: switch
    name: Charge
    icon: "mdi:lightning-bolt"
    category: config
    dps:
      - id: 3
        type: boolean
        name: switch
        optional: true

  # DP15 (raw) is the laser sweeper command channel. Reverse-engineered
  # select_room payload: AA 00 LL 14 01 <N> <room_id..> CC, checksum
  # CC = sum(bytes from type) & 0xFF; room IDs index the saved map (vary
  # per home). Write as base64 via text.set_value.
  - entity: text
    name: Command
    icon: "mdi:console-line"
    category: config
    hidden: true
    dps:
      - id: 15
        type: base64
        name: value
        optional: true
  - entity: select
    name: Fetch request
    icon: "mdi:message-question"
    category: config
    dps:
      - id: 16
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: get_map
            value: Map
          - dps_val: get_path
            value: Path
          - dps_val: get_both
            value: Both

  - entity: sensor
    name: Cleaning time
    icon: "mdi:progress-clock"
    class: duration
    category: diagnostic
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: min
  - entity: sensor
    name: Cleaning area
    class: area
    category: diagnostic
    dps:
      - id: 7
        type: integer
        name: sensor
        unit: m2
  - entity: sensor
    class: battery
    dps:
      - id: 8
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    name: Edge brush lifetime
    icon: "mdi:broom"
    class: duration
    category: diagnostic
    dps:
      - id: 17
        type: integer
        name: sensor
        unit: h
  - entity: sensor
    name: Rolling brush lifetime
    icon: "mdi:broom"
    class: duration
    category: diagnostic
    dps:
      - id: 19
        type: integer
        name: sensor
        unit: h
  - entity: sensor
    translation_key: filter_life
    class: duration
    category: diagnostic
    dps:
      - id: 21
        type: integer
        name: sensor
        unit: h
  - entity: sensor
    name: Rag lifetime
    class: duration
    category: diagnostic
    dps:
      - id: 23
        type: integer
        name: sensor
        unit: h
        optional: true
  - entity: sensor
    name: Total cleaning area
    class: area
    category: diagnostic
    dps:
      - id: 29
        type: integer
        name: sensor
        unit: m2
  - entity: sensor
    name: Total cleaning times
    icon: "mdi:counter"
    category: diagnostic
    dps:
      - id: 30
        type: integer
        name: sensor
  - entity: sensor
    name: Total cleaning time
    icon: "mdi:history"
    class: duration
    category: diagnostic
    dps:
      - id: 31
        type: integer
        name: sensor
        unit: min

  - entity: button
    name: Reset map
    icon: "mdi:map-marker-remove"
    category: config
    dps:
      - id: 13
        type: boolean
        name: button
        optional: true
  - entity: button
    name: Reset edge brush
    class: restart
    category: config
    dps:
      - id: 18
        type: boolean
        name: button
        optional: true
  - entity: button
    name: Reset roll brush
    class: restart
    category: config
    dps:
      - id: 20
        type: boolean
        name: button
        optional: true
  - entity: button
    name: Reset filter
    icon: "mdi:air-filter"
    category: config
    dps:
      - id: 22
        type: boolean
        name: button
        optional: true
  - entity: button
    name: Reset rag life
    class: restart
    category: config
    dps:
      - id: 24
        type: boolean
        name: button
        optional: true

  - entity: select
    translation_key: mopping
    category: config
    dps:
      - id: 10
        type: string
        name: option
        mapping:
          - dps_val: closed
            value: "off"
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: high
            value: high
  - entity: select
    translation_key: cleaning_mode
    category: config
    dps:
      - id: 41
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: only_sweep
            value: sweep
          - dps_val: only_mop
            value: mop
          - dps_val: both_work
            value: sweep_and_mop
  - entity: number
    translation_key: volume
    category: config
    dps:
      - id: 26
        type: integer
        name: value
        optional: true
        unit: "%"
        range:
          min: 0
          max: 100
  - entity: switch
    translation_key: do_not_disturb
    category: config
    dps:
      - id: 25
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Resume cleaning
    icon: "mdi:play-pause"
    category: config
    dps:
      - id: 27
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Custom room
    icon: "mdi:floor-plan"
    category: config
    dps:
      - id: 39
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Carpet boost
    icon: "mdi:car-turbocharger"
    category: config
    dps:
      - id: 45
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Y-mopping
    icon: "mdi:water-plus"
    category: config
    dps:
      - id: 48
        type: boolean
        name: switch
        optional: true
  # DPs 101-103 carry recycled generic codes (switch_10/sound/switch_led);
  # the device's own names identify them as cleaning-pattern toggles.
  - entity: switch
    name: Edge cleaning
    icon: "mdi:wall"
    category: config
    dps:
      - id: 101
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Spiral cleaning
    icon: "mdi:rotate-right"
    category: config
    dps:
      - id: 102
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Square spiral cleaning
    icon: "mdi:vector-square"
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch
        optional: true
  - entity: select
    translation_key: language
    category: config
    dps:
      - id: 36
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: chinese_simplified
            value: chinese
          - dps_val: chinese_traditional
            value: chinese_traditional
          - dps_val: english
            value: english
          - dps_val: german
            value: german
          - dps_val: french
            value: french
          - dps_val: russian
            value: russian
          - dps_val: spanish
            value: spanish
          - dps_val: korean
            value: korean
          - dps_val: latin
            value: latin
          - dps_val: portuguese
            value: portuguese
          - dps_val: japanese
            value: japanese
          - dps_val: italian
            value: italian
          - dps_val: turkey
            value: turkish
          - dps_val: thai
            value: thai
          - dps_val: bulgarian
            value: bulgarian
          - dps_val: poland
            value: polish
          - dps_val: romanian
            value: romanian
          - dps_val: czech
            value: czech
          - dps_val: slovak
            value: slovak
          - dps_val: dutch
            value: dutch

  - entity: binary_sensor
    name: Mop installed
    icon: "mdi:water-plus"
    category: diagnostic
    dps:
      - id: 40
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: installed
            value: true
          - value: false
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 28
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 28
        type: bitfield
        name: fault_code
      - id: 28
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: ok
          - dps_val: 1
            value: edge_brush
          - dps_val: 2
            value: main_brush
          - dps_val: 4
            value: left_wheel
          - dps_val: 8
            value: right_wheel
          - dps_val: 16
            value: dust_box
          - dps_val: 32
            value: land_check
          - dps_val: 64
            value: collision
