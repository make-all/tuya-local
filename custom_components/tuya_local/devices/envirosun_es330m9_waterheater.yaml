        name: sensor
  - entity: switch
    name: Cooling
    category: config
    dps:
      - id: 118
        type: boolean
        optional: true
        name: switch
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 119
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: "0"
            value: celsius
          - dps_val: "1"
            value: fahrenheit
  - entity: binary_sensor
    name: Cooling lock
