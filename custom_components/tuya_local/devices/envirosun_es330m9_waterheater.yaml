name: Hot water
products:
  - id: phdnbytcogafrjr
    manufacturer: Envirosun
    model: ES330M9
entities:
  - entity: water_heater
    dps:
      - id: 1
        type: boolean
        optional: true
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: heating_mode
            conditions:
              - dps_val: "0"
                value: high_demand  # auto
              - dps_val: "1"
                value: heat_pump  # timer
              - dps_val: "2"
                value: electric
              - dps_val: "3"
                value: eco  # mute
      - id: 4
        type: integer
        optional: true
        name: temperature
        unit: F
        range:
          min: 0
          max: 176
      - id: 35
        type: integer
        optional: true
        name: current_temperature
      - id: 105
        type: string
        optional: true
        name: heating_mode
        hidden: true
      - id: 114
        type: integer
        name: display_version
      - id: 115
        type: integer
        name: main_version
      - id: 121
        type: integer
        name: min_temperature
      - id: 122
        type: integer
        name: max_temperature
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 3
        type: boolean
        optional: true
        name: lock
  - entity: sensor
    class: temperature
    name: Water temperature
    dps:
      - id: 16
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    class: temperature
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: F
        class: measurement
  - entity: sensor
    name: Available hot water
    category: diagnostic
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: "%"
        class: measurement
        mapping:
          - scale: 0.12
  - entity: binary_sensor
    name: Heat pump
    class: running
    category: diagnostic
    dps:
      - id: 103
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Element
    class: running
    category: diagnostic
    dps:
      - id: 104
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Quiet mode
    class: running
    category: diagnostic
    dps:
      - id: 106
        type: boolean
        optional: true
        name: sensor
  - entity: sensor
    name: Outdoor temperature
    class: temperature
    dps:
      - id: 107
        type: integer
        name: sensor
        unit: F
        class: measurement
  - entity: sensor
    name: Evaporator temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 108
        type: integer
        name: sensor
        unit: F
        class: measurement
  - entity: sensor
    name: Inlet temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 109
        type: integer
        name: sensor
        unit: F
        class: measurement
  - entity: text
    name: Eco mode start time 1
    category: config
    icon: "mdi:leaf"
    hidden: true
    dps:
      - id: 110
        type: base64
        optional: true
        name: value
  - entity: text
    name: Eco mode stop time 1
    category: config
    icon: "mdi:leaf"
    hidden: true
