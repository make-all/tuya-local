name: Salt Chlorinator
products:
  - id: ypdzzmgqbq3dqhqu
    name: BW Salt Chlorinator
    model_id: fxalqw
    manufacturer: BW

entities:
  - entity: switch
    name: Power
    dps:
      - id: 101
        name: switch
        type: boolean

  - entity: switch
    name: Child Lock
    category: config
    dps:
      - id: 102
        name: switch
        type: boolean

  - entity: select
    name: Output Level
    category: config
    dps:
      - id: 103
        name: option
        type: string
        mapping:
          - dps_val: "25"
            value: "25%"
          - dps_val: "50"
            value: "50%"
          - dps_val: "75"
            value: "75%"
          - dps_val: "100"
            value: "100%"
          - dps_val: "150"
            value: "150%"
          - dps_val: "200"
            value: "200%"

  - entity: sensor
    name: Water Temperature
    class: temperature
    dps:
      - id: 104
        name: sensor
        type: integer
        unit: C
        class: measurement

  - entity: sensor
    name: Fault Bitmap
    category: diagnostic
    hidden: true
    dps:
      - id: 105
        name: sensor
        type: integer
        optional: true

  - entity: sensor
    name: Fault Status
    class: enum
    category: diagnostic
    dps:
      - id: 106
        name: sensor
        type: string
        optional: true
        mapping:
          - dps_val: "work"
            value: "working"
          - dps_val: "F1"
            value: "F1 - Water temperature outside normal range"
          - dps_val: "F2"
            value: "F2 - Water flow error"
          - dps_val: "F3"
            value: "F3 - Water temperature sensor breakdown"
          - dps_val: "F4"
            value: "F4 - Electrode abnormal"
          - dps_val: "F5"
            value: "F5 - Low salinity"
          - dps_val: "F6"
            value: "F6 - High salinity"
          - dps_val: "F8"
            value: "F8 - Low input voltage"
          - dps_val: "F9"
            value: "F9 - High output current"
          - dps_val: "FC"
            value: "FC - Circuit abnormal"
          - dps_val: "FP"
            value: "FP - Power off abnormal"
          - dps_val: "Fb"
            value: "Fb - Communication failure"

  - entity: sensor
    name: Salinity Status
    class: enum
    category: diagnostic
    dps:
      - id: 107
        name: sensor
        type: string
        optional: true
        mapping:
          - dps_val: "salinity_low"
            value: "low"
          - dps_val: "salinity_normal"
            value: "normal"
          - dps_val: "salinity_high"
            value: "high"

  - entity: button
    name: Clear Fault
    category: config
    dps:
      - id: 108
        name: button
        type: boolean
        optional: true

  - entity: number
    name: Self-Clean Time
    category: config
    dps:
      - id: 109
        name: value
        type: integer
        range:
          min: 4
          max: 12
        unit: h
        mapping:
          - step: 4

  - entity: sensor
    name: Self-Clean Remaining
    class: duration
    category: diagnostic
    dps:
      - id: 110
        name: sensor
        type: integer
        unit: h
        class: measurement

  - entity: sensor
    name: Salinity
    category: diagnostic
    hidden: true
    dps:
      - id: 111
        name: sensor
        type: integer
        unit: ppm
        class: measurement
        optional: true

  - entity: button
    name: Clear Salinity Fault
    category: config
    dps:
      - id: 112
        name: button
        type: boolean

  - entity: sensor
    name: Work Countdown
    class: duration
    category: diagnostic
    dps:
      - id: 113
        name: sensor
        type: integer
        unit: h
        class: measurement

  - entity: sensor
    name: Work Time
    class: duration
    category: diagnostic
    dps:
      - id: 114
        name: sensor
        type: integer
        unit: h
        class: measurement
