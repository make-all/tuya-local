        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
      - id: 17
        optional: true
        force: true
        type: base64
        name: switch
        mask: "0000000000FF00000000000000000000"

  - entity: number
    name: Overload threshold
