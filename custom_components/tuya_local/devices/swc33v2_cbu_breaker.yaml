name: Circuit breaker
products:
  - id: zjblhee2cbl31twx
    name: SWC33v2-CBU
entities:
  - entity: switch
    icon: "mdi:fuse"
    translation_key: breaker
    dps:
      - id: 16
        name: switch
        type: boolean

  - entity: button
