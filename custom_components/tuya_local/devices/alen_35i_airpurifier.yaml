name: Air purifier
products:
  - id: bd4ztozj4aied1ps
    manufacturer: Alen
    model: BreatheSmart 35i
entities:
  - entity: fan
    translation_key: air_purifier
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 104
        type: string
        name: speed
        mapping:
          - dps_val: "1"
            value: 25
            available: four_speed
          - dps_val: "2"
            value: 50
            available: four_speed
          - dps_val: "3"
            value: 75
            available: four_speed
          - dps_val: "4"
            value: 100
            available: four_speed
          - dps_val: "1"
            value: 20
            available: fiev_speed
          - dps_val: "2"
            value: 40
            available: fiev_speed
          - dps_val: "3"
            value: 60
            available: five_speed
          - dps_val: "4"
            value: 80
            available: five_speed
          - dps_val: "5"
            value: 100
            available: five_speed
      - id: 3
        type: string
        optional: true
        name: preset_mode
        mapping:
          - dps_val: "On"
            value: auto
          - dps_val: "Off"
            value: manual
        # 75i has 5 speeds, recognise it by anion
      - id: 6
        type: boolean
        optional: true
        name: five_speed
        mapping:
          - dps_val: null
            value: false
          - value: true
        # 35i has 4 speeds, recognise it by lack of anion
      - id: 6
        type: boolean
        optional: true
        name: four_speed
        mapping:
          - dps_val: null
            value: true
          - value: false
  - entity: sensor
    class: pm25
    dps:
      - id: 2
        type: integer
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    class: pm1
    dps:
      - id: 101
        type: integer
        optional: true
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    class: pm4
    dps:
      - id: 102
        type: integer
        optional: true
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    class: pm10
    dps:
      - id: 103
        type: integer
        optional: true
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    translation_key: filter_life
    dps:
      - id: 5
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    class: temperature
    dps:
      - id: 12
        type: integer
        name: sensor
        unit: "F"
        class: measurement
  - entity: sensor
    class: humidity
    dps:
      - id: 13
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 7
        type: boolean
        name: lock
  - entity: sensor
    name: EtOH
    dps:
      - id: 113
        type: integer
        name: sensor
        unit: ppm
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    class: carbon_dioxide
    dps:
      - id: 116
        type: integer
        name: sensor
        unit: ppm
        class: measurement
  - entity: sensor
    class: volatile_organic_compounds
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: ugm3
        class: measurement
  - entity: light
    translation_key: indicator
    category: config
    dps:
      - id: 105
        type: string
        optional: true
        name: brightness
        mapping:
          - dps_val: Auto
            value: 0
          - dps_val: Low
            value: 128
          - dps_val: High
            value: 255
      - id: 114
        type: string
        optional: true
        name: named_color
        mapping:
          - dps_val: COLOR_BLUE
            value: blue
          - dps_val: COLOR_GREEN
            value: lime
          - dps_val: COLOR_ORANGE
            value: orange
          - dps_val: COLOR_RED
            value: red
          - dps_val: COLOR_PURPLE
            value: magenta
  - entity: sensor
    name: Filter
    class: enum
    category: diagnostic
    dps:
      - id: 106
        type: string
        optional: true
        name: sensor
        mapping:
          - dps_val: Unknown
            value: Unknown
          - dps_val: PURE
            value: Pure
          - dps_val: FRESH
            value: Fresh
          - dps_val: ODOR
            value: Odour
  - entity: sensor
    class: signal_strength
    category: diagnostic
    dps:
      - id: 107
        type: integer
        optional: true
        name: sensor
        unit: dB
        class: measurement
  - entity: text
    name: Serial TX
    category: config
    icon: "mdi:serial-port"
    hidden: true
    dps:
      - id: 109
        type: string
        optional: true
        name: value
  - entity: number
    name: Sensitivity
    category: config
    icon: "mdi:"
    dps:
      - id: 110
        type: integer
        optional: true
        name: value
        range:
          min: 1
          max: 6
  - entity: sensor
    name: Serial RX
    hidden: true
    category: diagnostic
    dps:
      - id: 111
        type: string
        optional: true
        name: sensor
  - entity: sensor
    name: Fan speed
    category: diagnostic
    dps:
      - id: 115
        type: integer
        optional: true
        name: sensor
        unit: rpm
        class: measurement
  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 118
        type: boolean
        optional: true
        name: switch
  - entity: sensor
    name: AirID data
    category: diagnostic
    hidden: true
    dps:
      - id: 119
        type: base64
        optional: true
        name: sensor
      - id: 121
        type: base64
        optional: true
        name: matrix
      - id: 122
        type: string
        optional: true
        name: spmatrix
      - id: 123
        type: string
        optional: true
        name: mpmatrix
  - entity: number
    name: AirID
    category: config
    hidden: true
    dps:
      - id: 120
        type: integer
        optional: true
        name: value
        range:
          min: 0
          max: 999
  - entity: switch
    name: Air quality monitoring
    category: config
    dps:
      - id: 124
        type: string
        optional: true
        name: switch
        mapping:
          - dps_val: "Off"
            value: false
          - dps_val: "On"
            value: true
  - entity: switch
    translation_key: ionizer
    category: config
    hidden: unavailable  # 75i only
    dps:
      - id: 6
        type: boolean
        optional: true
        name: switch
      - id: 6
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
