name: Air Circulator
products:
  - id: vuz30a7fxx9deob7
    manufacturer: MeacoFan
    model: Sefte Pro
  - id: hf57kaednmtjbynq
    manufacturer: MeacoFan
    model: Sefte Pro
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: Normal
            value: normal
          - dps_val: sleep
            value: sleep
          - dps_val: ECO
            value: eco
      - id: 3
        type: integer
        name: speed
        range:
          min: 1
          max: 12
      - id: 102
        type: boolean
        name: oscillate
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: light
    translation_key: display
    category: config
    dps:
      - id: 15
        type: boolean
        name: switch
  - entity: switch
    translation_key: keytone
    category: config
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: select
    name: Horizontal swing
    category: config
    dps:
      - id: 7
        type: string
        name: option
        mapping:
          - dps_val: "OFF"
            value: "off"
          - dps_val: "30"
            value: "30°"
          - dps_val: "75"
            value: "75°"
          - dps_val: "120"
            value: "120°"
