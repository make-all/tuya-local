name: Air conditioner
# products:
#   - id: UNKNOWN
#     manufacturer: Woods
#     model: Cortina Silent 12k
entities:
  - entity: climate
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - value: "off"
            dps_val: false
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: "0"
                value: cool
              - dps_val: "1"
                value: heat
                available: heat_model
              - dps_val: "2"
                value: dry
              - dps_val: "3"
                value: fan_only
              - dps_val: "4"  # This is Woods ECO or AirSwitch mode
                value: heat_cool
              - dps_val: "5"  # This is Woods AirSwitch Auto mode
                value: auto
                available: airswitch_model
      - id: 2
        type: integer
        optional: true
        name: temperature
        range:
          min: 17
          max: 30
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: temp_set_f
                range:
                  min: 62
                  max: 86
      - id: 3
        type: integer
        optional: true
        name: current_temperature
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: temp_current_f
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: "low"
            value: low
          - dps_val: "mid"
            value: medium
          - dps_val: "high"
            value: high
      - id: 19
        type: string
        optional: true
        name: temperature_unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 23
        type: integer
        optional: true
        name: temp_current_f
      - id: 24
        type: integer
        optional: true
        name: temp_set_f
        range:
          min: 62
          max: 86
      - id: 103
        # 0-NPA, 1-NPF, 2-NPB-cool, 3-NPB-heatcool, 4-NPE-cool, 5-NPE-heatcool
        type: string
        name: airswitch_model
        mapping:
          - dps_val: "2"
            value: true
          - dps_val: "3"
            value: true
          - value: false
      - id: 103
        type: string
        name: heat_model
        mapping:
          - dps_val: "3"
            value: true
          - dps_val: "5"
            value: true
          - value: false
      - id: 104
        name: swing_mode
        type: boolean
        mapping:
          - dps_val: true
            value: "on"
          - dps_val: false
            value: "off"
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: 1
            value: false
          - value: true
      - id: 22
        type: bitfield
        name: fault_code
  - entity: binary_sensor
    translation_key: tank_full
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 1
            value: true
          - value: false
  - entity: switch
    translation_key: sleep
    dps:
      - id: 105
        type: boolean
        name: switch
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 14
        type: boolean
        optional: true
        name: lock
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 19
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: switch
    name: Self clean
    category: config
    dps:
      - id: 102
        type: boolean
        optional: true
        name: switch

  - entity: sensor
    name: Outdoor temperature
    class: temperature
    dps:
      - id: 106
        type: integer
        optional: true
        name: sensor
        class: measurement
        mapping:
          - constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
      - id: 107
        type: integer
        optional: true
        name: temp_f
      - id: 19
        type: string
        optional: true
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
