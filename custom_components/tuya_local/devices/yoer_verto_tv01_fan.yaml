name: Yoer Verto TV01 Tower Fan
products:
  - id: tv01_fan
    manufacturer: Yoer
    model: Verto TV01
entities:
  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: "1"
            value: normal
          - dps_val: "2"
            value: natural
          - dps_val: "3"
            value: sleep
          - dps_val: "4"
            value: child
      - id: 3
        type: string
        name: speed
        mapping:
          - dps_val: "1"
            value: 6
          - dps_val: "2"
            value: 15
          - dps_val: "3"
            value: 23
          - dps_val: "4"
            value: 32
          - dps_val: "5"
            value: 40
          - dps_val: "6"
            value: 49
          - dps_val: "7"
            value: 57
          - dps_val: "8"
            value: 66
          - dps_val: "9"
            value: 74
          - dps_val: "10"
            value: 83
          - dps_val: "11"
            value: 91
          - dps_val: "12"
            value: 100
      - id: 4
        type: string
        name: oscillate
        mapping:
          - dps_val: "off"
            value: false
          - dps_val: "on"
            value: true
  - entity: select
    name: Timer
    category: config
    icon: mdi:timer-outline
    dps:
      - id: 6
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: "off"
          - dps_val: "1"
            value: "1h"
          - dps_val: "2"
            value: "2h"
          - dps_val: "3"
            value: "3h"
          - dps_val: "4"
            value: "4h"
          - dps_val: "5"
            value: "5h"
          - dps_val: "6"
            value: "6h"
          - dps_val: "7"
            value: "7h"
          - dps_val: "8"
            value: "8h"
          - dps_val: "9"
            value: "9h"
          - dps_val: "10"
            value: "10h"
          - dps_val: "11"
            value: "11h"
          - dps_val: "12"
            value: "12h"
  - entity: switch
    name: Ionizer
    category: config
    icon: mdi:creation
    dps:
      - id: 9
        type: boolean
        name: switch
  - entity: switch
    name: Beep
    category: config
    icon: mdi:volume-high
    dps:
      - id: 13
        type: boolean
        name: switch
  - entity: sensor
    name: Temperature
    category: diagnostic
    class: temperature
    dps:
      - id: 19
        type: integer
        name: sensor
        readonly: true
  - entity: switch
    name: Display Off
    category: config
    icon: mdi:led-off
    dps:
      - id: 101
        type: boolean
        name: switch