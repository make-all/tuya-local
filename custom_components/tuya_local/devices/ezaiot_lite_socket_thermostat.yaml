name: Socket thermostat
products:
  - id: lzfux5zela3cbpnd
    manufacturer: ezAIoT
    model: Lite
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 110
        type: string
        name: hvac_mode
        mapping:
          - dps_val: "plug"
            value: "off"
          - dps_val: "heat"
            value: "heat"
          - dps_val: "cool"
            value: "cool"
          - dps_val: "prg"
            value: "auto"
          - dps_val: "cycle"
            value: "fan_only"
      - id: 126
        type: integer
        name: current_temperature
        mapping:
          - scale: 10
      - id: 135
        type: integer
        name: temperature
        unit: C
        mapping:
          - scale: 10
        range:
          min: -500
          max: 3000
      - id: 127
        type: integer
        name: max_temperature
        optional: true
        mapping:
          - scale: 10
      - id: 130
        type: integer
        name: min_temperature
        optional: true
        mapping:
          - scale: 10
      - id: 114
        type: integer
        name: hvac_action
        mapping:
          - dps_val: 0
            value: idle
          - dps_val: 1
            constraint: hvac_mode
            conditions:
              - dps_val: heat
                value: heating
              - dps_val: cool
                value: cooling
              - dps_val: auto
                value: heating
              - dps_val: fan_only
                value: heating
              - dps_val: "off"
                value: idle

  # Direct relay switch (used in plug mode)
  - entity: switch
    translation_key: manual_socket
    dps:
      - id: 1
        name: switch
        type: boolean

  # Countdown timer as dropdown (minutes)
  - entity: select
    translation_key: manual_socket_countdown
    icon: "mdi:timer"
    dps:
      - id: 9
        type: integer
        name: option
        optional: true
        mapping:
          - dps_val: 0
            value: "0"
          - dps_val: 60
            value: "1"
          - dps_val: 120
            value: "2"
          - dps_val: 180
            value: "3"
          - dps_val: 240
            value: "4"
          - dps_val: 300
            value: "5"
          - dps_val: 600
            value: "10"
          - dps_val: 900
            value: "15"
          - dps_val: 1800
            value: "30"
          - dps_val: 2700
            value: "45"
          - dps_val: 3600
            value: "60"

  # Display on button
  - entity: button
    translation_key: display_on
    dps:
      - id: 118
        name: button
        optional: true
        type: boolean

  # Operating mode select
  - entity: select
    translation_key: work_mode
    dps:
      - id: 110
        type: string
        name: option
        mapping:
          - dps_val: "plug"
            value: "plug"
          - dps_val: "heat"
            value: "heat"
          - dps_val: "cool"
            value: "cool"
          - dps_val: "prg"
            value: "prg"
          - dps_val: "cycle"
            value: "cycle"

  # Diagnostics: relay state
  - entity: binary_sensor
    class: power
    category: diagnostic
    dps:
      - id: 114
        type: integer
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: 1
            value: true

  # Diagnostics: fault
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 26
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true

  # Child lock
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        name: lock
        type: boolean

  # Frost protection
  - entity: switch
    category: config
    translation_key: protection_frost
    dps:
      - id: 113
        name: switch
        type: boolean

  # Cooling delay enable
  - entity: switch
    category: config
    translation_key: protection_cooling_delay
    icon: "mdi:pump"
    dps:
      - id: 133
        name: switch
        optional: true
        type: boolean

  # Cooling delay time
  - entity: number
    translation_key: protection_cooling_delay_time
    category: config
    icon: "mdi:pump"
    dps:
      - id: 134
        type: integer
        name: value
        optional: true
        unit: min
        range:
          min: 0
          max: 10

  # Upper temperature alarm enable + threshold
  - entity: switch
    category: config
    translation_key: high_temp_alarm_limit
    icon: "mdi:thermometer-chevron-up"
    dps:
      - id: 128
        name: switch
        optional: true
        type: boolean

  - entity: number
    translation_key: high_temp_alarm
    category: config
    icon: "mdi:thermometer-alert"
    dps:
      - id: 129
        type: integer
        name: value
        optional: true
        unit: C
        mapping:
          - scale: 10
        range:
          min: -500
          max: 3000

  # Lower temperature alarm enable + threshold
  - entity: switch
    category: config
    translation_key: low_temp_alarm_limit
    icon: "mdi:thermometer-chevron-down"
    dps:
      - id: 131
        name: switch
        optional: true
        type: boolean

  - entity: number
    translation_key: low_temp_alarm
    category: config
    icon: "mdi:thermometer-alert"
    dps:
      - id: 132
        type: integer
        name: value
        optional: true
        unit: C
        mapping:
          - scale: 10
        range:
          min: -500
          max: 3000

  # Temperature hysteresis
  - entity: number
    translation_key: temp_differential
    class: temperature_delta
    category: config
    icon: "mdi:thermometer"
    mode: "box"
    dps:
      - id: 111
        type: integer
        name: value
        optional: true
        mapping:
          - scale: 10
        unit: C
        range:
          min: 1
          max: 300

  # Temperature calibration
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 136
        type: integer
        name: value
        optional: true
        mapping:
          - scale: 10
        unit: C
        range:
          min: -150
          max: 150

  # Display brightness
  - entity: select
    translation_key: display_brightness
    icon: "mdi:brightness-6"
    category: config
    dps:
      - id: 115
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "Low"
            value: "low"
          - dps_val: "Middle"
            value: "medium"
          - dps_val: "High"
            value: "high"

  # Display timeout
  - entity: select
    translation_key: display_timeout
    icon: "mdi:timer-cog-outline"
    category: config
    dps:
      - id: 117
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "15s"
            value: "15s"
          - dps_val: "30s"
            value: "30s"
          - dps_val: "60s"
            value: "60s"
          - dps_val: "120s"
            value: "120s"
          - dps_val: "never"
            value: "never"
