        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    class: pm10
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    name: HCHO
    class: volatile_organic_compounds
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: ugm3
        class: measurement
  - entity: sensor
    class: volatile_organic_compounds
    dps:
      - id: 106
        type: integer
        name: sensor
