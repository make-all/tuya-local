name: Air conditioner
products:
  - id: pdwzhqdjh6ppnjpb
    manufacturer: Tadiran
    model: Mini Central Inverter

entities:
  # Main climate control
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cooling
                value: cool
              - dps_val: heating
                value: heat
              - dps_val: dehum
                value: dry
              - dps_val: fan
                value: fan_only
              - dps_val: auto
                value: heat_cool
      - id: 2
        type: integer
        name: temperature
        unit: C
        range:
          min: 16
          max: 32
      - id: 3
        type: integer
        name: current_temperature
        mapping:
          - scale: 10
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: auto
            value: auto
          - dps_val: silent
            value: "1"
          - dps_val: low
            value: "2"
          - dps_val: low_med
            value: "3"
          - dps_val: middle
            value: "4"
          - dps_val: med_high
            value: "5"
          - dps_val: high
            value: "6"
          - dps_val: turbo
            value: "7"
      - id: 8
        type: boolean
        optional: true
        name: preset_mode
        mapping:
          - dps_val: true
            value: eco
          - dps_val: false
            value: comfort
          - dps_val: null
            value: comfort
            hidden: true
      - id: 30
        type: boolean
        optional: true
        name: swing_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: "on"
          - value: "off"
            hidden: true
      - id: 33
        type: boolean
        optional: true
        name: swing_horizontal_mode
        mapping:
          - dps_val: true
            value: "on"
          - dps_val: false
            value: "off"
          - value: "off"
            hidden: true

  # Actual running fan speed (read-only, reported by IDU)
  - entity: sensor
    name: Running Fan Speed
    class: enum
    category: diagnostic
    dps:
      - id: 105
        type: string
        name: sensor
        mapping:
          - dps_val: Auto
            value: auto
          - dps_val: Silent
            value: "Silent"
          - dps_val: Low
            value: "Low"
          - dps_val: Low_Med
            value: "Low_Med"
          - dps_val: Middle
            value: "Middle"
          - dps_val: Med_High
            value: "Med_High"
          - dps_val: High
            value: "High"
          - dps_val: Turbo
            value: "Turbo"

  # Outdoor unit status (read-only)
  - entity: sensor
    name: ODU Mode
    class: enum
    category: diagnostic
    dps:
      - id: 107
        type: string
        name: sensor
        mapping:
          - dps_val: "off"
            value: "off"
          - dps_val: Cool
            value: cool
          - dps_val: Heat
            value: heat

  - entity: sensor
    name: ODU Fan Speed
    class: enum
    category: diagnostic
    dps:
      - id: 108
        type: string
        name: sensor
        mapping:
          - dps_val: "Off"
            value: "off"
          - dps_val: "Low"
            value: low
          - dps_val: "Med"
            value: medium
          - dps_val: "High"
            value: high

  # Temperatures (all raw ×10, divided by scale: 10)
  - entity: sensor
    name: Outdoor Ambient Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 111
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: IGBT Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 110
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Discharge Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Suction Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 115
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Coil Inlet Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Coil Mid Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Coil Outlet Temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Coil Outlet TH4
    class: temperature
    category: diagnostic
    dps:
      - id: 112
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Coil Inlet TH3
    class: temperature
    category: diagnostic
    dps:
      - id: 113
        type: integer
        name: sensor
        unit: "°C"
        class: measurement
        mapping:
          - scale: 10

  # Compressor / inverter
  - entity: sensor
    name: Compressor Frequency
    class: frequency
    category: diagnostic
    dps:
      - id: 109
        type: integer
        name: sensor
        unit: Hz
        class: measurement

  - entity: sensor
    name: Compressor Current
    class: current
    category: diagnostic
    dps:
      - id: 116
        type: integer
        name: sensor
        unit: A
        class: measurement
        mapping:
          - scale: 10

  - entity: sensor
    name: Compressor Power
    class: power
    category: diagnostic
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: W
        class: measurement

  - entity: sensor
    name: AC Input Voltage
    class: voltage
    category: diagnostic
    dps:
      - id: 118
        type: integer
        name: sensor
        unit: V
        class: measurement

  - entity: sensor
    name: EEV Opening
    category: diagnostic
    dps:
      - id: 119
        type: integer
        name: sensor
        unit: steps
        class: measurement

  # Error codes
  - entity: binary_sensor
    name: Indoor Unit Error
    class: problem
    category: diagnostic
    dps:
      - id: 123
        type: integer
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true

  - entity: binary_sensor
    name: Outdoor Unit Error
    class: problem
    category: diagnostic
    dps:
      - id: 124
        type: integer
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true

  - entity: sensor
    name: Indoor Unit Error Code
    category: diagnostic
    dps:
      - id: 123
        type: integer
        optional: true
        name: sensor

  - entity: sensor
    name: Outdoor Unit Error Code
    category: diagnostic
    dps:
      - id: 124
        type: integer
        optional: true
        name: sensor
