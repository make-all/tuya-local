name: "Klarstein - Pure Blizzard Smart"
products:
  - id: yeojkkzveebndxdp
    manufacturer: Klarstein
    model: "YPF1-07,YPO6-07/09"
    name: "Pure Blizzard Smart"
entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: COOL
                value: cool
              - dps_val: FAN
                value: fan_only
              - dps_val: DRY
                value: dry
      - id: 2
        type: integer
        name: temperature
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: C
                range:
                  min: 16
                  max: 31
              - dps_val: F
                range:
                  min: 61
                  max: 88
      - id: 3
        type: integer
        name: current_temperature
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: "1"
            value: high
          - dps_val: "2"
            value: low
      - id: 19
        type: string
        name: temperature_unit
      - id: 103
        type: integer
        name: timer
        optional: true
      - id: 105
        type: integer
        name: countdown
        optional: true
      - id: 106
        type: bitfield
        name: alarm
        optional: true
      - id: 107
        type: boolean
        name: preset_mode
        mapping:
          - dps_val: true
            value: sleep
          - dps_val: false
            value: comfort
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 19
        type: string
        name: option
        mapping:
          - dps_val: C
            value: celsius
          - dps_val: F
            value: fahrenheit
