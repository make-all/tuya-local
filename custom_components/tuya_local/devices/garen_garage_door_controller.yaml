name: Garage door
products:
  - id: y07fcukpjhg0yj5g
    manufacturer: Garen

entities:
  - entity: button
    name: Open
    icon: "mdi:garage-open"
    dps:
      - id: 101
        type: boolean
        name: button

  - entity: button
    name: Stop
    icon: "mdi:stop"
    dps:
      - id: 102
        type: boolean
        name: button

  - entity: button
    name: Close
    icon: "mdi:garage"
    dps:
      - id: 103
        type: boolean
        name: button

  - entity: lock
    category: config
    dps:
      - id: 106
        type: boolean
        name: lock

  - entity: select
    name: Auto-close timer
    translation_key: timer
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "OFF"
            value: "cancel"
          - dps_val: "5s"
            value: "5s"
          - dps_val: "20s"
            value: "20s"
          - dps_val: "60s"
            value: "1m"
