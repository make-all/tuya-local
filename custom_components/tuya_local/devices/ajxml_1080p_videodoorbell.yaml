name: Video doorbell
products:
  - id: aszi9bvt1ywea5z0
    manufacturer: AJXML
    model: 1080p Smart Doorbell camera
    model_id: DEKCE_IDS07_KXT_M70
entities:
  - entity: select
    translation_key: motion_sensitivity
    category: config
    dps:
      - id: 106
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: low
          - dps_val: "1"
            value: medium
          - dps_val: "2"
            value: high
  - entity: sensor
    name: SD status
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 110
        type: integer
        name: sensor
        mapping:
          - dps_val: 1
            value: normal
          - dps_val: 2
            value: fault
          - dps_val: 3
            value: full
          - dps_val: 4
            value: formatting
          - dps_val: 5
            value: missing
      - id: 109
        type: string
        name: capacity
  - entity: event
    class: motion
    dps:
      - id: 115
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: detected
      - id: 115
        type: base64
        optional: true
        name: snapshot
  - entity: switch
    translation_key: motion_detection
    category: config
    dps:
      - id: 134
        type: boolean
        name: switch
  - entity: event
    class: doorbell
    dps:
      - id: 154
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: ring
      - id: 154
        type: base64
        optional: true
        name: snapshot
  - entity: switch
    name: Restrict motion area
    category: config
    dps:
      - id: 168
        type: boolean
        name: switch
  - entity: text
    name: Motion area
    category: config
    hidden: true
    dps:
      - id: 169
        type: string
        optional: true
        name: value
      - id: 168
        type: boolean
        name: available
  - entity: event
    translation_key: alarm
    dps:
      - id: 185
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: triggered
      - id: 185
        type: utf16b64
        optional: true
        name: message
  - entity: event
    name: Notification
    icon: "mdi:message"
    dps:
      - id: 212
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: message
      - id: 212
        type: utf16b64
        optional: true
        name: message

  - entity: text
    name: Channel switching
    category: config
    hidden: true
    dps:
      - id: 233
        type: json
        name: value

  - entity: lock
    name: Accessory
    dps:
      - id: 148
        type: boolean
        optional: true
        name: lock
      - id: 234
        type: json
        name: support
  - entity: lock
    name: Accessory 1
    dps:
      - id: 235
        type: boolean
        optional: true
        name: lock
  - entity: lock
    name: Accessory 2
    dps:
      - id: 236
        type: boolean
        optional: true
        name: lock
  - entity: switch
    name: Detection polygon
    category: config
    dps:
      - id: 237
        type: boolean
        optional: true
        name: switch
  - entity: switch
    name: Multi-zone detection
    category: config
    dps:
      - id: 238
        type: boolean
        optional: true
        name: switch
  - entity: text
    name: Multi-zone area
    category: config
    hidden: true
    dps:
      - id: 239
        type: base64
        optional: true
        name: value
  - entity: select
    name: PIR alarm interval
    category: config
    dps:
      - id: 241
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: "0"
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
