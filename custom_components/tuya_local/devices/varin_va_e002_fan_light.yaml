name: Fan light
products:
  - id: vfqiwthdnlkynebk
    manufacturer: Varin
    model: VA-E002
entities:
  - entity: light
    name: Main Light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 22
        type: integer
        name: brightness
        optional: true
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        optional: true
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 3000
              max: 5000
            step: 500
  - entity: fan
    dps:
      - id: 60
        type: boolean
        name: switch
      - id: 62
        type: integer
        name: speed
        optional: true
        range:
          min: 1
          max: 6
      - id: 63
        type: string
        name: direction
        optional: true
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: reverse
            value: reverse
  - entity: number
    name: Fan timer
    translation_key: timer
    category: config
    icon: "mdi:fan-clock"
    dps:
      - id: 64
        type: integer
        name: value
        optional: true
        unit: min
        range:
          min: 0
          max: 540