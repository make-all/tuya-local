name: Ceiling fan light
products:
  - id: vfqiwthdnlkynebk
    manufacturer: Varin
    model: VA-E002
entities:
  - entity: light
    dps:
      - id: 63
        type: boolean
        name: switch
      - id: 22
        type: integer
        name: brightness
        optional: true
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        optional: true
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
  - entity: switch
    name: Master Switch
    dps:
      - id: 20
        type: boolean
        name: switch
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 107
        type: boolean
        name: switch
      - id: 105
        type: integer
        name: speed
        optional: true
        range:
          min: 1
          max: 6
      - id: 104
        type: string
        name: direction
        optional: true
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: reverse
            value: reverse
      - id: 106
        type: string
        name: preset_mode
        optional: true
        mapping:
          - dps_val: fresh
            value: fresh
          - dps_val: nature
            value: nature
  - entity: number
    name: Fan timer
    translation_key: timer
    category: config
    icon: "mdi:fan-clock"
    dps:
      - id: 64
        type: integer
        optional: true
        name: value
        unit: min
        range:
          min: 0
          max: 540
