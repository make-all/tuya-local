name: Fan heater
products:
  - id: yeon26hix1s2zqhz
    manufacturer: cado
    model: SMT-S140/SMT-S160
entities:
  - entity: climate
    translation_only_key: heater
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        optional: true
        mapping:
          - dps_val: true
            value: heat
          - dps_val: false
            value: "off"
      - id: 2
        name: preset_mode
        type: string
        mapping:
          - dps_val: sleep
            value: sleep
          - dps_val: wind
            value: wind
          - dps_val: mite
            value: mite
      - id: 104
        name: temperature
        type: integer
        range:
          min: 25
          max: 40
        unit: C
  - entity: switch
    name: Left side
    dps:
      - id: 101
        type: boolean
        name: switch
  - entity: switch
    name: Right side
    dps:
      - id: 102
        type: boolean
        name: switch
        optional: true
  - entity: switch
    name: Both sides
    dps:
      - id: 103
        type: boolean
        name: switch
        optional: true
  - entity: sensor
    name: Right side temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: C
        class: measurement
        readonly: true
        optional: true
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 17
        type: boolean
        name: lock
  - entity: select
    name: Timer
    category: config
    dps:
      - id: 19
        name: option
        type: string
        mapping:
          - dps_val: 1H
            value: 1H
          - dps_val: 2H
            value: 2H
          - dps_val: 3H
            value: 3H
          - dps_val: 4H
            value: 4H
          - dps_val: 5H
            value: 5H
          - dps_val: 6H
            value: 6H
          - dps_val: 7H
            value: 7H
          - dps_val: 8H
            value: 8H
          - dps_val: 9H
            value: 9H
          - dps_val: 10H
            value: 10H
          - dps_val: 11H
            value: 11H
          - dps_val: 12H
            value: 12H
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 21
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 21
        type: bitfield
        name: fault_code
  - entity: lock
    name: Remote child lock
    category: config
    dps:
      - id: 106
        type: boolean
        name: lock
        optional: true
