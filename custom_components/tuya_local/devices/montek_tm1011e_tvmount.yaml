    name: Memory recall 1
    icon: "mdi:numeric-1-circle"
    dps:
      - id: 103
        type: string
        name: button
        mapping:
          - dps_val: recall1
            value: true
  - entity: button
    name: Memory recall 2
    icon: "mdi:numeric-2-circle"
