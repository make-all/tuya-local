name: Humidifier
products:
  - id: vkh653vaxghgavef
    manufacturer: ETA
    model: Noble Smart
    model_id: "5629 90000"
entities:
  - entity: humidifier
    class: humidifier
    translation_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: string
        name: mode
        mapping:
          - dps_val: manual
            value: continuous
          - dps_val: auto
            value: auto
          - dps_val: humidity
            value: manual
      - id: 13
        type: integer
        name: humidity
        range:
          min: 30
          max: 75
        mapping:
          - step: 5
      - id: 14
        type: integer
        name: current_humidity
  - entity: fan
    translation_key: spray_level
    category: config
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 23
        type: string
        name: speed
        optional: true
        mapping:
          - dps_val: "level_0"
            value: 0
          - dps_val: "level_1"
            value: 15
          - dps_val: "level_2"
            value: 30
          - dps_val: "level_3"
            value: 45
          - dps_val: "level_4"
            value: 55
          - dps_val: "level_5"
            value: 70
          - dps_val: "level_6"
            value: 85
          - dps_val: "level_7"
            value: 100
  - entity: switch
    translation_key: warm_mist
    category: config
    dps:
      - id: 26
        type: boolean
        name: switch
        optional: true
  - entity: switch
    translation_key: plasma
    category: config
    dps:
      - id: 35
        type: boolean
        name: switch
        optional: true
  - entity: light
    translation_key: tank_led
    category: config
    dps:
      - id: 5
        type: boolean
        name: switch
  - entity: switch
    translation_key: sound
    category: config
    dps:
      - id: 8
        type: boolean
        name: switch
  - entity: sensor
    class: temperature
    dps:
      - id: 10
        type: integer
        name: sensor
        class: measurement
        unit: C
      - id: 12
        type: integer
        name: temperature_f
        unit: F
        optional: true
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 19
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "7h"
            value: "7h"
          - dps_val: "8h"
            value: "8h"
          - dps_val: "9h"
            value: "9h"
          - dps_val: "10h"
            value: "10h"
          - dps_val: "11h"
            value: "11h"
          - dps_val: "12h"
            value: "12h"
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 20
        type: integer
        name: sensor
        unit: min
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 18
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: switch
    translation_key: night_mode
    category: config
    dps:
      - id: 101
        type: boolean
        name: switch
  - entity: sensor
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        optional: true
        mapping:
          - dps_val: 0
            value: normal
          - dps_val: 1
            value: no_water
          - dps_val: 2
            value: overflowing
