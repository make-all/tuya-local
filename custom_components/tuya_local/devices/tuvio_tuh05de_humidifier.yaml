name: Humidifier
products:
  - id: w7c75twee9njzqw6
    manufacturer: Tuvio
    model: TUH05DE
    model_id: TUH05DEv2

entities:
  - entity: humidifier
    class: humidifier
    name: Humidifier
    dps:
      - id: 1
        name: switch
        type: boolean

      # Target humidity (works only when "Target humidity control" enabled)
      - id: 13
        name: humidity
        type: integer
        unit: "%"
        range:
          min: 40
          max: 80
        mapping:
          - step: 5

      - id: 14
        name: current_humidity
        type: integer
        unit: "%"

      - id: 23
        name: mode
        type: string
        mapping:
          - dps_val: level_1
            value: low
          - dps_val: level_2
            value: medium
          - dps_val: level_3
            value: high
          - dps_val: level4
            value: auto

  # Auto mode
  - entity: switch
    name: Auto mode
    icon: mdi:auto-mode
    dps:
      - id: 2
        name: switch
        type: boolean

  # Enable/disable target humidity control
  - entity: switch
    name: Target humidity control
    icon: mdi:target
    category: config
    dps:
      - id: 21
        name: switch
        type: boolean

  # Warm mist
  - entity: switch
    name: Warm mist
    icon: mdi:weather-fog
    category: config
    dps:
      - id: 5
        name: switch
        type: boolean

  # Sleep mode
  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 16
        name: switch
        type: boolean

  # Ionizer
  - entity: switch
    name: Ionizer
    icon: mdi:air-purifier
    category: config
    dps:
      - id: 25
        name: switch
        type: boolean

  # LED color
  - entity: select
    name: LED color
    icon: mdi:palette
    category: config
    dps:
      - id: 6
        name: option
        type: string
        mapping:
          - dps_val: close
            value: "Off"
          - dps_val: white
            value: White
          - dps_val: yellow
            value: Yellow
          - dps_val: green
            value: Green
          - dps_val: cyan
            value: Cyan
          - dps_val: blue
            value: Blue

  # Countdown timer
  - entity: select
    name: Timer
    icon: mdi:timer-outline
    category: config
    dps:
      - id: 19
        name: option
        type: string
        mapping:
          - dps_val: cancel
            value: "Off"
          - dps_val: 1h
            value: "1h"
          - dps_val: 2h
            value: "2h"
          - dps_val: 3h
            value: "3h"
          - dps_val: 4h
            value: "4h"
          - dps_val: 5h
            value: "5h"
          - dps_val: 6h
            value: "6h"
          - dps_val: 7h
            value: "7h"
          - dps_val: 8h
            value: "8h"
          - dps_val: 9h
            value: "9h"
          - dps_val: 10h
            value: "10h"
          - dps_val: 11h
            value: "11h"
          - dps_val: 12h
            value: "12h"

  # Temperature sensor
  - entity: sensor
    name: Temperature
    class: temperature
    dps:
      - id: 10
        name: sensor
        type: integer
        unit: "°C"

  # Faults (DP22: 0 ok, 1 add water, 2 tank removed)
  - entity: binary_sensor
    name: Add water
    class: problem
    dps:
      - id: 22
        name: sensor
        type: integer
        mapping:
          - dps_val: 1
            value: true
          - dps_val: 0
            value: false
          - dps_val: 2
            value: false

  - entity: binary_sensor
    name: Tank removed
    class: problem
    dps:
      - id: 22
        name: sensor
        type: integer
        mapping:
          - dps_val: 2
            value: true
          - dps_val: 0
            value: false
          - dps_val: 1
            value: false
