name: Temperature and humidity sensor
products:
  - id: ykdqgxukxt7rjyft
    model: TH09B
entities:
  - entity: sensor
    class: temperature
    dps:
      - id: 1
        name: sensor
        type: integer
        unit: C
        mapping:
          - scale: 10
        class: measurement
  - entity: sensor
    class: humidity
    dps:
      - id: 2
        type: integer
        name: sensor
        unit: "%"
        class: measurement
  - entity: sensor
    name: Power state
    class: enum
    category: diagnostic
    dps:
      - id: 3
        type: string
        name: sensor
        mapping:
          - dps_val: low
            value: low
          - dps_val: middle
            value: middle
          - dps_val: high
            value: high
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 9
        name: option
        type: string
        mapping:
          - dps_val: "f"
            value: fahrenheit
          - dps_val: "c"
            value: celsius
  - entity: number
    translation_key: temperature_calibration
    category: config
    class: temperature_delta
    hidden: true
    dps:
      - id: 23
        type: integer
        optional: true
        name: value
        unit: C
        range:
          min: -20
          max: 20
        mapping:
          - scale: 10
  - entity: number
    name: Humidity calibration
    category: config
    hidden: true
    icon: "mdi:water-check"
    dps:
      - id: 24
        type: integer
        optional: true
        name: value
        unit: "%"
        range:
          min: -10
          max: 10
