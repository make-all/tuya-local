name: Air conditioner
products:
  - id: mzhwsoeaumuxleaf
    manufacturer: Confortotal
    model: Mini Split
    model_id: CICON242
  - id: keyxkdt8t38pvrkk
    manufacturer: Daewoo
    model: DA-12XMSAC23
  - id: lhp2i044bxzxmg09
    manufacturer: Aiwa
    model: AWHACC
entities:
  - entity: climate
    translation_only_key: aircon_extra
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: auto
                value: heat_cool
                available: heat_supported
              - dps_val: cold
                value: cool
              - dps_val: wind
                value: fan_only
              - dps_val: wet
                value: dry
              - dps_val: hot
                value: heat
                available: heat_supported
      - id: 2
        type: integer
        name: temperature
        unit: C
        range:
          min: 16
          max: 32
        mapping:
          - dps_val: 61
            value: 16
            hidden: true
          - dps_val: 62
            value: 16.5
            hidden: true
          - dps_val: 63
            value: 17
            hidden: true
          - dps_val: 64
            value: 18
            hidden: true
          - dps_val: 65
            value: 18.5
            hidden: true
          - dps_val: 66
            value: 19
            hidden: true
          - dps_val: 67
            value: 19.5
            hidden: true
          - dps_val: 68
            value: 20
            hidden: true
          - dps_val: 69
            value: 20.5
            hidden: true
          - dps_val: 70
            value: 21
            hidden: true
          - dps_val: 71
            value: 21.5
            hidden: true
          - dps_val: 72
            value: 22
            hidden: true
          - dps_val: 73
            value: 23
            hidden: true
          - dps_val: 74
            value: 23.4
            hidden: true
          - dps_val: 75
            value: 24
            hidden: true
          - dps_val: 76
            value: 24.5
            hidden: true
          - dps_val: 77
            value: 25
            hidden: true
          - dps_val: 78
            value: 25.5
            hidden: true
          - dps_val: 79
            value: 26
            hidden: true
          - dps_val: 80
            value: 26.5
            hidden: true
          - dps_val: 81
            value: 27
            hidden: true
          - dps_val: 82
            value: 28
            hidden: true
          - dps_val: 83
            value: 28.5
            hidden: true
          - dps_val: 84
            value: 29
            hidden: true
          - dps_val: 85
            value: 29.5
            hidden: true
          - dps_val: 86
            value: 30
            hidden: true
          - dps_val: 87
            value: 30.5
            hidden: true
          - dps_val: 88
            value: 31
            hidden: true
          - dps_val: 89
            value: 31.5
            hidden: true
          - dps_val: 90
            value: 32
            hidden: true
      - id: 3
        type: integer
        name: current_temperature
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: strong
            value: strong
          - dps_val: auto
            value: auto
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: high
            value: high
          - dps_val: mute
            value: quiet
      - id: 25
        name: preset_mode
        type: boolean
        mapping:
          - dps_val: true
            value: sleep
          - dps_val: false
            value: comfort
      - id: 31
        type: string
        name: swing_mode
        mapping:
          - dps_val: "off"
            value: "off"
          - dps_val: same
            value: "on"
          - dps_val: vane_1
            value: topmost
          - dps_val: vane_2
            value: top
          - dps_val: vane_3
            value: middle
          - dps_val: vane_4
            value: down
          - dps_val: vane_5
            value: downmost
      - id: 33
        type: boolean
        name: swing_horizontal_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: "on"
      - id: 105
        type: boolean
        optional: true
        name: heat_supported
        mapping:
          - dps_val: true
            value: false
          - value: true
      - id: 106
        type: boolean
        optional: true
        name: inverter_model
      - id: 107
        type: boolean
        optional: true
        name: vswing_position_supported
        mapping:
          - dps_val: true
            value: false
          - value: true
  - entity: switch
    translation_key: ionizer
    category: config
    dps:
      - id: 11
        type: boolean
        name: switch
  - entity: switch
    name: Emergency heat
    icon: "mdi:fire"
    hidden: unavailable
    category: config
    dps:
      - id: 12
        type: boolean
        name: switch
      - id: 105
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: true
            value: false
          - value: true
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: true
            constraint: indoor_fault_code
            conditions:
              - dps_val: null
                value: false
              - dps_val: 0
                value: false
          - value: true
      - id: 22
        type: bitfield
        name: fault_code
      - id: 108
        type: bitfield
        optional: true
        name: indoor_fault_code
  - entity: light
    translation_key: display
    category: config
    dps:
      - id: 36
        type: boolean
        name: switch
  - entity: switch
    name: "On timer"
    icon: "mdi:timer"
    category: config
    dps:
      - id: 101
        type: boolean
        name: switch
  - entity: switch
    name: "Off timer"
    icon: "mdi:timer"
    category: config
    dps:
      - id: 102
        type: boolean
        name: switch
  - entity: time
    name: "On timer"
    category: config
    dps:
      - id: 103
        type: string
        name: hms
      - id: 101
        type: boolean
        name: available
  - entity: time
    name: "Off timer"
    category: config
    dps:
      - id: 104
        type: string
        name: hms
      - id: 102
        type: boolean
        name: available
  - entity: number
    deprecated: time.on_timer  # 2026-05-31
    name: On timer time
    class: duration
    category: config
    dps:
      - id: 103
        type: integer
        name: value
        range:
          min: 0
          max: 2359
  - entity: number
    deprecated: time.off_timer  # 2026-05-31
    name: Off timer time
    class: duration
    category: config
    dps:
      - id: 104
        type: integer
        name: value
        range:
          min: 0
          max: 2359
