name: Electric Fitted Blanket
products:
  - id: veafgxwmhwd5iakw
    model: KASMWEKFITEA
entities:
  - entity: switch
    icon: "mdi:bed"
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: select
    name: Body heat level
    icon: "mdi:thermometer"
    category: config
    dps:
      - id: 2
        type: string
        name: option
        mapping:
          - dps_val: "level_0"
            value: "level 0"
          - dps_val: "level_1"
            value: "level 1"
          - dps_val: "level_2"
            value: "level 2"
          - dps_val: "level_3"
            value: "level 3"
          - dps_val: "level_4"
