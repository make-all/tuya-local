name: Air conditioner
products:
  - id: bf5bade910b5f06210fntj
    manufacturer: Tadiran
    model: Mini Central Inverter
entities:
  - entity: climate
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cooling
                value: cool
              - dps_val: heating
                value: heat
              - dps_val: auto
                value: heat_cool
              - dps_val: drying
                value: dry
              - dps_val: fan
                value: fan_only
              - dps_val: fan_only
                value: fan_only
      - id: 2
        name: temperature
        type: integer
        unit: C
        range:
          min: 16
          max: 32
      - id: 3
        name: current_temperature
        type: integer
        mapping:
          - scale: 10
      - id: 4
        name: mode
        type: string
        hidden: true
      - id: 5
        name: fan_mode
        type: string
        mapping:
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: mid
            value: medium
          - dps_val: high
            value: high
          - dps_val: auto
            value: auto
  - entity: sensor
    name: Outdoor temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 118
        name: sensor
        type: integer
        unit: C
        optional: true
        mapping:
          - scale: 10
