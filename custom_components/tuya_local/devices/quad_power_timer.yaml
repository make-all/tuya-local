  - entity: select
    translation_key: initial_state
    category: config
    hidden: unavailable
    dps:
      - id: 38
        type: string
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
      - id: 38
        type: string
        name: option
        optional: true
        mapping:
          - conditions:
              - dps_val: ["memory", "on", "off"]
                mapping:
                  - dps_val: "on"
                    value: "on"
                  - dps_val: "off"
                    value: "off"
                  - dps_val: memory
                    value: memory
              - dps_val: ["power_off", "power_on", "last"]
                mapping:
                  - dps_val: power_on
                    value: "on"
                  - dps_val: power_off
                    value: "off"
                  - dps_val: last
                    value: memory
              - dps_val: ["0", "1", "2"]
                mapping:
                  - dps_val: "0"
                    value: "off"
                  - dps_val: "1"
                    value: "on"
                  - dps_val: "2"
                    value: memory
              - dps_val: null
                mapping:
                  - dps_val: "on"
                    value: "on"
                  - dps_val: "off"
                    value: "off"
                  - dps_val: memory
                    value: memory
  - entity: select
    translation_key: light_mode
    category: config
    hidden: unavailable
    dps:
      - id: 40
        type: string
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
      - id: 40
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: relay
            value: state
          - dps_val: pos
            value: locator
          - dps_val: none
            value: "off"
  - entity: lock
    translation_key: child_lock
    category: config
    hidden: unavailable
    dps:
      - id: 41
        type: boolean
        optional: true
        name: lock
      - id: 41
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
  - entity: text
    name: Schedule
    category: config
    icon: "mdi:calendar-clock"
    hidden: true
    dps:
