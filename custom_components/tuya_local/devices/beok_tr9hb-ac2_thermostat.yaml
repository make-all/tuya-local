name: Fan coil thermostat
products:
  - id: oqe2ba267qac12ng
    manufacturer: Beok
    model: TR9HB-WIFI-AC2
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cool
                value: cool
              - dps_val: heat
                value: heat
              - dps_val: ventil
                value: fan_only
      - id: 2
        type: string
        name: mode
        hidden: true
      - id: 16
        type: integer
        name: temperature
        range:
          min: 50
          max: 400
        mapping:
          - scale: 10
            step: 5
            constraint: temperature_unit
            conditions:
              - dps_val: c
                range:
                  min: 50
                  max: 400
                step: 5
              - dps_val: f
                range:
                  min: 410
                  max: 1040
                step: 10
      - id: 23
        type: string
        name: temperature_unit
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
      - id: 24
        type: integer
        name: current_temperature
        mapping:
          - scale: 10
      - id: 28
        type: string
        name: fan_mode
        mapping:
          - dps_val: auto
            value: auto
          - dps_val: low
            value: low
          - dps_val: middle
            value: medium
          - dps_val: hight
            value: high
      - id: 36
        type: string
        name: hvac_action
        hidden: true
        mapping:
          - dps_val: open
            value: idle
            constraint: mode
            conditions:
              - dps_val: cool
                value: cooling
              - dps_val: heat
                value: heating
          - dps_val: close
            value: idle
      - id: 105
        type: string
        optional: true
        name: model
  - entity: switch
    translation_key: anti_frost
    category: config
    dps:
      - id: 10
        type: boolean
        name: switch
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 23
        type: string
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        type: boolean
        name: lock
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 109
        type: integer
        name: value
        range:
          min: -99
          max: 99
        mapping:
          - scale: 10
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: c
            value: C
          - dps_val: f
            value: F
      - id: 108
        type: integer
        name: step
        mapping:
          - scale: 10
