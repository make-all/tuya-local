name: Underfloor heating
products:
  - id: abe2ogjiak94ix0j
    manufacturer: ProWarm
    model: Touch Button S series
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat
      - id: 3
        type: string
        name: hvac_action
      - id: 16
        type: integer
        optional: true
        name: temperature
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
            constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: temp_set_f
                step: 9
                range:
                  min: 410
                  max: 950
      - id: 17
        type: integer
        optional: true
        name: temp_set_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
      - id: 23
        type: string
        name: temperature_unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 24
        type: integer
        optional: true
        name: current_temperature
        mapping:
          - scale: 10
            constraint: temperature_unit
            conditions:
              - dps_val: f
                value_redirect: temp_current_f
      - id: 29
        type: integer
        optional: true
        name: temp_current_f
        hidden: true
        mapping:
          - scale: 10
      - id: 58
        type: string
        name: preset_mode
        mapping:
          - dps_val: manual
            value: manual
          - dps_val: schedule
            value: program
          - dps_val: holiday
            value: away
          - dps_val: boost
            value: boost
          - dps_val: override
            value: temp_override
      - id: 110
        type: integer
        optional: true
        name: mcu_version
  - entity: switch
    translation_key: anti_frost
    category: config
    dps:
      - id: 10
        type: boolean
        name: switch
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 23
        type: string
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: number
    name: Holiday temperature
    class: temperature
    category: config
    icon: "mdi:island"
    dps:
      - id: 32
        type: integer
        optional: true
        name: value
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
            constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
                step: 9
                range:
                  min: 410
                  max: 950
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 123
        type: integer
        optional: true
        name: temp_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
  - entity: number
    name: Holiday length
    class: duration
    category: config
    dps:
      - id: 33
        type: integer
        name: value
        unit: d
        range:
          min: 1
          max: 90
  - entity: text
    translation_key: schedule
    category: config
    hidden: true
    dps:
      - id: 37
        type: base64
        optional: true
        name: value
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        type: boolean
        name: lock
  - entity: select
    name: Sensor
    icon: "mdi:home-thermometer"
    category: config
    dps:
      - id: 43
        type: string
        name: option
        mapping:
          - dps_val: air_floor
            value: Internal + floor
          - dps_val: air
            value: Internal
          - dps_val: floor
            value: Floor
          - dps_val: remote_air
            value: External
          - dps_val: remote_air_floor
            value: External + floor
  - entity: light
    translation_key: backlight
    category: config
    dps:
      - id: 44
        name: brightness
        type: integer
        range:
          min: 5
          max: 100
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 45
        type: bitfield
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 45
        type: bitfield
        optional: true
        name: fault_code
  - entity: number
    name: Boost temperature
    class: temperature
    category: config
    dps:
      - id: 101
        type: integer
        optional: true
        name: value
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
            constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
                step: 9
                range:
                  min: 410
                  max: 950
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 125
        type: integer
        optional: true
        name: temp_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
  - entity: number
    name: Boost time
    category: config
    class: duration
    dps:
      - id: 102
        type: integer
        name: value
        unit: h
        range:
          min: 0
          max: 240
        mapping:
          - scale: 10
            step: 5
  - entity: number
    name: Antifrost temperature
    category: config
    class: temperature
    dps:
      - id: 103
        type: integer
        optional: true
        name: value
        range:
          min: 50
          max: 160
        mapping:
          - scale: 10
            step: 5
            constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
                step: 9
                range:
                  min: 410
                  max: 608
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 113
        type: integer
        optional: true
        name: temp_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
  - entity: select
    name: Heating type
    icon: "mdi:heating-coil"
    category: config
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: electric_underfloor
            value: Electric under floor
          - dps_val: water_underfloor
            value: Water under floor
          - dps_val: radiator
            value: Radiator
          - dps_val: wall_panel
            value: Wall panel
          - dps_val: time_clock
            value: Timer
  - entity: select
    name: Floor type
    icon: "mdi:floor-plan"
    category: config
    dps:
      - id: 105
