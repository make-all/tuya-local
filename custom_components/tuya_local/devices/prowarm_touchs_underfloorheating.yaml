    category: config
    class: duration
    dps:
      - id: 109
        type: integer
        name: value
        unit: min
        range:
          min: 0
          max: 15
  - entity: number
    name: Floor temperature
    category: config
    class: temperature
    dps:
      - id: 112
        type: integer
        optional: true
        name: value
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
            constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
                step: 9
                range:
                  min: 410
                  max: 950
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 111
        type: integer
        optional: true
        name: temp_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
      - id: 43
        type: string
        name: available
        mapping:
          - dps_val: floor
            value: true
