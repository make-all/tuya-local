    icon: "mdi:television-ambient-light"
    dps:
      - id: 107
        type: string
        name: option
        mapping:
          - dps_val: "30s"
            value: "30s"
          - dps_val: "1min"
            value: "1m"
          - dps_val: "2min"
            value: "2m"
          - dps_val: "5min"
            value: "5m"
  - entity: number
    name: Floor maximum temperature
    category: config
    class: temperature
    dps:
      - id: 108
        type: integer
        optional: true
        name: value
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
            constraint: unit
            conditions:
              - dps_val: f
                value_redirect: temp_f
                step: 9
                range:
                  min: 410
                  max: 950
      - id: 23
        type: string
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
      - id: 106
        type: integer
        optional: true
        name: temp_f
        hidden: true
        range:
          min: 410
          max: 950
        mapping:
          - scale: 10
            step: 9
      - id: 43
        type: string
        name: available
        mapping:
          - dps_val: air_floor
            value: true
          - dps_val: remote_air_floor
            value: true
          - value: false
  - entity: number
