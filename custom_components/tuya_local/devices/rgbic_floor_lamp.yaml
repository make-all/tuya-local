      - id: 104
        type: integer
        name: option
        optional: true
        mapping:
          - dps_val: 0
            value: Shooting Rainbow
          - dps_val: 1
            value: Shooting Star
          - dps_val: 2
            value: Falling Star
          - dps_val: 3
            value: Star Rainbow
          - dps_val: 4
            value: Sky Rainbow
          - dps_val: 5
