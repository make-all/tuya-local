  - entity: number
    name: Scene data reset
    category: config
    icon: "mdi:restore"
    dps:
      - id: 102
        type: integer
        optional: true
        name: value
        range:
          min: 0
          max: 255
  - entity: number
    name: LED number
    category: config
    icon: "mdi:counter"
    dps:
      - id: 103
        type: integer
        name: value
        range:
          min: 1
          max: 150
