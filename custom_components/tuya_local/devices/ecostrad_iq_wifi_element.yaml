name: Ecostrad iQ WiFi Element
products:
  - id: keq3x2tw6plbbipm
    manufacturer: Ecostrad
    model: iQ WiFi Element
entities:
  - entity: climate
    translation_only_key: thermostat
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: true
            value: "heat"
          - dps_val: false
            value: "off"
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: "auto"
            value: program
          - dps_val: "eco"
            value: eco
          - dps_val: "hot"
            value: comfort
          - dps_val: "rad"
            value: boost
      - id: 16
        type: integer
        name: temperature
        unit: C
        range:
          min: 70
          max: 300
        mapping:
          - scale: 10
            step: 5
      - id: 24
        type: integer
        name: current_temperature
        mapping:
          - scale: 10
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        type: boolean
        name: lock
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 27
        type: integer
        name: value
        unit: C
        range:
          min: -5
          max: 5
