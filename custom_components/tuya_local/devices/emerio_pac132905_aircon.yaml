name: Air conditioner
products:
  - id: bvgvah9atllpyt5s
    manufacturer: Emerio
    model: PAC-132905
entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: "1"
                value: cool
              - dps_val: "3"
                value: dry
              - dps_val: "5"
                value: fan_only
      - id: 2
        type: integer
        name: temperature
        range:
          min: 16
          max: 31
      - id: 3
        type: integer
        name: current_temperature
      - id: 101
        type: string
        name: mode
      - id: 104
        type: string
        name: fan_mode
        mapping:
          - dps_val: "1"
            value: high
          - dps_val: "3"
            value: low
      - id: 103
        type: boolean
        name: preset_mode
        mapping:
          - dps_val: true
            value: sleep
          - dps_val: false
            value: comfort
  - entity: select
    name: Temperature unit
    icon: "mdi:temperature-celsius"
    category: config
    dps:
      - id: 109
        type: boolean
        name: select
        mapping:
          - dps_val: false
            value: Celsius
          - dps_val: true
            value: Fahrenheit
  - entity: switch
    name: Sleep mode
    icon: "mdi:sleep"
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch
  - entity: number
    name: Timer
    icon: "mdi:timer-outline"
    category: config
    dps:
      - id: 105
        type: integer
        name: value
        range:
          min: 0
          max: 24
        unit: h
  - entity: binary_sensor
    name: Fault
    class: problem
    category: diagnostic
    dps:
      - id: 20
        type: bitfield
        name: sensor
