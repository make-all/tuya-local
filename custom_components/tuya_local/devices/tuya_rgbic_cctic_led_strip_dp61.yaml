name: RGBIC CCTIC light strip
entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: white
            value: color_temp
          - dps_val: colour
            value: hs
          - dps_val: scene
            value: Scene
          - dps_val: music
            value: Music
      - id: 24
        name: rgbhsv
        type: hex
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 1000
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000
      - id: 61
        name: brightness
        type: base64
        optional: true
        mask_base: "AAAAFABQMg=="
        mask: "0000000000FF00"
        range:
          min: 3
          max: 100
      - id: 61
        name: color_temp
        type: base64
        optional: true
        mask_base: "AAAAFABQMg=="
        mask: "000000000000FF"
        range:
          min: 0
          max: 100
        mapping:
          - target_range:
              min: 2700
              max: 6500
  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 26
        name: second
        type: integer
        optional: true
        range:
          min: 0
          max: 86400
  - entity: sensor
    name: DP 47
    category: diagnostic
    hidden: true
    dps:
      - id: 47
        type: integer
        name: sensor
        optional: true
  - entity: sensor
    name: DP 53
    category: diagnostic
    hidden: true
    dps:
      - id: 53
        type: integer
        name: sensor
        optional: true
