        name: switch
        type: base64
        optional: true
        persist: true
        mask: "0000400000000000000000000000"

  - entity: select
    name: Alarm 1 wake sound
    category: config
    dps:
      - id: "109"
        name: option
        type: base64
        optional: true
        persist: true
        mask: "000000FF00000000000000000000"
        mapping:
          - dps_val: 0
            value: "None"
          - dps_val: 1
            value: "Birds"
          - dps_val: 2
            value: "Sea"
          - dps_val: 3
            value: "Valley"
          - dps_val: 4
            value: "Piano"
          - dps_val: 5
            value: "Soft"
          - dps_val: 6
            value: "Phone"
          - dps_val: 7
            value: "Beep"
          - dps_val: 8
            value: "Radio"

  - entity: select
    name: Alarm 1 sound effect
    category: config
    dps:
      - id: "109"
        name: option
        type: base64
        optional: true
        persist: true
        mask: "00000000FF000000000000000000"
        mapping:
          - dps_val: 0
            value: "Normal"
          - dps_val: 1
            value: "Fade in"
          - dps_val: 2
            value: "Fade out"

  - entity: number
    name: Alarm 1 volume
    category: config
    mode: slider
    dps:
      - id: "109"
        name: value
        type: base64
        optional: true
        persist: true
        mask: "0000000000FF0000000000000000"
        range:
          min: 1
          max: 10

  - entity: number
    name: Alarm 1 duration
    category: config
    dps:
      - id: "109"
        name: value
        type: base64
        optional: true
        persist: true
        mask: "000000000000FF00000000000000"
        range:
          min: 5
          max: 30
        unit: min

  - entity: select
    name: Alarm 1 wake light mode
    category: config
    dps:
      - id: "109"
        name: option
        type: base64
        optional: true
        persist: true
        mask: "00000000000000FF000000000000"
        mapping:
          - dps_val: 0
            value: "No light"
          - dps_val: 1
            value: "Rainbow"
          - dps_val: 2
            value: "Candle Flicker"
          - dps_val: 3
            value: "Romantic Breath"
          - dps_val: 4
            value: "Quiet Deep Sea"
          - dps_val: 5
            value: "Flowing Colors"
          - dps_val: 6
            value: "Magic Jungle"
          - dps_val: 7
            value: "Perfect Party"
          - dps_val: 8
            value: "Sunrise at Sea"
          - dps_val: 9
            value: "Dynamic Music"

  - entity: number
    name: Alarm 1 wake light lead time
    category: config
    dps:
      - id: "109"
        name: value
        type: base64
        optional: true
        persist: true
        mask: "0000000000000000FF0000000000"
        range:
          min: 0
          max: 120
