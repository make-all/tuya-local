    category: config
    dps:
      - id: "109"
        name: switch
        type: base64
        optional: true
        persist: true
        mask: "0000100000000000000000000000"

  - entity: switch
    name: Alarm 1 Day 2-Tuesday
    category: config
    dps:
      - id: "109"
        name: switch
        type: base64
        optional: true
        persist: true
        mask: "0000200000000000000000000000"

  - entity: switch
    name: Alarm 1 Day 1-Monday
    category: config
    dps:
