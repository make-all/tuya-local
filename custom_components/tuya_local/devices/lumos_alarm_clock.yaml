  - entity: select
    name: Alarm 1 snooze action
    category: config
    dps:
      - id: "109"
        name: option
        type: base64
        optional: true
        persist: true
        mask: "0000000000000000000000FF0000"
        mapping:
          - dps_val: 0
            value: "Mute"
          - dps_val: 1
            value: "Mute + light"
          - dps_val: 2
            value: "Light only"

  # Alarm 2 configuration (DP 111 raw payload)
