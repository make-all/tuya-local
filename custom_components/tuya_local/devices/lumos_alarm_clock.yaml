          - dps_val: 1
            value: "Rainbow"
          - dps_val: 2
            value: "Candle Flicker"
          - dps_val: 3
            value: "Romantic Breath"
          - dps_val: 4
            value: "Quiet Deep Sea"
          - dps_val: 5
            value: "Flowing Colors"
          - dps_val: 6
            value: "Magic Jungle"
          - dps_val: 7
            value: "Perfect Party"
