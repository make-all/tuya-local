        name: button
        type: boolean

  - entity: button
    name: Alarm stop
    translation_only_key: alarm_off
    dps:
      - id: "112"
        name: button
        type: boolean

  # Use these once if DP 109 / 111 are still undefined after first pairing.
  # They write a complete default 14-byte alarm blob so the masked alarm
  # controls above have a real payload to edit locally afterwards.
  - entity: button
    name: Alarm 1 reset
    category: config
    dps:
      - id: "109"
        name: button
        type: base64
        optional: true
        persist: true
        mapping:
          - value: true
            dps_val: "AAB/AwAGDwEeAQkAAAA="

  - entity: button
    name: Alarm 2 reset
    category: config
    dps:
      - id: "111"
        name: button
        type: base64
        optional: true
        persist: true
        mapping:
          - value: true
            dps_val: "AAB/AwAGDwEeAQkAAAA="

  - entity: switch
    name: Music playback
    translation_only_key: music_playback
    dps:
      - id: "129"
        name: switch
        type: boolean

  - entity: switch
    name: Radio
    translation_only_key: radio
    dps:
      - id: "130"
        name: switch
        type: boolean

  # FM tuning is only available while the radio is on (DP 130).
  - entity: number
    name: Radio MHz
    translation_only_key: radio_frequency
    mode: box
    dps:
      - id: "133"
        name: value
        type: base64
        optional: true
        persist: true
        mask: "FF00"
        range:
          min: 76
          max: 108
        step: 1
        unit: MHz
      - id: "130"
        name: available
        type: boolean
        optional: true
        persist: true

  - entity: number
    name: Radio decimal
    translation_only_key: radio_frequency_decimal
    mode: box
    dps:
      - id: "133"
        name: value
        type: base64
        optional: true
        persist: true
        mask: "00FF"
        range:
          min: 0
          max: 9
        step: 1
      - id: "130"
        name: available
        type: boolean
        optional: true
        persist: true

  # DP 114 stores date/time as 7 bytes: year offset, month, day, hour, minute,
  # second and weekday. Expose the wall-clock portion for manual edits.
  - entity: time
    name: Clock time
    translation_only_key: clock_time
    category: config
    dps:
      - id: "114"
        name: hour
        type: base64
        optional: true
        persist: true
        mask: "000000FF000000"
      - id: "114"
        name: minute
        type: base64
        optional: true
        persist: true
        mask: "00000000FF0000"
      - id: "114"
        name: second
        type: base64
        optional: true
        persist: true
        mask: "0000000000FF00"
      - id: "115"
        name: available
        type: boolean
        optional: true
        persist: true
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true

  - entity: switch
    name: Network time sync
    translation_only_key: network_time
    category: config
    dps:
