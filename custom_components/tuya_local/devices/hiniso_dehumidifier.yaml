name: Dehumidifier

entities:
  - entity: humidifier
    class: dehumidifier
    translation_only_key: extended
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 2
        name: humidity
        type: integer
        range:
          min: 30
          max: 90
        mapping:
          - step: 5
      - id: 5
        name: mode
        type: string
        mapping:
          - dps_val: dehumidify
            value: auto
          - dps_val: drying
            value: laundry
          - dps_val: sleep
            value: sleep
      - id: 6
        name: current_humidity
        type: integer

  # WATER TANK FULL
  - entity: binary_sensor
    translation_key: tank_full
    category: diagnostic
    dps:
      - id: 25
        type: string
        name: sensor
        mapping:
          - dps_val: "on"
            value: true
          - dps_val: "off"
            value: false

  # DEVICE PROBLEM
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 19
        type: bitfield
        optional: true
        name: fault_code
      - id: 19
        type: bitfield
        optional: true
        name: description
        mapping:
          - dps_val: 0
            value: OK
          - dps_val: 1
            value: Communication fault
          - dps_val: 2
            value: Indoor sensor fault
          - dps_val: 4
            value: Evaporator sensor fault

  # ANION
  - entity: switch
    translation_key: ionizer
    category: config
    hidden: unavailable
    dps:
      - id: 10
        type: boolean
        optional: true
        name: switch
      - id: 10
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true

  # UV
  - entity: switch
    translation_key: uv_sterilization
    category: config
    hidden: unavailable
    dps:
      - id: 13
        type: boolean
        optional: true
        name: switch
      - id: 13
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true

  # CHILD LOCK
  - entity: lock
    translation_key: child_lock
    category: config
    hidden: unavailable
    dps:
      - id: 16
        type: boolean
        optional: true
        name: lock
      - id: 16
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true

  # FAN SPEED
  - entity: fan
    translation_key: dehumidifier
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 4
        name: speed
        type: string
        mapping:
          - dps_val: low
            value: 33
          - dps_val: mid
            value: 66
          - dps_val: high
            value: 100

  # TIMER
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 17
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: 1h
            value: 1h
          - dps_val: 2h
            value: 2h
          - dps_val: 3h
            value: 3h
          - dps_val: 4h
            value: 4h
          - dps_val: 5h
            value: 5h
          - dps_val: 6h
            value: 6h
          - dps_val: 7h
            value: 7h
          - dps_val: 8h
            value: 8h
          - dps_val: 9h
            value: 9h
          - dps_val: 10h
            value: 10h
          - dps_val: 11h
            value: 11h
          - dps_val: 12h
            value: 12h
          - dps_val: 13h
            value: 13h
          - dps_val: 14h
            value: 14h
          - dps_val: 15h
            value: 15h
          - dps_val: 16h
            value: 16h
          - dps_val: 17h
            value: 17h
          - dps_val: 18h
            value: 18h
          - dps_val: 19h
            value: 19h
          - dps_val: 20h
            value: 20h
          - dps_val: 21h
            value: 21h
          - dps_val: 22h
            value: 22h
          - dps_val: 23h
            value: 23h
          - dps_val: 24h
            value: 24h
