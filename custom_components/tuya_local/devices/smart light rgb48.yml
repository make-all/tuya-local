# Smart Light RGB48 - RGBIC Outdoor String Lights
# Product ID: 2znvfkx64d4fkzxp
# Protocol: 3.4
#
# Notes:
# - Direct color control via DP 24 does not persist reliably on this device.
#   Colors set via DP 59 (base64 scene payload) work correctly and persistently.
#   This matches how the SmartLife app controls the device natively.
# - DPs 47 and 53 are present in device responses but their function is unknown.
#   Included as optional hidden attributes to improve device matching quality.

name: RGBIC Patio String Lights
products:
  - id: 2znvfkx64d4fkzxp
    name: Smart Light RGB48
entities:
  - entity: light
    icon: "mdi:string-lights"
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: color_mode
        mapping:
          - dps_val: "white"
            value: "color_temp"
          - dps_val: "colour"
            value: "hs"
          - dps_val: "scene"
            value: "scene"
          - dps_val: "music"
            value: "music"
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
      - id: 24
        type: hex
        name: rgbhsv
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 1000
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000
      - id: 26
        type: integer
        name: timer
        optional: true
      - id: 47
        type: integer
        name: unknown_47
        optional: true
        hidden: true
      - id: 53
        type: integer
        name: unknown_53
        optional: true
        hidden: true
  - entity: select
    name: Segment Mode
    icon: "mdi:led-strip-variant"
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: "RGB"
            value: "RGB"
          - dps_val: "RGBIC"
            value: "RGBIC"
          - dps_val: "WHITE"
            value: "White"
          - dps_val: "SCENE"
            value: "Scene"
  - entity: text
    name: Holiday Scene
    category: config
    dps:
      - id: 59
        type: base64
        name: value
  - entity: sensor
    name: Bulb Count
    category: diagnostic
    dps:
      - id: 58
        type: integer
        name: sensor
