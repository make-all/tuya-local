name: Fan
products:
  - id: lb9da3os0ihifq7u
    manufacturer: Temple and Webster / Martec
    model_id: AART1643
    model: Alina / Viper
entities:
  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: preset_mode
        optional: true
        mapping:
          - dps_val: smart
            value: smart
          - dps_val: nature
            value: nature
          - dps_val: sleep
            value: sleep
          - dps_val: fresh
            value: fresh
      - id: 3
        type: integer
        name: speed
        optional: true
        range:
          min: 1
          max: 6
      - id: 8
        type: string
        name: direction
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "7h"
            value: "7h"
          - dps_val: "8h"
            value: "8h"
  - entity: light
    hidden: unavailable
    dps:
      - id: 15
        type: boolean
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
      - id: 15
        type: boolean
        optional: true
        name: switch
      - id: 16
        name: brightness
        type: integer
        optional: true
        range:
          min: 1
          max: 100
      - id: 17
        name: color_temp
        type: integer
        optional: true
        range:
          min: 0
          max: 100
        mapping:
          - dps_val: null
            value_redirect: fixed_temp
          - target_range:
              min: 2700
              max: 6000
      - id: 19
        type: string
        optional: true
        name: fixed_temp
        hidden: true
        mapping:
          - dps_val: night
            value: 2700
          - dps_val: warm
            value: 4000
          - dps_val: white
            value: 5000
          - dps_val: cold
            value: 6000
