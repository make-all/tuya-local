name: Heat pump water heater
products:
  - id: zcuzgqkr3aef1hap
    manufacturer: Aqua Plus
    model: APAIO270
entities:
  - entity: water_heater
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: Stand
                value: heat_pump
              - dps_val: Boost
                value: performance
              - dps_val: ELE
                value: electric
      - id: 2
        type: string
        name: mode
        hidden: true
      - id: 4
        type: integer
        name: temperature
        unit: C
        range:
          min: 15
          max: 75
      - id: 21
        type: integer
        name: current_temperature
        unit: C
  # Target/tank temperature are intentionally not duplicated as standalone
  # sensors here (see PR #5548 discussion) - only the current/measured value
  # convention has precedent elsewhere in this repo, and even that was
  # rejected upstream. If long-term statistics for these values are wanted,
  # add `template:` sensors in your own HA config instead.
  - entity: binary_sensor
    translation_key: defrost
    category: diagnostic
    dps:
      - id: 7
        type: boolean
        name: sensor
  - entity: sensor
    name: Expansion valve position
    icon: "mdi:pipe-valve"
    category: diagnostic
    dps:
      - id: 14
        type: integer
        name: sensor
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 15
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 15
        type: bitfield
        name: fault_code
  - entity: sensor
    name: Phase sequence module
    class: enum
    category: diagnostic
    dps:
      - id: 17
        type: string
        name: sensor
        mapping:
          - dps_val: "NO"
            value: Nothing
          # "normal" and "ERR" are unconfirmed guesses - never observed live
          - dps_val: normal
            value: Normal
          - dps_val: ERR
            value: Error
  - entity: sensor
    name: Fan speed
    class: enum
    translation_key: status
    category: diagnostic
    dps:
      - id: 19
        type: string
        name: sensor
        mapping:
          - dps_val: "OFF"
            value: "off"
          - dps_val: LOW
            value: low
          - dps_val: High
            value: high
  - entity: sensor
    name: Suction temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 20
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Return water temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 22
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Coil temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 23
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Discharge temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 24
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    translation_key: ambient_temperature
    class: temperature
    dps:
      - id: 26
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: binary_sensor
    name: Compressor
    class: running
    category: diagnostic
    dps:
      - id: 27
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Four-way valve
    class: opening
    category: diagnostic
    dps:
      - id: 28
        type: boolean
        name: sensor
  - entity: sensor
    name: Circulation mode
    class: enum
    category: diagnostic
    dps:
      - id: 30
        type: boolean
        name: sensor
        mapping:
          - dps_val: true
            value: Fluorine
          - dps_val: false
            value: Water
  - entity: binary_sensor
    name: Low pressure switch
    class: opening
    category: diagnostic
    dps:
      - id: 29
        type: boolean
        name: sensor
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: binary_sensor
    name: Water pump
    class: running
    category: diagnostic
    dps:
      - id: 31
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Electric heating element
    class: running
    category: diagnostic
    dps:
      - id: 32
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: High pressure switch
    class: opening
    category: diagnostic
    dps:
      - id: 33
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Linked switch
    class: opening
    category: diagnostic
    dps:
      # true/false to Close/Open confirmed via app; significance of the
      # linkage feature itself (likely PV/solar interlock) is unconfirmed
      - id: 106
        type: boolean
        name: sensor
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: sensor
    name: Compressor runtime before defrost
    class: duration
    category: diagnostic
    dps:
      - id: 41
        type: integer
        name: sensor
        unit: min
  - entity: sensor
    class: current
    category: diagnostic
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: A
        class: measurement
        mapping:
          - scale: 1000
  - entity: sensor
    class: voltage
    category: diagnostic
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: V
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    class: power
    category: diagnostic
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: W
        class: measurement
        mapping:
          - scale: 10
  - entity: sensor
    name: Total energy
    class: energy
    category: diagnostic
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: kWh
        class: total_increasing
        mapping:
          - scale: 100
      - id: 18
        type: integer
        name: daily
        mapping:
          - scale: 100
  - entity: binary_sensor
    name: Water flow switch
    class: opening
    category: diagnostic
    dps:
      - id: 107
        type: boolean
        name: sensor
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
