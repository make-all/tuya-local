name: NP-DVL-01 Ceiling Fan with RGB+CCT Light
products:
  - id: NP-DVL-01
    name: NP-DVL-01

entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: work_mode
        mapping:
          - dps_val: white
            value: white
          - dps_val: colour
            value: colour
          - dps_val: scene
            value: scene
          - dps_val: music
            value: music
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 3000
              max: 5000
            step: 500
      - id: 24
        type: hex
        name: color
        optional: true

  - entity: time
    translation_key: timer
    category: config
    dps:
      - id: 26
        type: integer
        optional: true
        name: second
        range:
          min: 0
          max: 86399

  - entity: number
    translation_key: timer
    deprecated: time.timer
    category: config
    dps:
      - id: 26
        type: integer
        optional: true
        name: value
        unit: min
        precision: 0
        range:
          min: 0
          max: 86400
        mapping:
          - scale: 60
            step: 60

  - entity: switch
    name: RGB Light
    dps:
      - id: 102
        type: boolean
        name: switch

  - entity: switch
    name: CCT Light
    dps:
      - id: 103
        type: boolean
        name: switch

  - entity: switch
    name: Oscillate
    dps:
      - id: 101
        type: boolean
        name: switch

  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 60
        type: boolean
        name: switch
      - id: 61
        type: string
        name: preset_mode
        mapping:
          - dps_val: fresh
            value: fresh
          - dps_val: nature
            value: nature
      - id: 62
        type: integer
        optional: true
        name: speed
        range:
          min: 1
          max: 6
      - id: 63
        type: string
        optional: true
        name: direction

  - entity: number
    name: Fan timer
    translation_key: timer
    category: config
    icon: "mdi:fan-clock"
    dps:
      - id: 64
        type: integer
        optional: true
        name: value
        unit: min
        range:
          min: 0
          max: 540
