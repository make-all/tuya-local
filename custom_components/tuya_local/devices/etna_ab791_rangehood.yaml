name: Range hood
products:
  - id: ckrqmfj3mjoecvev
    manufacturer: ETNA
    model: AB791
entities:
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: string
        name: speed
        mapping:
          - dps_val: "0"
            value: 0
          - dps_val: "1"
            value: 25
          - dps_val: "2"
            value: 50
          - dps_val: "3"
            value: 75
          - dps_val: "4"
            value: 100
      - id: 12
        type: string
        name: status
        optional: true
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 3
        type: boolean
        name: lock
        optional: true
  - entity: light
    dps:
      - id: 104
        type: string
        name: brightness
        mapping:
          - dps_val: Turn_off
            value: 0
          - dps_val: Level_1
            value: 128
          - dps_val: Level_2
            value: 255
  - entity: number
    translation_key: timer
    class: duration
    category: config
    dps:
      - id: 5
        type: integer
        name: value
        unit: min
        range:
          min: 0
          max: 99
  - entity: button
    name: Quick timer
    dps:
      - id: 6
        type: boolean
        name: button
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 13
        type: integer
        name: sensor
        unit: min
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 14
        type: bitfield
        name: sensor
        optional: true
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 14
        type: bitfield
        name: fault_code
        optional: true
  - entity: sensor
    name: Total runtime
    class: duration
    category: diagnostic
    dps:
      - id: 15
        type: integer
        name: sensor
        unit: h
