name: Curtain
legacy_type: yueqingcombo_yet848pc_curtain
products:
  - id: wraaecjqfiirj8go
    manufacturer: Loonas
    name: Curtain motor
  - id: f6jujmx0is5td50x
    manufacturer: Zemismart
    model: BCM500DS-TYW
  - id: dpqsvdbi
    manufacturer: Miju
    model: CM82
  - id: paxwqamvmc4hpebp
    name: Curtain motor
  - id: xmqkagf5dimcpygi
    manufacturer: Nordice
  - id: iznuapjmqurazh7m
    manufacturer: Emteco
  - id: 4ha1598tkq4dh2yx
    manufacturer: Dooya
    model: DC1545V
entities:
  - entity: cover
    class: curtain
    dps:
      - id: 1
        name: control
        type: string
        optional: true
        mapping:
          - dps_val: open
            value: open
          - dps_val: close
            value: close
          - dps_val: stop
            value: stop
      - id: 2
        name: position
        type: integer
        optional: true
        range:
          min: 0
          max: 100
        mapping:
          - invert: true
      - id: 3
        name: current_position
        type: integer
        optional: true
        range:
          min: 0
          max: 100
        mapping:
          - invert: true
      - id: 7
        name: work_state
        type: string
        optional: true
  - entity: switch
    name: Reverse
    category: config
    icon: "mdi:arrow-u-down-left"
    hidden: unavailable
    dps:
      - id: 5
        type: string
        name: switch
        optional: true
        mapping:
          - dps_val: back
            value: true
          - dps_val: forward
            value: false
      - id: 5
        type: string
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 12
        type: bitfield
        name: sensor
        optional: true
        persist: false
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 12
        name: fault_code
        type: bitfield
        optional: true
