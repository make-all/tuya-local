name: Dehumidifier
products:
  - id: 7pfhrzcnbmc6clf8
    manufacturer: New WideTech
    model: WDH-10EN
entities:
  - entity: humidifier
    class: dehumidifier
    translation_only_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: integer
        name: humidity
        range:
          min: 30
          max: 90
        mapping:
          - step: 5
      - id: 5
        type: string
        name: mode
        mapping:
          - dps_val: dehumidify
            value: dehumidify
          - dps_val: sleep
            value: sleep
          - dps_val: dry
            value: laundry
      - id: 6
        type: integer
        name: current_humidity
  - entity: select
    translation_key: fan_speed
    dps:
      - id: 4
        type: string
        name: option
        mapping:
          - dps_val: low
            value: low
          - dps_val: high
            value: high
  - entity: switch
    translation_key: swing_fan
    dps:
      - id: 8
        type: boolean
        name: switch
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: fault_code
        mapping:
          - dps_val: "E1"
            value: "Temperature sensor"
          - dps_val: "E2"
            value: "Copper tube sensor"
  - entity: binary_sensor
    translation_key: tank_full
    dps:
      - id: 101
        type: boolean
        name: sensor
  - entity: binary_sensor
    translation_key: defrost
    dps:
      - id: 102
        type: boolean
        name: sensor
  - entity: binary_sensor
    translation_key: filter_clean
    dps:
      - id: 103
        type: boolean
        name: sensor
  - entity: binary_sensor
    translation_key: auto_close
    dps:
      - id: 104
        type: boolean
        name: sensor
