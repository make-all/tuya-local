name: Dehumidifier
products:
  - id: 7pfhrzcnbmc6clf8
    manufacturer: New WideTech
    model: WDH-10EN
entities:
  - entity: humidifier
    class: dehumidifier
    translation_only_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: integer
        name: humidity
        range:
          min: 30
          max: 90
        mapping:
          - step: 5
      - id: 5
        type: string
        name: mode
        mapping:
          - dps_val: dehumidify
            value: normal
          - dps_val: sleep
            value: sleep
          - dps_val: dry
            value: laundry
      - id: 6
        type: integer
        name: current_humidity
  - entity: fan
    dps:
      - id: 4
        type: string
        name: speed
        mapping:
          - dps_val: low
            value: 50
          - dps_val: high
            value: 100
      - id: 8
        type: boolean
        name: oscillate
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: OK
          - dps_val: 1
            value: "Temperature sensor"
          - dps_val: 2
            value: "Copper tube sensor"
      - id: 19
        type: bitfield
        name: fault_code
  - entity: binary_sensor
    translation_key: tank_full
    dps:
      - id: 101
        type: boolean
        name: sensor
  - entity: binary_sensor
    translation_key: defrost
    dps:
      - id: 102
        type: boolean
        name: sensor
  - entity: binary_sensor
    name: Filter
    category: diagnostic
    dps:
      - id: 103
        type: boolean
        name: sensor
