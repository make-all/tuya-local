name: Dehumidifier
products:
  - id: puqh7br46pqgczqn
    manufacturer: Aerium
    model: DH12W HEPA WiFi
entities:
  - entity: humidifier
    class: dehumidifier
    translation_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: string
        name: humidity
        range:
          min: 40
          max: 60
        mapping:
          - dps_val: "0"
            value: null
            hidden: true
          - dps_val: "40"
            step: 10
            value: 40
          - dps_val: "50"
            value: 50
            step: 10
          - dps_val: "60"
            value: 60
            step: 10
      - id: 3
        type: string
        name: mode
        mapping:
          - dps_val: "0"
            value: continuous
          - dps_val: "60"
            value: normal
          - value: normal
            hidden: true
      - id: 6
        type: integer
        name: current_humidity
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: string
        name: speed
        mapping:
          - dps_val: Sleep
            value: 100
          - dps_val: Low
            value: 67
          - dps_val: Hight
            value: 33
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 16
        type: boolean
        name: lock
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 17
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "2h"
            value: "2h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "8h"
            value: "8h"
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 18
        type: integer
        name: sensor
        unit: min
        class: measurement
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: fault_code
  - entity: sensor
    class: temperature
    category: diagnostic
    dps:
      - id: 101
        type: integer
        optional: true
        name: sensor
        unit: F
        class: measurement
        mapping:
          - scale: 10
