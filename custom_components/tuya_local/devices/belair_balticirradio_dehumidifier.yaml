name: Dehumidifier
products:
  - id: 5i6ty2ejpu7lmme
    manufacturer: Belair
    model: Baltic Irradio 20L
entities:
  - entity: humidifier
    class: dehumidifier
    translation_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: integer
        name: humidity
        range:
          min: 35
          max: 80
        mapping:
          - step: 5
      - id: 3
        type: integer
        name: current_humidity
      - id: 5
        type: string
        name: mode
        mapping:
          - dps_val: Fan
            value: purify
          - dps_val: Dry
            value: laundry
          - dps_val: Smart
            value: normal
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: string
        name: speed
        mapping:
          - dps_val: Low
            value: 33
          - dps_val: Mid
            value: 66
          - dps_val: High
            value: 100
      - id: 102
        type: boolean
        name: oscillate
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 16
        type: boolean
        name: lock
  - entity: light
    translation_key: indicator
    dps:
      - id: 101
        type: boolean
        name: switch
  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 104
        type: boolean
        name: switch
  - entity: sensor
    class: temperature
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: fault_code
