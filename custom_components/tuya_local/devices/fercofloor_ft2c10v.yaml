# https://www.fercofloor.com/fan-coil/regulacion-fan-coil/fc-wifi-0-10v-ec/cronotermostato-ft2c10v
name: Fan coils
products:
  - id: t1hqfqvgutkalxvo
    manufacturer: Fercofloor
    model: FT2C10V
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cold
                value: cool
              - dps_val: heat
                value: heat
              - dps_val: fan
                value: fan_only
      - id: 2
        type: integer
        name: temperature
        precision: 1
        unit: C
        range:
          min: 50
          max: 350
        mapping:
          - scale: 10
            step: 5
      - id: 3
        type: integer
        name: current_temperature
        precision: 1
        unit: C
        range:
          min: 0
          max: 500
        mapping:
          - scale: 10
            step: 5
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 5
        type: string
        name: fan_mode
        mapping:
          - dps_val: auto
            value: auto
          - dps_val: low
            value: low
          - dps_val: middle
            value: middle
          - dps_val: high
            value: high
      - id: 11
        type: string
        name: preset_mode
        mapping:
          - dps_val: Enable
            value: program
          - dps_val: Disable
            value: manual
      - id: 14
        type: string
        name: hvac_action
        mapping:
          - dps_val: working
            value: cooling
            constraint: mode
            conditions:
              - dps_val: heat
                value: heating
          - dps_val: no_working
            value: idle
            constraint: mode
            conditions:
              - dps_val: fan
                value: fan
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 7
        type: boolean
        name: lock
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 13
        type: bitfield
        name: sensor
        optional: true
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 13
        type: bitfield
        name: fault_code
        optional: true
      - id: 13
        type: bitfield
        name: description
        optional: true
        mapping:
          - dps_val: 0
            value: OK
          - dps_val: 1
            value: Internal sensor
          - dps_val: 2
            value: External sensor
          - dps_val: 4
            value: Device offline
          - dps_val: 8
            value: Low protect
  - entity: text
    translation_key: schedule
    hidden: true
    category: config
    dps:
      - id: 17
        type: base64
        name: value
