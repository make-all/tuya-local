name: Dehumidifier
products:
  - id: bkcqjbvmjmnsmxyw
    manufacturer: Vibrix
    model: Dryflow 12 Pro
entities:
  - entity: humidifier
    class: dehumidifier
    translation_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: string
        name: humidity
        mapping:
          - dps_val: "30"
            value: 30
          - dps_val: "35"
            value: 35
          - dps_val: "40"
            value: 40
          - dps_val: "45"
            value: 45
          - dps_val: "50"
            value: 50
          - dps_val: "55"
