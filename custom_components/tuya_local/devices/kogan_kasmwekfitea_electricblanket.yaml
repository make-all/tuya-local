name: Electric fitted blanket
products:
  - id: veafgxwmhwd5iakw
    manufacturer: Kogan
    model: KASMWEKFITEA
entities:
  - entity: switch
    icon: "mdi:bed"
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: select
    name: Body heat level
    icon: "mdi:thermometer"
    category: config
    dps:
      - id: 2
        type: string
        name: option
        mapping:
          - dps_val: "level_1"
            value: "Level 0"
          - dps_val: "level_2"
            value: "Level 1"
          - dps_val: "level_3"
            value: "Level 2"
          - dps_val: "level_4"
            value: "Level 3"
          - dps_val: "level_5"
            value: "Level 4"
          - dps_val: "level_6"
            value: "Level 5"
