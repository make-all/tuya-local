name: Register booster fan
products:
  - id: smagt9q8bb74cqgr
    manufacturer: VIVOHOME
    model: AirBoost Louver Series
entities:
  - entity: climate
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: operating_mode
            conditions:
              - dps_val: Heat
                value: heat
              - dps_val: Cold
                value: cool
              - dps_val: Wind
                value: fan_only
      - id: 2
        type: string
        name: operating_mode
        hidden: true
      - id: 21
        type: integer
        name: current_temperature
      - id: 20
        type: integer
        name: temperature
        range:
          min: 0
          max: 60
      - id: 3
        type: integer
        name: fan_mode
        mapping:
          - dps_val: 1
            value: "1"
          - dps_val: 2
            value: "2"
          - dps_val: 3
            value: "3"
          - dps_val: 4
            value: "4"
          - dps_val: 5
            value: "5"
          - dps_val: 6
            value: "6"
          - dps_val: 7
            value: "7"
          - dps_val: 8
            value: "8"
          - dps_val: 9
            value: "9"
          - dps_val: 10
            value: "10"
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: integer
        name: speed
        range:
          min: 0
          max: 10
  - entity: select
    name: Louver angle
    icon: "mdi:angle-acute"
    dps:
      - id: 8
        type: string
        name: option
        mapping:
          - dps_val: "60"
            value: "60°"
          - dps_val: "70"
            value: "70°"
          - dps_val: "80"
            value: "80°"
          - dps_val: "90"
            value: "90°"
          - dps_val: "100"
            value: "100°"
          - dps_val: "110"
            value: "110°"
          - dps_val: "120"
            value: "120°"
          - dps_val: all
            value: Auto
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 14
        type: boolean
        name: lock
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: "off"
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 23
        type: integer
        name: sensor
        unit: min
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 28
        type: string
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
  - entity: select
    name: Standby louver
    icon: "mdi:valve"
    category: config
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: Open
            value: Open
          - dps_val: Close
            value: Close
  - entity: switch
    name: Mute
    icon: "mdi:volume-mute"
    category: config
    dps:
      - id: 105
        type: boolean
        name: switch
