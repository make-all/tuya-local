name: Air purifier
products:
  - id: xkorr6vvmwjthxnl
    manufacturer: Trident
    model: AirDome-60
entities:
  - entity: fan
    translation_key: air_purifier
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 3
        name: preset_mode
        type: string
        mapping:
          - dps_val: auto
            value: auto
          - dps_val: manual
            value: manual
          - dps_val: sleep
            value: sleep
      - id: 4
        name: speed
        type: string
        mapping:
          - dps_val: speed1
            value: 17
          - dps_val: speed2
            value: 33
          - dps_val: speed3
            value: 50
          - dps_val: speed4
            value: 67
          - dps_val: speed5
            value: 83
          - dps_val: speed6
            value: 100

  - entity: sensor
    class: pm25
    dps:
      - id: 2
        name: sensor
        type: integer
        unit: ugm3
        class: measurement

  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 7
        name: lock
        type: boolean

  - entity: light
    translation_key: backlight
    category: config
    dps:
      - id: 8
        name: switch
        type: boolean

  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 18
        name: option
        type: string
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "8h"
            value: "8h"
          - dps_val: "12h"
            value: "12h"

  - entity: sensor
    translation_key: air_quality
    class: enum
    dps:
      - id: 21
        name: sensor
        type: string
        mapping:
          - dps_val: great
            value: excellent
          - dps_val: good
            value: good
          - dps_val: medium
            value: poor
          - dps_val: severe
            value: severe

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 22
        type: bitfield
        name: fault_code
      - id: 22
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: ok
          - dps_val: 1
            value: Clean washable filter
          - dps_val: 2
            value: Replace air activator

  - entity: button
    translation_key: filter_reset
    category: config
    dps:
      - id: 101
        name: button
        optional: true
        type: boolean

  - entity: select
    name: Airflow angle
    category: config
    dps:
      - id: 103
        name: option
        type: string
        mapping:
          - dps_val: "30"
            value: "30"
          - dps_val: "60"
            value: "60"
          - dps_val: "90"
            value: "90"
