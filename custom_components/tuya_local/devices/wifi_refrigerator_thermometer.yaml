name: WiFi Refrigerator Thermometer
products:
  - id: rfiojakzjdjmgyrz
    model: MC82
entities:
  - entity: sensor
    name: Temperature
    class: temperature
    dps:
      - id: 1
        type: integer
        name: sensor
        mapping:
          - scale: 10
        unit: C

  - entity: binary_sensor
    name: Alarm
    class: problem
    dps:
      - id: 14
        type: string
        name: sensor
        mapping:
          - dps_val: cancel
            value: false
          - dps_val: alarm
            value: true

  - entity: number
    name: Upper Temp Limit (C)
    category: config
    dps:
      - id: 10
        type: integer
        name: value
        range:
          min: -400
          max: 1000
        mapping:
          - scale: 10

  - entity: number
    name: Lower Temp Limit (C)
    category: config
    dps:
      - id: 11
        type: integer
        name: value
        range:
          min: -400
          max: 1000
        mapping:
          - scale: 10

  - entity: number
    name: Alarm Delay Time
    category: config
    unit: min
    dps:
      - id: 108
        type: integer
        name: value
        range:
          min: 0
          max: 10

  - entity: number
    name: Alarm Duration
    category: config
    unit: min
    dps:
      - id: 106
        type: integer
        name: value
        range:
          min: 1
          max: 10

  - entity: select
    name: Alarm Repeat Interval
    category: config
    dps:
      - id: 105
        type: string
        name: option
        mapping:
          - dps_val: 1h
            value: "1 Hour"
          - dps_val: 2h
            value: "2 Hours"
          - dps_val: 3h
            value: "3 Hours"
          - dps_val: 4h
            value: "4 Hours"
          - dps_val: 5h
            value: "5 Hours"
          - dps_val: 6h
            value: "6 Hours"
          - dps_val: 7h
            value: "7 Hours"
          - dps_val: 8h
            value: "8 Hours"
          - dps_val: 9h
            value: "9 Hours"
          - dps_val: 10h
            value: "10 Hours"
          - dps_val: 11h
            value: "11 Hours"
          - dps_val: 12h
            value: "12 Hours"

  - entity: number
    name: Periodic Report Interval
    category: config
    unit: h
    dps:
      - id: 17
        type: integer
        name: value

  - entity: select
    name: Temperature Unit
    category: config
    dps:
      - id: 102
        type: string
        name: option
        mapping:
          - dps_val: c
            value: Celsius
          - dps_val: f
            value: Fahrenheit

  - entity: switch
    name: Alarm Sound
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch

  - entity: switch
    name: App Push Notifications
    category: config
    dps:
      - id: 104
        type: boolean
        name: switch

  - entity: number
    name: Sampling Interval
    category: config
    unit: min
    dps:
      - id: 6
        type: integer
        name: value

  - entity: switch
    name: Master Alarm Switch
    category: config
    dps:
      - id: 111
        type: boolean
        name: switch

  - entity: button
    name: Force Update Data
    category: config
    dps:
      - id: 107
        type: boolean
        name: button
