name: Smart Water Monitor
products:
  - id: eb0a8e6c88ec94012fduxa
    name: Frizzlife LP365P
  - id: eb1a9dccd17a663803qmrt
    name: Frizzlife LP365
entities:
  - entity: valve
    name: Valve
    class: water
    dps:
      - id: 1
        type: boolean
        name: valve

  # --- CONFIGURATION ---
  - entity: select
    name: Temperature Unit
    category: config
    icon: "mdi:thermometer"
    dps:
      - id: 20
        type: string
        name: option
        mapping:
          - dps_val: "f"
            value: "Fahrenheit"
          - dps_val: "c"
            value: "Celsius"

  - entity: select
    name: Units
    category: config
    icon: "mdi:ruler-square"
    dps:
      - id: 102
        type: string
        name: option
        mapping:
          - dps_val: "us_units"
            value: "Imperial"
          - dps_val: "metric_unit"
            value: "Metric"

  # --- STATUS / DIAGNOSTICS ---
  - entity: sensor
    name: System Status
    class: enum
    category: diagnostic
    icon: "mdi:information-outline"
    dps:
      - id: 24
        type: integer
        name: sensor
        mapping:
          - dps_val: 0
            value: "Normal"
          - dps_val: 1
            value: "Warning"
          - dps_val: 2
            value: "Empty Pipe"
          - dps_val: 3
            value: "Fault"

  - entity: binary_sensor
    class: problem
    name: Leak Alarm
    dps:
      - id: 106
        type: boolean
        name: sensor

  - entity: binary_sensor
    class: moisture
    name: Moisture Detected
    dps:
      - id: 107
        type: boolean
        name: sensor

  - entity: binary_sensor
    class: problem
    name: Low Temperature Alarm
    dps:
      - id: 108
        type: boolean
        name: sensor

  - entity: button
    name: Alarm Clear
    category: config
    icon: "mdi:alarm-off"
    dps:
      - id: 125
        type: string
        name: button
        optional: true

  # --- TEMPERATURE (Optional & Dynamic based on DPS 20) ---
  - entity: sensor
    name: Water Temperature
    class: temperature
    dps:
      - id: 12
        type: integer
        optional: true
        name: sensor
        unit: F
        class: measurement
        mapping:
          - scale: 10.0
            constraint:
              id: 20
              dps_val: "f"
        range:
          min: -40
          max: 212

  - entity: sensor
    name: Water Temperature
    class: temperature
    dps:
      - id: 12
        type: integer
        optional: true
        name: sensor
        unit: C
        class: measurement
        mapping:
          - scale: 10.0
            constraint:
              id: 20
              dps_val: "c"
        range:
          min: -40
          max: 100

  # --- PRESSURE (Optional) ---
  - entity: sensor
    class: pressure
    dps:
      - id: 15
        type: integer
        optional: true
        name: sensor
        unit: psi
        class: measurement
        mapping:
          - scale: 10.0
            constraint:
              id: 102
              dps_val: "us_units"
        range:
          min: 0
          max: 99999

  - entity: sensor
    class: pressure
    dps:
      - id: 15
        type: integer
        optional: true
        name: sensor
        unit: bar
        class: measurement
        mapping:
          - scale: 100.0
            constraint:
              id: 102
              dps_val: "metric_unit"

  # --- VOLUME & FLOW ---
  - entity: sensor
    class: water
    name: Volume Today
    dps:
      - id: 103
        type: integer
        optional: true
        name: sensor
        class: total_increasing
        unit: gal
        mapping:
          - scale: 10 
            constraint:
              id: 102
              dps_val: "us_units"

  - entity: sensor
    class: water
    name: Volume Today
    dps:
      - id: 103
        type: integer
        optional: true
        name: sensor
        class: total_increasing
        unit: L
        mapping:
          - scale: 10.0
            constraint:
              id: 102
              dps_val: "metric_unit"

  - entity: sensor
    class: volume_flow_rate
    name: Flow Rate per Hour
    dps:
      - id: 104
        type: integer
        optional: true
        name: sensor
        class: measurement
        unit: gal/h
        mapping:
          - scale: 1 
            constraint:
              id: 102
              dps_val: "us_units"

  - entity: sensor
    class: volume_flow_rate
    name: Flow Rate per Hour
    dps:
      - id: 104
        type: integer
        optional: true
        name: sensor
        class: measurement
        unit: L/h
        mapping:
          - scale: 1.0
            constraint:
              id: 102
              dps_val: "metric_unit"

  - entity: sensor
    class: volume_flow_rate
    name: Current Flow Rate
    dps:
      - id: 105
        type: integer
        name: sensor
        class: measurement
        unit: gal/min 
        mapping:
          - scale: 1000.0 
            constraint:
              id: 102
              dps_val: "us_units"

  - entity: sensor
    class: volume_flow_rate
    name: Current Flow Rate
    dps:
      - id: 105
        type: integer
        name: sensor
        class: measurement
        unit: L/h
        mapping:
          - scale: 1000.0
            constraint:
              id: 102
              dps_val: "metric_unit"

  # --- MODES & LIMITS ---
  - entity: switch
    name: Protection Enabled
    dps:
      - id: 101
        type: boolean
        name: switch

  - entity: select
    name: Protection Mode
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "AUTO"
            value: "Auto"
          - dps_val: "ADVANCED_SETTING"
            value: "Advanced"

  - entity: select
    name: AUTO Mode
    category: config
    dps:
      - id: 110
        type: string
        name: option
        mapping:
          - dps_val: "mode1"
            value: "Mode 1"
          - dps_val: "mode2"
            value: "Mode 2"
          - dps_val: "mode3"
            value: "Mode 3"

  - entity: select
    name: ADVANCED Mode
    category: config
    dps:
      - id: 111
        type: string
        name: option
        mapping:
          - dps_val: "mode4"
            value: "Mode 4"
          - dps_val: "mode5"
            value: "Mode 5"
          - dps_val: "mode6"
            value: "Mode 6"

  - entity: number
    name: Mode4 Allowed Flow Time
    category: config
    dps:
      - id: 112
        type: integer
        optional: true
        name: value
        unit: min
        range:
          min: 1
          max: 1000
        mapping:
          - scale: 1.0

  - entity: number
    name: Mode4 Allowed Flow Volume
    category: config
    dps:
      - id: 115
        type: integer
        name: value
        unit: gal
        range:
          min: 0
          max: 5000
        mapping:
          - scale: 10.0
            constraint:
              id: 102
              dps_val: "us_units"

  - entity: number
    name: Mode4 Allowed Flow Volume
    category: config
    dps:
      - id: 115
        type: integer
        name: value
        unit: L
        range:
          min: 0
          max: 20000
        mapping:
          - scale: 100.0
            constraint:
              id: 102
              dps_val: "metric_unit"