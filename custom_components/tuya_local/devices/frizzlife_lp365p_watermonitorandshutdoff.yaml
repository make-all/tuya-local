name: Smart Water Monitor
products:
  - id: 89tojzdfimssmkuk
    manufacturer: Frizzlife
    model: LP365P
    name: Frizzlife LP365P
  - id: eb0a8e6c88ec94012fduxa
    manufacturer: Frizzlife
    model: LP365P
    name: Frizzlife LP365P
  - id: eb1a9dccd17a663803qmrt
    manufacturer: Frizzlife
    model: LP365
    name: Frizzlife LP365
entities:
  # Valve
  - entity: valve
    name: Valve
    class: water
    dps:
      - id: 1
        type: boolean
        name: valve

  # --- CONFIGURATION ---
  - entity: select
    name: Temperature Unit
    category: config
    icon: "mdi:thermometer"
    dps:
      - id: 20
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "f"
            value: "Fahrenheit"
          - dps_val: "c"
            value: "Celsius"

  - entity: select
    name: Volume Units
    category: config
    icon: "mdi:ruler-square"
    dps:
      - id: 102
        type: string
        name: option
        mapping:
          - dps_val: "us_units"
            value: "Gallon"
          - dps_val: "metric_unit"
            value: "Liter"

  # --- STATUS / DIAGNOSTICS ---
  - entity: sensor
    name: System Status
    class: enum
    category: diagnostic
    icon: "mdi:information-outline"
    dps:
      - id: 24
        type: integer
        name: sensor
        mapping:
          - dps_val: 0
            value: "Normal"
          - dps_val: 1
            value: "Warning"
          - dps_val: 2
            value: "Empty Pipe"
          - dps_val: 3
            value: "Fault"

  - entity: binary_sensor
    class: moisture
    name: Leak Warning
    dps:
      - id: 106
        type: boolean
        name: sensor

  - entity: binary_sensor
    class: problem
    name: Leak Alarm
    dps:
      - id: 107
        type: boolean
        name: sensor

  - entity: binary_sensor
    class: problem
    name: Low Temperature Alarm
    dps:
      - id: 108
        type: boolean
        name: sensor

  - entity: button
    name: Alarm Clear
    category: config
    icon: "mdi:alarm-off"
    dps:
      - id: 125
        type: string
        name: button
        optional: true

  # --- SENSORS (Dynamically Mapped Inline) ---
  - entity: sensor
    name: Water Temperature
    class: temperature
    dps:
      - id: 20
        type: string
        name: unit_dp
      - id: 12
        type: integer
        optional: true
        name: sensor
        class: measurement
        mapping:
          - constraint: unit_dp
            conditions:
              - dps_val: "f"
                unit: F
                scale: 10.0
              - dps_val: "c"
                unit: C
                scale: 10.0

  - entity: sensor
    name: Water Pressure
    class: pressure
    dps:
      - id: 102
        type: string
        name: unit_dp
      - id: 15
        type: integer
        optional: true
        name: sensor
        class: measurement
        mapping:
          - constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                unit: psi
                scale: 10.0
              - dps_val: "metric_unit"
                unit: bar
                scale: 100.0

  - entity: sensor
    class: water
    name: Today Volume
    dps:
      - id: 102
        type: string
        name: unit_dp
      - id: 103
        type: integer
        optional: true
        name: sensor
        class: total_increasing
        mapping:
          - constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                unit: gal
                scale: 10.0
              - dps_val: "metric_unit"
                unit: L
                scale: 10.0

  - entity: sensor
    class: volume_flow_rate
    name: Hourly Flow Rate
    dps:
      - id: 102
        type: string
        name: unit_dp
      - id: 104
        type: integer
        optional: true
        name: sensor
        class: measurement
        mapping:
          - constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                unit: gal/h
                scale: 1.0
              - dps_val: "metric_unit"
                unit: L/h
                scale: 1.0

  - entity: sensor
    class: volume_flow_rate
    name: Flow Rate
    dps:
      - id: 102
        type: string
        name: unit_dp
      - id: 105
        type: integer
        optional: true
        name: sensor
        class: measurement
        mapping:
          - constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                unit: gal/min
                scale: 1000.0
              - dps_val: "metric_unit"
                unit: L/h
                scale: 1000.0

  # --- MODES & LIMITS ---
  - entity: switch
    name: Protection Enabled
    dps:
      - id: 101
        type: boolean
        name: switch

  - entity: select
    name: Protection Mode
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "AUTO"
            value: "Auto"
          - dps_val: "ADVANCED_SETTING"
            value: "Advanced"

  - entity: select
    name: AUTO Mode
    category: config
    dps:
      - id: 110
        type: string
        name: option
        mapping:
          - dps_val: "mode1"
            value: "Mode 1"
          - dps_val: "mode2"
            value: "Mode 2"
          - dps_val: "mode3"
            value: "Mode 3"
      - id: 109
        type: string
        name: available
        mapping:
          - dps_val: "AUTO"
            value: true
          - value: false

  - entity: select
    name: ADVANCED Mode
    category: config
    dps:
      - id: 111
        type: string
        name: option
        mapping:
          - dps_val: "mode4"
            value: "Mode 4"
          - dps_val: "mode5"
            value: "Mode 5"
          - dps_val: "mode6"
            value: "Mode 6"
      - id: 109
        type: string
        name: available
        mapping:
          - dps_val: "ADVANCED_SETTING"
            value: true
          - value: false

  - entity: number
    name: Advanced Allowed Flow Time
    category: config
    dps:
      - id: 111
        type: string
        name: value
        unit: min
        range:
          min: 1
          max: 1000
        mapping:
          - dps_val: "mode4"
            value_redirect: mode4_time
          - dps_val: "mode5"
            value_redirect: mode5_time
          - dps_val: "mode6"
            value_redirect: mode6_time
      - id: 112
        type: integer
        name: mode4_time
        mapping:
          - scale: 1.0
      - id: 113
        type: integer
        name: mode5_time
        mapping:
          - scale: 1.0
      - id: 114
        type: integer
        name: mode6_time
        mapping:
          - scale: 1.0
      - id: 109
        type: string
        name: available
        mapping:
          - dps_val: "ADVANCED_SETTING"
            value: true
          - value: false

  - entity: number
    name: Advanced Allowed Flow Volume
    category: config
    dps:
      - id: 102
        type: string
        name: unit_dp
      - id: 109
        type: string
        name: available
        mapping:
          - dps_val: "ADVANCED_SETTING"
            value: true
          - value: false
      - id: 111
        type: string
        name: value
        mapping:
          - dps_val: "mode4"
            constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                value_redirect: mode4_gal
              - dps_val: "metric_unit"
                value_redirect: mode4_l
          - dps_val: "mode5"
            constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                value_redirect: mode5_gal
              - dps_val: "metric_unit"
                value_redirect: mode5_l
          - dps_val: "mode6"
            constraint: unit_dp
            conditions:
              - dps_val: "us_units"
                value_redirect: mode6_gal
              - dps_val: "metric_unit"
                value_redirect: mode6_l
      - id: 115
        type: integer
        name: mode4_gal
        unit: gal
        range:
          min: 0
          max: 5000
        mapping:
          - scale: 10.0
      - id: 115
        type: integer
        name: mode4_l
        unit: L
        range:
          min: 0
          max: 20000
        mapping:
          - scale: 100.0
      - id: 116
        type: integer
        name: mode5_gal
        unit: gal
        range:
          min: 0
          max: 5000
        mapping:
          - scale: 10.0
      - id: 116
        type: integer
        name: mode5_l
        unit: L
        range:
          min: 0
          max: 20000
        mapping:
          - scale: 100.0
      - id: 117
        type: integer
        name: mode6_gal
        unit: gal
        range:
          min: 0
          max: 5000
        mapping:
          - scale: 10.0
      - id: 117
        type: integer
        name: mode6_l
        unit: L
        range:
          min: 0
          max: 20000
        mapping:
          - scale: 100.0

  - entity: switch
    name: Allow Minimal Flow
    category: config
    dps:
      - id: 118
        type: boolean
        name: switch
      - id: 109
        type: string
        name: available
        mapping:
          - dps_val: "ADVANCED_SETTING"
            value: true
          - value: false

  - entity: select
    name: Allowed Minimal Flow Rate
    category: config
    dps:
      - id: 119
        type: integer
        name: option
        mapping:
          - dps_val: 0
            value: "0.01 Gal / 2.5 L"
          - dps_val: 1
            value: "0.02 Gal / 5.0 L"
          - dps_val: 2
            value: "0.03 Gal / 7.5 L"
          - dps_val: 3
            value: "0.04 Gal / 10.0 L"
          - dps_val: 4
            value: "0.05 Gal / 12.5 L"
          - dps_val: 5
            value: "0.06 Gal / 15.0 L"
          - dps_val: 6
            value: "0.07 Gal / 17.5 L"
          - dps_val: 7
            value: "0.08 Gal / 20.0 L"
          - dps_val: 8
            value: "0.09 Gal / 22.5 L"
          - dps_val: 9
            value: "0.10 Gal / 25.0 L"
      - id: 109
        type: string
        name: mode_system
      - id: 118
        type: boolean
        name: available
        mapping:
          - dps_val: true
            constraint: mode_system
            conditions:
              - dps_val: "ADVANCED_SETTING"
                value: true
          - value: false
