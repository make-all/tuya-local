name: Camera pet feeder
products:
  - id: cmubbmrw5ibt5gkl
    manufacturer: Arlec
    model: PFC002HA Series 2
entities:
  - entity: switch
    translation_key: flip_image
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch
  - entity: event
    class: motion
    dps:
      - id: 115
        type: base64
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: detected
      - id: 115
        type: base64
        optional: true
        name: snapshot
  - entity: switch
    name: Motion detection
    icon: "mdi:motion-sensor"
    category: config
    dps:
      - id: 134
        type: boolean
        name: switch
  - entity: switch
    name: Camera record
    icon: "mdi:record"
    dps:
      - id: 150
        type: boolean
        name: switch
  - entity: camera
    # 2026-06-08
    deprecated: event_motion, switch_camera_record, switch_motion_detection
    dps:
      - id: 115
        type: base64
        optional: true
        name: snapshot
        sensitive: true
      - id: 134
        type: boolean
        name: motion_enable
      - id: 150
        type: boolean
        name: record
  - entity: select
    translation_key: motion_sensitivity
    category: config
    dps:
      - id: 106
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: low
          - dps_val: "1"
            value: medium
          - dps_val: "2"
            value: high
  - entity: select
    translation_key: night_vision
    category: config
    dps:
      - id: 108
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: auto
          - dps_val: "1"
            value: "off"
          - dps_val: "2"
            value: "on"
  - entity: select
    translation_key: recording_mode
    category: config
    dps:
      - id: 151
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: event
          - dps_val: "2"
            value: continuous
  - entity: number
    translation_key: manual_feed
    dps:
      - id: 201
        type: integer
        optional: true
        name: value
        persist: false
        unit: portions
        range:
          min: 1
          max: 12
        mapping:
          - dps_val: -2001
            value: 0
            hidden: true
          - dps_val: -2000
            value: 0
            hidden: true
          - dps_val: 2001
            value: 0
            hidden: true
          - dps_val: 2000
            value: 0
            hidden: true
          - dps_val: 0
            value: 0
            hidden: true
          - dps_val: null
            value: 0
            hidden: true
  - entity: sensor
    name: Portion size
    class: weight
    category: diagnostic
    dps:
      - id: 202
        type: integer
        name: sensor
        unit: g
        class: measurement
        mapping:
          - scale: 10
  - entity: text
    translation_key: schedule
    category: config
    hidden: true
    dps:
      - id: 207
        type: string
        name: value
