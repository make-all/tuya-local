name: Radiator controller
# products:
#   - id: UNKNOWN
#     manufacturer: Avonflow
#     model: AFD14-H
entities:
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: hot
            value: boost
          - dps_val: eco
            value: eco
          - dps_val: timer
            value: Timer
          - dps_val: program
            value: program
      - id: 16
        type: integer
        name: temperature
        unit: C
        range:
          min: 7
          max: 35
      - id: 24
        type: integer
        name: current_temperature
        mapping:
          - scale: 10
  - entity: number
    translation_key: temperature_calibration
    class: temperature_delta
    category: config
    dps:
      - id: 27
        type: integer
        name: value
        unit: C
        range:
          min: -8
          max: 8
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 40
        type: boolean
        name: lock
  - entity: number
    name: Boost time
    category: config
    icon: "mdi:rocket-launch"
    dps:
      - id: 101
        type: integer
        name: value
        unit: h
        range:
          min: 1
          max: 9
  - entity: select
    name: Window open timeout
    translation_key: timer
    icon: "mdi:window-open-variant"
    category: config
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: immediate
          - dps_val: "60"
            value: "1h"
          - dps_val: "90"
            value: "1h30m"
  - entity: text
    name: Program
    category: config
    icon: "mdi:calendar-clock"
    hidden: true
    dps:
      - id: 110
        type: base64
        optional: true
        name: value
