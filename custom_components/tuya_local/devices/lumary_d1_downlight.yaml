name: Recessed downlight
products:
  - id: nko0qtqcv4dsddvh
    manufacturer: Lumary
    model: D1
    model_id: L-DL6D1
  - id: key5q5hf8heh9xag
    manufacturer: Lumary
    model: D1
    model_id: L-DL6D1
entities:
  # White CCT centre (independent switch, brightness and colour temperature)
  - entity: light
    name: Centre
    icon: "mdi:circle-slice-8"
    dps:
      - id: 63
        type: boolean
        name: switch
      - id: 22
        name: brightness
        type: integer
        range:
          min: 10
          max: 1000
      - id: 23
        name: color_temp
        type: integer
        optional: true
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 2700
              max: 6500
  # RGB ring (independent switch, HSV colour, brightness on value channel)
  - entity: light
    name: Ring
    icon: "mdi:circle-outline"
    dps:
      - id: 54
        type: boolean
        name: switch
      - id: 24
        name: rgbhsv
        type: hex
        optional: true
        format:
          - name: h
            bytes: 2
            range:
              min: 0
              max: 360
          - name: s
            bytes: 2
            range:
              min: 0
              max: 1000
          - name: v
            bytes: 2
            range:
              min: 0
              max: 1000
