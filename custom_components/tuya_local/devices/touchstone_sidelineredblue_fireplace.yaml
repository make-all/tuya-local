name: Touchstone Sideline electric fireplace
products:
  - id: pkgk72uonlqlzcil
    manufacturer: Touchstone
    model: Sideline (red/blue flame variant)
entities:
  - entity: switch
    icon: "mdi:fireplace"
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: climate
    translation_key: heater
    dps:
      - id: 5
        type: string
        name: hvac_mode
        mapping:
          - dps_val: "0"
            value: "off"
          - dps_val: "1"
            constraint: heat_disable
            conditions:
              - dps_val: false
                value: "heat"
              - dps_val: true
                value: "fan_only"
          - dps_val: "2"
            constraint: heat_disable
            conditions:
              - dps_val: false
                value: "heat"
              - dps_val: true
                value: "fan_only"
          - dps_val: "3"
            constraint: heat_disable
            conditions:
              - dps_val: false
                value: "heat"
              - dps_val: true
                value: "fan_only"
      - id: 5
        type: string
        name: preset_mode
        mapping:
          - dps_val: "0"
            value: "none"
          - dps_val: "1"
            value: "low"
          - dps_val: "2"
            value: "high"
          - dps_val: "3"
            value: "auto"
      - id: 2
        name: temperature
        type: integer
        optional: true
        range:
          min: 16
          max: 31
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: "f"
                range:
                  min: 60
                  max: 88
                value_redirect: temp_set_f
      - id: 3
        name: current_temperature
        type: integer
        mapping:
          - constraint: temperature_unit
            conditions:
              - dps_val: "f"
                value_redirect: temp_current_f
      - id: 13
        name: temperature_unit
        type: string
        mapping:
          - dps_val: "c"
            value: C
          - dps_val: "f"
            value: F
      - id: 14
        name: temp_set_f
        type: integer
        optional: true
        hidden: true
        range:
          min: 60
          max: 88
      - id: 15
        name: temp_current_f
        type: integer
        optional: true
        hidden: true
      - id: 107
        type: boolean
        name: heat_disable
        hidden: true

  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 13
        type: string
        name: option
        mapping:
          - dps_val: "c"
            value: celsius
          - dps_val: "f"
            value: fahrenheit

  - entity: select
    name: Flame color
    icon: "mdi:fire"
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "Red + Blue"
          - dps_val: "2"
            value: "Red"
          - dps_val: "3"
            value: "Blue"

  - entity: select
    name: Flame brightness
    icon: "mdi:brightness-6"
    category: config
    dps:
      - id: 102
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "20%"
          - dps_val: "2"
            value: "40%"
          - dps_val: "3"
            value: "60%"
          - dps_val: "4"
            value: "80%"
          - dps_val: "5"
            value: "100%"

  - entity: select
    name: Flame speed
    icon: "mdi:speedometer"
    category: config
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"

  - entity: select
    name: Ember color
    icon: "mdi:campfire"
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
          - dps_val: "6"
            value: "6"
          - dps_val: "7"
            value: "7"
          - dps_val: "8"
            value: "8"
          - dps_val: "9"
            value: "9"
          - dps_val: "10"
            value: "10"
          - dps_val: "11"
            value: "11"
          - dps_val: "12"
            value: "12"

  - entity: select
    name: Ember brightness
    icon: "mdi:brightness-7"
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "L5"
            value: "Off"
          - dps_val: "L0"
            value: "25%"
          - dps_val: "L1"
            value: "50%"
          - dps_val: "L2"
            value: "75%"
          - dps_val: "L3"
            value: "100%"
          - dps_val: "L4"
            value: "Pulsating"

  - entity: select
    translation_key: timer
    icon: "mdi:timer"
    category: config
    dps:
      - id: 106
        type: string
        name: option
        mapping:
          - dps_val: "cancel"
            value: "Cancel"
          - dps_val: "0"
            value: "Cancel"
            hidden: true
          - dps_val: "30"
            value: "30m"
          - dps_val: "1H"
            value: "1h"
          - dps_val: "2H"
            value: "2h"
          - dps_val: "3H"
            value: "3h"
          - dps_val: "4H"
            value: "4h"
          - dps_val: "5H"
            value: "5h"
          - dps_val: "6H"
            value: "6h"
          - dps_val: "7H"
            value: "7h"
          - dps_val: "8H"
            value: "8h"
