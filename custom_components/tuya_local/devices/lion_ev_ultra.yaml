name: Lion EV-Ultra
products:
  - id: pcaduzywoal3zaib
entities:
  # --- CONTRÔLES ---
  - entity: switch
    name: Pilotage Charge
    icon: mdi:ev-station
    dps:
      - id: 124
        name: switch
        type: string
        optional: true
        mapping:
          - dps_val: "OpenCharging"
            value: true
          - dps_val: "CloseCharging"
            value: false

  - entity: switch
    name: Rétroéclairage Écran
    icon: mdi:monitor-screenshot
    category: config
    dps:
      - id: 18
        name: switch
        type: boolean
        optional: true

  - entity: number
    name: Intensité de Charge
    icon: mdi:current-ac
    category: config
    dps:
      - id: 114
        name: value
        type: integer
        optional: true
        range:
          min: 8
          max: 16
        unit: A

  # --- PLANIFICATEURS ---
  - entity: number
    name: Départ Différé
    icon: mdi:timer-sand
    category: config
    dps:
      - id: 118
        name: value
        type: integer
        optional: true
        range:
          min: 0
          max: 24
        unit: h

  - entity: number
    name: Durée Max de Charge
    icon: mdi:timer-stop
    category: config
    dps:
      - id: 119
        name: value
        type: integer
        optional: true
        range:
          min: 0
          max: 24
        unit: h

  # --- CAPTEURS DE MESURE ---
  - entity: sensor
    name: Tension Secteur
    class: voltage
    dps:
      - id: 102
        name: sensor
        type: integer
        optional: true
        unit: V

  - entity: sensor
    name: Intensité Réelle (Phase 1)
    class: current
    dps:
      - id: 105
        name: sensor
        type: integer
        optional: true
        unit: A

  - entity: sensor
    name: Intensité Réelle (Phase 2)
    class: current
    dps:
      - id: 103
        name: sensor
        type: integer
        optional: true
        unit: A

  - entity: sensor
    name: Intensité Réelle (Phase 3)
    class: current
    dps:
      - id: 104
        name: sensor
        type: integer
        optional: true
        unit: A

  - entity: sensor
    name: Puissance active instantanée
    class: power
    dps:
      - id: 106
        name: sensor
        type: integer
        optional: true
        unit: W

  - entity: sensor
    name: Énergie Session de Charge
    class: energy
    icon: mdi:battery-charging-100
    dps:
      - id: 107
        name: sensor
        type: integer
        optional: true
        unit: kWh
        scale: 100

  - entity: sensor
    name: Température Interne
    class: temperature
    dps:
      - id: 110
        name: sensor
        type: integer
        optional: true
        unit: °C
        mapping:
          - scale: 10

  - entity: sensor
    name: Température de la Prise
    class: temperature
    icon: mdi:thermometer-water
    dps:
      - id: 111
        name: sensor
        type: integer
        optional: true
        unit: °C
        mapping:
          - scale: 10

  # --- ÉTATS ---
  - entity: sensor
    name: État Branchement
    icon: mdi:power-plug
    dps:
      - id: 101
        name: sensor
        type: string

  - entity: sensor
    name: Temps de Charge Actuel
    icon: mdi:timer-outline
    dps:
      - id: 122
        name: sensor
        type: string
        optional: true

  # --- DIAGNOSTICS & VERSIONS ---
  - entity: sensor
    name: Puissance Maximale Autorisée
    category: diagnostic
    icon: mdi:shield-flash
    dps:
      - id: 113
        name: sensor
        type: string
        optional: true

  - entity: sensor
    name: Version Logicielle (SW)
    category: diagnostic
    dps:
      - id: 126
        name: sensor
        type: string
        optional: true

  - entity: sensor
    name: Version Matérielle (HW)
    category: diagnostic
    dps:
      - id: 125
        name: sensor
        type: string
        optional: true

  - entity: sensor
    name: Version Système
    category: diagnostic
    dps:
      - id: 23
        name: sensor
        type: string
        optional: true

  - entity: sensor
    name: Énergie Totale (Borne)
    class: energy
    dps:
      - id: 109
        name: sensor
        type: integer
        optional: true
        unit: kWh
        scale: 100

  - entity: sensor
    name: Type de Phase
    icon: mdi:sine-wave
    category: diagnostic
    dps:
      - id: 14
        name: sensor
        type: string
        optional: true

  - entity: sensor
    name: Code Erreur Borne
    category: diagnostic
    dps:
      - id: 10
        name: sensor
        type: integer
        optional: true
