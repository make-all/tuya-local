name: Energy recovery ventilator
products:
  - id: 7788bnexpeq7j8or
    manufacturer: Holtop
    model: CFA-500t

entities:
  - entity: switch
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: select
    name: Operating mode
    dps:
      - id: 2
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: manual
          - dps_val: "1"
            value: timing
          - dps_val: "2"
            value: sleep

  - entity: sensor
    class: carbon_dioxide
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: ppm
        class: measurement

  - entity: sensor
    name: Indoor humidity
    class: humidity
    dps:
      - id: 8
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Indoor temperature
    class: temperature
    dps:
      - id: 9
        type: integer
        name: sensor
        unit: C
        class: measurement

  - entity: sensor
    translation_key: filter_life
    class: duration
    category: diagnostic
    dps:
      - id: 11
        type: integer
        name: sensor
        unit: d
        class: measurement

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 18
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 18
        type: bitfield
        name: fault_code

  - entity: sensor
    name: Outdoor humidity
    class: humidity
    dps:
      - id: 21
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Outdoor temperature
    class: temperature
    dps:
      - id: 22
        type: integer
        name: sensor
        unit: C
        class: measurement

  - entity: binary_sensor
    name: Heating active
    category: diagnostic
    dps:
      - id: 101
        type: boolean
        name: sensor

  - entity: number
    name: Exhaust fan speed
    category: config
    dps:
      - id: 103
        type: integer
        name: value
        range:
          min: 1
          max: 5

  - entity: number
    name: Supply fan speed
    category: config
    dps:
      - id: 104
        type: integer
        name: value
        range:
          min: 1
          max: 5

  - entity: select
    name: Filter replacement time
    category: config
    dps:
      - id: 105
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: disabled
          - dps_val: "1"
            value: 60 days
          - dps_val: "2"
            value: 80 days
          - dps_val: "3"
            value: 100 days
          - dps_val: "4"
            value: 120 days

  - entity: number
    name: Relative humidity setting
    class: humidity
    category: config
    dps:
      - id: 106
        type: integer
        name: value
        unit: "%"
        range:
          min: 50
          max: 99

  - entity: button
    translation_key: factory_reset
    category: config
    hidden: true
    dps:
      - id: 107
        type: boolean
        name: button
        optional: true

  - entity: button
    translation_key: filter_reset
    category: config
    dps:
      - id: 108
        type: boolean
        name: button

  - entity: number
    translation_key: sensor_threshold
    translation_placeholders:
      sensor: CO2
    category: config
    dps:
      - id: 109
        type: integer
        name: value
        unit: ppm
        range:
          min: 800
          max: 2000
        mapping:
          - step: 100

  - entity: number
    name: Defrost entry temperature
    class: temperature
    category: config
    dps:
      - id: 110
        type: integer
        name: value
        unit: C
        range:
          min: -10
          max: 10

  - entity: switch
    name: Heating function
    category: config
    dps:
      - id: 111
        type: boolean
        name: switch

  - entity: select
    name: Bypass mode
    category: config
    dps:
      - id: 112
        type: boolean
        name: option
        mapping:
          - dps_val: true
            value: automatic
          - dps_val: false
            value: manual

  - entity: switch
    name: Bypass active
    dps:
      - id: 113
        type: boolean
        name: switch

  - entity: switch
    name: High speed
    dps:
      - id: 114
        type: boolean
        name: switch

  - entity: number
    name: High speed time
    category: config
    dps:
      - id: 115
        type: integer
        name: value
        unit: min
        range:
          min: 1
          max: 120

  - entity: number
    name: Bypass opening temperature
    class: temperature
    category: config
    dps:
      - id: 116
        type: integer
        name: value
        unit: C
        range:
          min: 5
          max: 30

  - entity: number
    name: Electric heater temperature
    class: temperature
    category: config
    dps:
      - id: 117
        type: integer
        name: value
        unit: C
        range:
          min: 16
          max: 30

  - entity: number
    name: Bypass temperature range
    class: temperature_delta
    category: config
    dps:
      - id: 118
        type: integer
        name: value
        unit: C
        range:
          min: 2
          max: 15

  - entity: number
    name: Balance rate
    category: config
    dps:
      - id: 119
        type: integer
        name: value
        range:
          min: -50
          max: 50
