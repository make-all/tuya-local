name: Heat pump water heater
products:
  - id: svhcpdyj8gvgagyg
    manufacturer: Rinnai
    model: Heat pump hot water system
entities:
  - entity: water_heater
    name: Rinnai heat pump
    dps:
      - id: 2
        type: string
        name: operation_mode
        mapping:
          - dps_val: STANDARD
            value: Standard
            default: true
          - dps_val: ECO
            value: Eco
          - dps_val: HYBRID
            value: Hybrid
          - dps_val: ELECTRIC
            value: Electric
          - dps_val: VACATION
            value: Vacation
      - id: 3
        type: integer
        name: current_temperature
        unit: C
      - id: 5
        type: integer
        name: temperature
        unit: C
        range:
          min: 25
          max: 75
  - entity: switch
    name: Power
    dps:
      - id: 1
        type: boolean
        name: switch
  - entity: lock
    translation_key: child_lock
    dps:
      - id: 12
        type: boolean
        name: lock
  - entity: sensor
    name: Operating state
    category: diagnostic
    dps:
      - id: 8
        type: string
        name: sensor
  - entity: sensor
    translation_key: ambient_temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Tank temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Discharge temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Evaporator temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Suction temperature
    class: temperature
    category: diagnostic
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: EEV opening
    category: diagnostic
    dps:
      - id: 107
        type: integer
        name: sensor
        unit: steps
        class: measurement
  - entity: binary_sensor
    name: Fan
    category: diagnostic
    dps:
      - id: 108
        type: boolean
        name: sensor
  - entity: sensor
    name: Mains voltage
    class: voltage
    category: diagnostic
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: V
        class: measurement
  - entity: sensor
    name: Compressor operation hours
    class: duration
    category: diagnostic
    dps:
      - id: 118
        type: integer
        name: sensor
        unit: h
        class: total_increasing
  - entity: sensor
    name: Unit on hours
    class: duration
    category: diagnostic
    dps:
      - id: 119
        type: integer
        name: sensor
        unit: h
        class: total_increasing
