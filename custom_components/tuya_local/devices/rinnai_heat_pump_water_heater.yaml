name: Heat pump water heater
products:
  - id: svhcpdyj8gvgagyg
    manufacturer: Rinnai
    model: Heat pump hot water system
entities:
  - entity: water_heater
    name: Rinnai heat pump
    dps:
      - id: 2
        type: string
        name: operation_mode
        mapping:
          - dps_val: STANDARD
            value: Standard
            default: true
          - dps_val: ECO
            value: Eco
          - dps_val: HYBRID
            value: Hybrid
          - dps_val: ELECTRIC
            value: Electric
          - dps_val: VACATION
            value: Vacation
      - id: 3
        type: integer
        name: current_temperature
        unit: C
      - id: 5
        type: integer
        name: temperature
        unit: C
        range:
          min: 25
          max: 75
  - entity: switch
    name: Power
    dps:
      - id: 1
        type: boolean
        name: switch
  - entity: lock
    name: Child lock
    dps:
      - id: 12
        type: boolean
        name: lock
  - entity: sensor
    name: Operating state
    dps:
      - id: 8
        type: string
        name: sensor
  - entity: sensor
    name: Unknown 1 DP18
    dps:
      - id: 18
        type: integer
        name: sensor
  - entity: binary_sensor
    name: Unknown 2 DP106
    dps:
      - id: 106
        type: boolean
        name: sensor
  - entity: sensor
    name: Ambient temperature DP101
    class: temperature
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Tank temperature DP102
    class: temperature
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Temperature DP103
    class: temperature
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Evaporator temperature DP104
    class: temperature
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: Suction temperature DP105
    class: temperature
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: sensor
    name: EEV opening
    dps:
      - id: 107
        type: integer
        name: sensor
