name: Air purifier
products:
  - id: me73ary4ppn8bt5b
    manufacturer: Webber
    model: AP9750
entities:
  - entity: fan
    translation_key: air_purifier
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 4
        type: string
        name: speed
        mapping:
          - dps_val: low
            value: 25
          - dps_val: mid
            value: 50
          - dps_val: high
            value: 75
          - dps_val: max
            value: 100
      - id: 3
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: manual
          - dps_val: ai_clean
            value: auto
          - dps_val: sleep
            value: sleep
  - entity: sensor
    translation_key: filter_life
    dps:
      - id: 5
        type: integer
        name: sensor
        unit: "%"
  - entity: switch
    translation_key: uv_sterilization
    category: config
    dps:
      - id: 9
        type: boolean
        name: switch
  - entity: humidifier
    class: humidifier
    dps:
      - id: 10
        type: boolean
        name: switch
      - id: 1
        type: boolean
        name: available
      - id: 13
        type: integer
        name: current_humidity
      - id: 101
        type: integer
        optional: true
        name: humidity
        range:
          min: 31
          max: 80
  - entity: humidifier
    class: dehumidifier
    dps:
      - id: 104
        type: boolean
        name: switch
      - id: 1
        type: boolean
        name: available
      - id: 13
        type: integer
        name: current_humidity
      - id: 101
        type: integer
        optional: true
        name: humidity
        range:
          min: 31
          max: 80
  - entity: sensor
    translation_key: air_quality
    class: enum
    dps:
      - id: 21
        type: string
        name: sensor
        mapping:
          - dps_val: No_data
            value: null
          - dps_val: Good
            value: good
          - dps_val: Normal
            value: moderate
          - dps_val: Bad
            value: poor
  - entity: number
    translation_key: timer
    category: config
    dps:
      - id: 102
        type: integer
        name: value
        unit: h
        range:
          min: 0
          max: 24
  - entity: light
    translation_key: display
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch
        mapping:
          - dps_val: true
            value: false
          - dps_val: false
            value: true
  - entity: binary_sensor
    name: Humidity control
    class: running
    dps:
      - id: 105
        type: boolean
        name: sensor
