name: Portable fan
products:
  - id: 4srsoiozpa7wd9ha
    manufacturer: djive
    model: ARC Portable
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 2
        name: preset_mode
        type: string
        optional: true
        mapping:
          - dps_val: close
            value: normal
          - dps_val: auto
            value: smart
          - dps_val: strong
            value: strong
          - dps_val: fresh
            value: fresh
          - dps_val: sleep
            value: sleep
      - id: 3
        name: speed
        type: integer
        range:
          min: 1
          max: 9
      - id: 5
        type: boolean
        name: oscillate

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 24
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 24
        type: bitfield
        name: fault_code
  - entity: switch
    translation_key: uv_sterilization
    dps:
      - id: 102
        type: boolean
        name: switch

  - entity: switch
    translation_key: sound
    dps:
      - id: 13
        type: boolean
        name: switch

  - entity: sensor
    class: pm25
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: "μg/m³"

  - entity: sensor
    class: battery
    category: diagnostic
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: "%"

  - entity: binary_sensor
    class: battery_charging
    category: diagnostic
    dps:
      - id: 106
        type: boolean
        name: sensor

  - entity: sensor
    translation_key: filter_life
    category: diagnostic
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: "%"

  - entity: button
    translation_key: filter_reset
    category: config
    dps:
      - id: 104
        type: boolean
        optional: true
        name: button
