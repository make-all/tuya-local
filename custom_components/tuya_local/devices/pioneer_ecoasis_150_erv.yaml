name: Energy recovery ventilator

products:
  - id: jqjrmutjj0zfhjzr
    manufacturer: Pioneer
    model: ECOasis 150
    name: Pioneer ECOasis 150 ERV

entities:
  #################################################################
  # Controls
  #################################################################

  - entity: fan
    name: ERV
    dps:
      - id: 1
        type: boolean
        name: switch

      - id: 2
        type: string
        name: preset_mode
        mapping:
          # Device firmware reports the truncated value "manua" (confirmed
          # from the raw Tuya IoT portal JSON), not "manual".
          - dps_val: manua
            value: Manual
          - dps_val: auto
            value: Auto
          - dps_val: sleep
            value: Sleep
          - dps_val: "4"
            value: Pure L
          - dps_val: "5"
            value: Pure M
          - dps_val: "6"
            value: Pure H

  - entity: number
    name: Supply fan speed
    mode: slider
    icon: "mdi:fan-plus"
    dps:
      - id: 101
        type: integer
        name: value
        range:
          min: 0
          max: 8

  - entity: number
    name: Exhaust fan speed
    mode: slider
    icon: "mdi:fan-minus"
    dps:
      - id: 102
        type: integer
        name: value
        range:
          min: 0
          max: 8

  #################################################################
  # Sensors
  #################################################################

  - entity: sensor
    name: PM2.5
    class: pm25
    icon: "mdi:molecule"
    dps:
      - id: 3
        type: integer
        name: sensor
        unit: "µg/m³"
        class: measurement

  - entity: sensor
    name: eCO2
    class: carbon_dioxide
    icon: "mdi:molecule-co2"
    dps:
      - id: 6
        type: integer
        name: sensor
        unit: ppm
        class: measurement

  - entity: sensor
    name: TVOC
    class: volatile_organic_compounds_parts
    icon: "mdi:molecule"
    dps:
      - id: 7
        type: integer
        name: sensor
        unit: ppb
        class: measurement

  - entity: sensor
    name: Indoor humidity
    class: humidity
    icon: "mdi:water-percent"
    dps:
      - id: 8
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Indoor temperature
    class: temperature
    icon: "mdi:thermometer"
    dps:
      - id: 9
        type: integer
        name: sensor
        unit: F
        class: measurement

  #################################################################
  # Diagnostics: filter and fault state
  #################################################################

  - entity: button
    name: Filter reset
    category: diagnostic
    icon: "mdi:filter-remove"
    dps:
      - id: 13
        type: boolean
        name: button

  - entity: sensor
    name: Fault code
    category: diagnostic
    icon: "mdi:alert-octagon"
    dps:
      - id: 18
        type: bitfield
        name: sensor

  - entity: sensor
    name: Filter status
    class: enum
    category: diagnostic
    icon: "mdi:filter-check"
    dps:
      - id: 105
        type: string
        name: sensor
        # Status codes 0-3 are undocumented; exposed as raw values.
        mapping:
          - dps_val: "0"
            value: "0"
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
