name: Litter box
products:
  - id: frho2xmkraxldtwo
    manufacturer: CAST
    model: LB500C
entities:
  - entity: sensor
    class: weight
    category: diagnostic
    dps:
      - id: 6
        type: integer
        optional: true
        name: sensor
        unit: LB
        class: measurement
        precision: 1
        mapping:
          - scale: 10

  - entity: sensor
    name: Daily toilet count
    icon: "mdi:emoticon-poop"
    dps:
      - id: 7
        type: integer
        optional: true
        name: sensor
        unit: times
        class: measurement

  - entity: event
    class: problem
    dps:
      - id: 21
        type: bitfield
        name: event
        mapping:
          - dps_val: 0
            value: clear
          - value: litterbox_unused_24h

  - entity: binary_sensor
    name: Fault
    class: problem
    category: diagnostic
    dps:
      - id: 22
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 22
        type: bitfield
        name: fault_code
      - id: 22
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: ok
          - dps_val: 1
            value: drum_not_installed
          - dps_val: 2
            value: overload

  - entity: sensor
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 101
        type: string
        name: sensor
        mapping:
          - dps_val: isidle
            value: idle
          - dps_val: idlevelling
            value: Leveling
          - dps_val: isclean
            value: cleaning

  - entity: button
    name: Clean
    icon: "mdi:broom"
    dps:
      - id: 102
        type: boolean
        optional: true
        name: button
        mapping:
          - value: "jikeclean"

  - entity: select
    translation_only_key: timer
    name: Cleaning delay
    category: config
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: tensecond
            value: "10s"
          - dps_val: twentysecond
            value: "20s"
          - dps_val: thirdsencond #typo in tuya firmware
            value: "30s"
          - dps_val: forthsecond
            value: "40s"
          - dps_val: sixsecond
            value: "1m"
          - dps_val: ninthsecond
            value: "1m30s"
          - dps_val: onetwosecond
            value: "2m"

  - entity: select
    translation_only_key: timer
    name: Valid toilet time
    category: config
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: tensec
            value: "10s"
          - dps_val: fifteensec
            value: "15s"
          - dps_val: twtenysec
            value: "20s"
          - dps_val: thirdsec
            value: "30s"

  - entity: select
    name: Drum rotations
    category: config
    dps:
      - id: 106
        type: string
        name: option
        mapping:
          - dps_val: onetimes
            value: "1"
          - dps_val: twotimes
            value: "2"

  - entity: select
    name: Minimum cat weight
    category: config
    dps:
      - id: 107
        type: string
        name: option
        mapping:
          - dps_val: twolb
            value: "2.0lb"
          - dps_val: twop5lb
            value: "2.5lb"
          - dps_val: threelb
            value: "3.0lb"
          - dps_val: threep5lb
            value: "3.5lb"

  - entity: sensor
    name: Daily toilet usage
    category: diagnostic
    dps:
      - id: 108
        type: integer
        optional: true
        name: sensor
        unit: times
        class: measurement

  - entity: button
    name: Cancel
    icon: "mdi:stop"
    dps:
      - id: 109
        type: boolean
        optional: true
        name: button
        mapping:
          - value: "nowtocancle"

  - entity: sensor
    name: Toilet duration
    class: duration
    category: diagnostic
    dps:
      - id: 110
        type: integer
        optional: true
        name: sensor
        unit: s
        class: measurement

  - entity: sensor #differs from DP 6, DP6 is continuous weight, DP111 is the weight when the cat got off the litter box
    name: Cat weight
    class: weight
    dps:
      - id: 111
        type: integer
        optional: true
        name: sensor
        unit: LB
        class: measurement
        precision: 1
        mapping:
          - scale: 10

  - entity: switch
    translation_key: auto_clean
    category: config
    dps:
      - id: 112
        type: boolean
        name: switch
