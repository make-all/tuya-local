name: Water leak detector
products:
  - id: 13rpipcbxy5ih282
    manufacturer: Stahlmann Smart
entities:
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 133
        type: bitfield
        name: sensor
        mapping:
          - dps_val: null
            value: false
          - dps_val: 0
            value: false
          - value: true
      - id: 133
        type: bitfield
        name: fault_code
      - id: 133
        type: bitfield
        name: description
        mapping:
          - dps_val: 0
            value: ok
          - dps_val: 1
            value: line_1_attention
          - dps_val: 2
            value: line_2_attention
          - dps_val: 4
            value: line_1_break
          - dps_val: 8
            value: line_2_break
          - dps_val: 16
            value: line_1_short
          - dps_val: 32
            value: line_2_short
          - dps_val: 64
            value: valve_1_break
          - dps_val: 128
            value: valve_2_break
          - dps_val: 256
            value: valve_1_overcurrent
          - dps_val: 512
            value: valve_2_overcurrent
          - dps_val: 1024
            value: wireless_attention
          - dps_val: 2048
            value: wireless_sensor_lost
          - dps_val: 4096
            value: wireless_battery_low
          - dps_val: 8192
            value: module_battery_low
          - dps_val: 16384
            value: counter_1_failure
          - dps_val: 32768
            value: counter_2_failure
          - dps_val: 65536
            value: counter_3_failure
          - dps_val: 131072
            value: counter_4_failure
