name: Robot vacuum and mop
products:
  - id: c4ueb7cxlgmfon1t
    manufacturer: Honiture
    model: Q6 Pro
entities:
  - entity: vacuum
    dps:
      - id: 101
        type: boolean
        name: activate
      - id: 102
        type: boolean
        name: pause
        optional: true
      - id: 3
        type: string
        name: command
        mapping:
          - dps_val: standby
            value: stop
          - dps_val: smart
            value: clean
          - dps_val: chargego
            value: return_to_base
      - id: 13
        type: boolean
        name: locate
      - id: 105
        type: string
        name: status
        mapping:
          - dps_val: idle
            value: standby
          - dps_val: sweep
            value: sweep
          - dps_val: mop
            value: mop
          - dps_val: areaing
            value: areaing
          - dps_val: totaling
            value: totaling
          - dps_val: pointing
            value: pointing
          - dps_val: curpointing
            value: curpointing
          - dps_val: selectroom
            value: selectroom
          - dps_val: remotectl
            value: remotectl
          - dps_val: pause
            value: paused
          - dps_val: tocharge
            value: returning
          - dps_val: chargring
            value: charging
          - dps_val: fullcharge
            value: charged
          - dps_val: fault
            value: error
          - dps_val: dormant
            value: sleep
      - id: 109
        type: string
        name: fan_speed
        mapping:
          - dps_val: quiet
            value: low
          - dps_val: auto
            value: medium
          - dps_val: strong
            value: high
          - dps_val: max
            value: max

  - entity: sensor
    class: battery
    dps:
      - id: 106
        type: integer
        name: sensor
        unit: "%"
        class: measurement

  - entity: sensor
    name: Current clean time
    category: diagnostic
    class: duration
    dps:
      - id: 107
        type: integer
        name: sensor
        unit: s

  - entity: sensor
    name: Current clean area
    category: diagnostic
    class: area
    dps:
      - id: 108
        type: integer
        name: sensor
        unit: "m²"

  - entity: select
    translation_key: mopping
    category: config
    icon: "mdi:cup-water"
    dps:
      - id: 110
        name: option
        type: string
        mapping:
          - dps_val: low
            value: low
          - dps_val: mid
            value: medium
          - dps_val: high
            value: high

  - entity: switch
    translation_key: do_not_disturb
    category: config
    dps:
      - id: 113
        type: boolean
        name: switch

  - entity: number
    translation_key: volume
    category: config
    dps:
      - id: 114
        type: integer
        name: value
        range:
          min: 0
          max: 10

  - entity: sensor
    name: Total clean time
    category: diagnostic
    class: duration
    dps:
      - id: 116
        type: integer
        name: sensor
        unit: s

  - entity: sensor
    name: Total clean area
    category: diagnostic
    class: area
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: "m²"

  - entity: sensor
    name: Total clean count
    category: diagnostic
    icon: "mdi:counter"
    dps:
      - id: 118
        type: integer
        name: sensor
        class: measurement

  - entity: sensor
    name: Side brush time
    category: diagnostic
    dps:
      - id: 119
        type: integer
        name: sensor
        unit: s
        class: measurement

  - entity: sensor
    name: Main brush life
    category: diagnostic
    dps:
      - id: 120
        type: integer
        name: sensor
        unit: s
        class: measurement

  - entity: sensor
    translation_key: filter_life
    category: diagnostic
    dps:
      - id: 121
        type: integer
        name: sensor
        unit: s
        class: measurement

  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 122
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 122
        type: bitfield
        name: fault_code

  - entity: switch
    name: Auto boost
    category: config
    dps:
      - id: 137
        type: boolean
        name: switch

  - entity: binary_sensor
    name: Mop attached
    class: connectivity
    dps:
      - id: 138
        type: boolean
        name: sensor

  - entity: switch
    name: Mop only mode
    category: config
    dps:
      - id: 141
        type: boolean
        name: switch

  - entity: switch
    name: Charge switch
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch

  - entity: switch
    name: Deep clean
    category: config
    dps:
      - id: 142
        type: boolean
        name: switch

  - entity: switch
    name: Room mode
    category: config
    dps:
      - id: 144
        type: boolean
        name: switch
