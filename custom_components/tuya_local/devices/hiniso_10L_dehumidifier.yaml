name: Hiniso 10L Dehumidifier

entities:
  # CORE HUMIDIFIER CONTROLS
  - entity: humidifier
    class: dehumidifier
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 2
        name: humidity
        type: integer
        range:
          min: 30
          max: 90
        mapping:
          - step: 5
      - id: 5
        name: mode
        type: string
        mapping:
          - dps_val: dehumidify
            value: normal
          - dps_val: auto
            value: auto
          - dps_val: continuous
            value: continuous
      - id: 6
        name: current_humidity
        type: integer

  # WATER TANK FULL
  - entity: binary_sensor
    translation_key: tank_full
    category: diagnostic
    dps:
      - id: 25
        type: string
        name: sensor
        mapping:
          - dps_val: "on"
            value: true
          - dps_val: "off"
            value: false

  # FAN SPEED (Converted to a Select Dropdown)
  - entity: select
    name: Fan Speed
    icon: mdi:fan
    category: config
    dps:
      - id: 4
        name: option
        type: string
        mapping:
          - dps_val: low
            value: low
          - dps_val: high
            value: high

# CHILD LOCK
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 16
        type: boolean
        name: lock

  # TIMER
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: "None"
            value: cancel
          - dps_val: "1hr"
            value: 1h
          - dps_val: "2hrs"
            value: 2h
          - dps_val: "3hrs"
            value: 3h
          - dps_val: "4hrs"
            value: 4h
          - dps_val: "5hrs"
            value: 5h
          - dps_val: "6hrs"
            value: 6h
          - dps_val: "7hrs"
            value: 7h
          - dps_val: "8hrs"
            value: 8h
          - dps_val: "9hrs"
            value: 9h
          - dps_val: "10hrs"
            value: 10h
          - dps_val: "11hrs"
            value: 11h
          - dps_val: "12hrs"
            value: 12h
          - dps_val: "13hrs"
            value: 13h
          - dps_val: "14hrs"
            value: 14h
          - dps_val: "15hrs"
            value: 15h
          - dps_val: "16hrs"
            value: 16h
