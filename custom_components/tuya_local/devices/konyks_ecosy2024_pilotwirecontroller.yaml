name: Pilot wire controller
products:
  - id: evyy1wbhi4t7uftn
    manufacturer: Konyks
    model: "eCosy 2024"
entities:
  - entity: climate
    translation_key: heater
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat
      - id: 2
        name: preset_mode
        type: string
        mapping:
          - dps_val: hot
            value: comfort
          - dps_val: comfortable1
            value: "Comfort -1"
          - dps_val: comfortable2
            value: "Comfort -2"
          - dps_val: eco
            value: eco
          - dps_val: cold
            value: away
