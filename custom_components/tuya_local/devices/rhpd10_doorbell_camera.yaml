name: Video doorbell
products:
  - id: ejveurwimrhw5tjf
    manufacturer: Rehentint
    model: RH-PD10 3MP peephole camera
entities:
  - entity: switch
    name: Camera record
    icon: "mdi:record"
    dps:
      - id: 121
        type: boolean
        optional: true
        name: switch
  - entity: event
    class: motion
    dps:
      - id: 115
        type: base64
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: detected
      - id: 115
        type: base64
        optional: true
        name: snapshot
  - entity: event
    class: doorbell
    name: Door image
    dps:
      - id: 154
        type: base64
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: ring
      - id: 154
        type: base64
        optional: true
        name: snapshot
  - entity: switch
    name: Motion detection
    icon: "mdi:motion-sensor"
    category: config
    dps:
      - id: 113
        type: boolean
        optional: true
        name: switch
  - entity: camera
    # 2026-06-08
    deprecated: >-
      switch_camera_record, event_door_image, event_motion,
      switch_motion_detection
    dps:
      - id: 121
        type: boolean
        optional: true
        name: record
      - id: 154
        type: base64
        optional: true
        sensitive: true
        persist: false
        name: snapshot
        mapping:
          - dps_val: null
            value_redirect: movement_pic
      - id: 115
        type: base64
        optional: true
        sensitive: true
        name: movement_pic
      - id: 113
        type: boolean
        optional: true
        name: motion_enable
  - entity: switch
    translation_key: flip_image
    category: config
    dps:
      - id: 103
        type: boolean
        optional: true
        name: switch
        mapping:
          - dps_val: null
            value: false
            hidden: true
  - entity: switch
    translation_key: watermark
    category: config
    dps:
      - id: 104
        type: boolean
        optional: true
        name: switch
        mapping:
          - dps_val: null
            value: false
            hidden: true
  - entity: select
    translation_key: night_vision
    category: config
    dps:
      - id: 108
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: "0"
            value: auto
          - dps_val: "1"
            value: "off"
          - dps_val: "2"
            value: "on"
  - entity: sensor
    name: SD status
    class: enum
    translation_key: status
    category: diagnostic
    icon: "mdi:micro-sd"
    dps:
      - id: 110
        type: integer
        optional: true
        name: sensor
        mapping:
          - dps_val: 1
            value: normal
          - dps_val: 2
            value: fault
          - dps_val: 3
            value: full
          - dps_val: 4
            value: formatting
          - dps_val: 5
            value: missing
          - dps_val: null
            value: normal
            hidden: true
      - id: 109
        type: string
        optional: true
        name: capacity
  - entity: button
    name: SD format
    category: config
    icon: "mdi:micro-sd"
    dps:
      - id: 111
        type: boolean
        name: button
        optional: true
        persist: false
      - id: 117
        type: integer
        name: state
        optional: true
        persist: false
        mapping:
          - dps_val: -2000
            value: Formatting
          - dps_val: -2001
            value: Format failed
          - dps_val: -2002
            value: Card missing
          - dps_val: -2003
            value: Card error
          - dps_val: null
            value: Formatted
          - dps_val: 0
            value: Formatted
  - entity: event
    class: doorbell
    dps:
      - id: 136
        type: string
        name: event
        optional: true
        persist: false
        mapping:
          - dps_val: ""
            value: null
          - dps_val: null
            value: null
          - value: ring
      - id: 136
        type: string
        optional: true
        name: raw_event
  - entity: sensor
    class: battery
    category: diagnostic
    dps:
      - id: 145
        type: integer
        optional: true
        name: sensor
        unit: "%"
        class: measurement
      - id: 126
        type: bitfield
        optional: true
        name: capability
  - entity: binary_sensor
    class: plug
    category: diagnostic
    dps:
      - id: 146
        type: string
        optional: true
        name: sensor
        mapping:
          - dps_val: "1"
            value: true
          - value: false
  - entity: number
    name: Low battery alarm level
    category: config
    icon: "mdi:battery-20"
    dps:
      - id: 147
        type: integer
        optional: true
        name: value
        unit: "%"
        range:
          min: 10
          max: 50
  - entity: binary_sensor
    class: running
    category: diagnostic
    dps:
      - id: 149
        type: boolean
        optional: true
        name: sensor
  - entity: select
    name: PIR sensitivity
    icon: "mdi:motion-sensor"
    category: config
    dps:
      - id: 152
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: "off"
          - dps_val: "1"
            value: low
          - dps_val: "2"
            value: medium
          - dps_val: "3"
            value: high
  - entity: number
    translation_key: volume
    category: config
    dps:
      - id: 160
        type: integer
        name: value
        unit: "%"
        range:
          min: 1
          max: 100
  - entity: switch
    name: Human filter
    icon: "mdi:human"
    category: config
    dps:
      - id: 170
        type: boolean
        name: switch
  - entity: event
    translation_key: alarm
    dps:
      - id: 185
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: alarm
      - id: 185
        type: utf16b64
        optional: true
        name: message
  - entity: switch
    name: AI face recognition
    category: config
    dps:
      - id: 186
        type: boolean
        optional: true
        name: switch
  - entity: event
    name: Push message
    dps:
      - id: 212
        type: string
        name: event
        optional: true
        mapping:
          - dps_val: null
            value: null
          - value: message
      - id: 212
        type: utf16b64
        name: message
        optional: true
  - entity: binary_sensor
    class: tamper
    category: diagnostic
    dps:
      - id: 231
        type: string
        optional: true
        name: sensor
        mapping:
          - dps_val: "0"
            value: false
          - dps_val: "1"
            value: true
