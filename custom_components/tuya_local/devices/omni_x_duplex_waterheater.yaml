name: Water heater
products:
  - id: 5qklaasyaemcifen
    manufacturer: Omni X
    model: Duplex
entities:
  - entity: water_heater
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: heat_pump
      - id: 2
        type: string
        name: unused_mode  # should be hot always for this model
      - id: 4
        type: integer
        name: temperature
        unit: C
        range:
          min: 35
          max: 60
      - id: 16
        type: integer
        name: current_temperature
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 15
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 15
        type: bitfield
        name: fault_code
