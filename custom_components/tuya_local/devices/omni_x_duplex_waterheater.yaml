name: Water heater
products:
  - id: 5qklaasyaemcifen
    manufacturer: Omni X
    model: Duplex
entities:
  - entity: water_heater
    translation_only_key: hot_water
    dps:
      - id: 1
        type: boolean
        name: operation_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            value: "on"
      - id: 2
        type: string
        name: mode
        hidden: true
      - id: 4
        type: integer
        name: temperature
        unit: C
        range:
          min: 30
          max: 60
      - id: 15
        type: bitfield
        name: fault_code
      - id: 16
        type: integer
        name: current_temperature
