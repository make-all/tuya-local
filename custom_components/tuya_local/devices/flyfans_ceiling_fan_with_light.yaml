name: Ceiling fan with light
products:
  - id: hceemlamlwxpufpa
    manufacturer: FlyFans
    model: Ceiling Fan With Light
entities:
  - entity: light
    dps:
      - id: 20
        type: boolean
        name: switch
      - id: 21
        type: string
        name: color_mode
        optional: true
        mapping:
          - dps_val: white
            value: color_temp
          - dps_val: scene
            value: scene
          - dps_val: null
            value: color_temp
            hidden: true
      - id: 22
        type: integer
        name: brightness
        range:
          min: 10
          max: 1000
      - id: 23
        type: integer
        name: color_temp
        range:
          min: 0
          max: 1000
        mapping:
          - target_range:
              min: 3000
              max: 5000
            step: 500
  - entity: text
    name: Light control
    hidden: true
    dps:
      - id: 28
        type: string
        optional: true
        name: value
  - entity: fan
    translation_only_key: fan_with_presets
    dps:
      - id: 60
        type: boolean
        name: switch
      - id: 61
        type: string
        name: preset_mode
        mapping:
          - dps_val: nature
            value: nature
          - dps_val: fresh
            value: fresh
      - id: 63
        type: string
        optional: true
        name: direction
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: reverse
            value: reverse
  - entity: select
    name: Fan Speed
    dps:
      - id: 62
        type: integer
        name: option
        mapping:
          - dps_val: 1
            value: "1"
          - dps_val: 2
            value: "2"
          - dps_val: 3
            value: "3"
          - dps_val: 4
            value: "4"
          - dps_val: 5
            value: "5"
          - dps_val: 6
            value: "6"
