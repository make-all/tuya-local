name: Triple water timer
products:
  - id: j6nltlprwlyedyy4
    manufacturer: Shrivee
    model: HCT-638
entities:
  - entity: valve
    translation_key: valve_x
    translation_placeholders:
      x: "1"
    class: water
    dps:
      - id: 1
        type: boolean
        name: valve
  - entity: valve
    translation_key: valve_x
    translation_placeholders:
      x: "2"
    class: water
    dps:
      - id: 2
        type: boolean
        name: valve
  - entity: valve
    translation_key: valve_x
    translation_placeholders:
      x: "3"
    class: water
    dps:
      - id: 3
        type: boolean
        name: valve
  - entity: number
    translation_key: timer_x
    translation_placeholders:
      x: "1"
    class: duration
    category: config
    dps:
      - id: 17
        type: integer
        name: value
        range:
          min: 0
          max: 43200
        unit: s
  - entity: number
    translation_key: timer_x
    translation_placeholders:
      x: "2"
    class: duration
    category: config
    dps:
      - id: 18
        type: integer
        name: value
        range:
          min: 0
          max: 43200
        unit: s
  - entity: number
    translation_key: timer_x
    translation_placeholders:
      x: "3"
    class: duration
    category: config
    dps:
      - id: 19
        type: integer
        name: value
        range:
          min: 0
          max: 43200
        unit: s
  - entity: sensor
    name: Weather delay remaining
    category: diagnostic
    icon: "mdi:weather-cloudy-clock"
    class: duration
    dps:
      - id: 42
        type: integer
        name: sensor
        unit: h
  - entity: switch
    name: Smart weather delay
    icon: "mdi:weather-cloudy-clock"
    category: config
    dps:
      - id: 43
        type: boolean
        name: switch
  - entity: sensor
    name: Weather
    class: enum
    category: diagnostic
    dps:
      - id: 44
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: sunny
            value: sunny
            icon: "mdi:weather-sunny"
          - dps_val: cloudy
            value: cloudy
            icon: "mdi:weather-cloudy"
          - dps_val: rainy
            value: rainy
            icon: "mdi:weather-rainy"
          - dps_val: snowy
            value: snowy
            icon: "mdi:weather-snowy"
          - dps_val: null
            icon: "mdi:weather-sunny-off"
            hidden: true
  - entity: select
    name: Weather delay
    icon: "mdi:weather-cloudy-clock"
    translation_key: timer
    category: config
    dps:
      - id: 45
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1"
            value: "1d"
          - dps_val: "2"
            value: "2d"
          - dps_val: "3"
            value: "3d"
          - dps_val: "4"
            value: "4d"
          - dps_val: "5"
            value: "5d"
          - dps_val: "6"
            value: "6d"
          - dps_val: "7"
            value: "7d"
  - entity: sensor
    category: diagnostic
    class: battery
    dps:
      - id: 47
        type: integer
        name: sensor
        mapping:
          - scale: 20
        unit: '%'
        precision: 0
  - entity: sensor
    category: diagnostic
    class: signal_strength
    dps:
      - id: 118
        type: integer
        name: sensor
        unit: dBm
  - entity: sensor
    name: Valve 1 state
    translation_key: status
    category: diagnostic
    class: enum
    dps:
      - id: 119
        type: string
        name: sensor
        mapping:
          - dps_val: idle
            value: idle
          - dps_val: manual
            value: manual
          - dps_val: spray
            value: working
          - dps_val: timing
            value: scheduled
  - entity: sensor
    name: Valve 2 state
    category: diagnostic
    translation_key: status
    class: enum
    dps:
      - id: 120
        type: string
        name: sensor
        mapping:
          - dps_val: idle
            value: idle
          - dps_val: manual
            value: manual
          - dps_val: spray
            value: working
          - dps_val: timing
            value: scheduled
  - entity: sensor
    name: Valve 3 state
    category: diagnostic
    translation_key: status
    class: enum
    dps:
      - id: 121
        type: string
        name: sensor
        mapping:
          - dps_val: idle
            value: idle
          - dps_val: manual
            value: manual
          - dps_val: spray
            value: working
          - dps_val: timing
            value: scheduled
