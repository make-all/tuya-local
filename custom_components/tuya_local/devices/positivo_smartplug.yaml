name: Positivo Smart Plug 10A CTD
products:
  - id: pq860vo9ib50jhud
    manufacturer: Positivo
    model: Smart Plug 10A CTD

entities:
  # DP 1 — Main on/off switch
  - entity: switch
    class: outlet
    dps:
      - id: 1
        type: boolean
        name: switch

  # DP 9 — Countdown timer (seconds)
  - entity: time
    category: config
    translation_key: timer
    hidden: unavailable
    dps:
      - id: 9
        type: integer
        optional: true
        name: second
        range:
          min: 0
          max: 86400
      - id: 9
        type: integer
        optional: true
        name: available
        mapping:
          - dps_val: null
            value: false
          - value: true

  # DP 17 — Total accumulated energy
  # DP 25 (electricity_coe) attached as calibration
  - entity: sensor
    class: energy
    category: diagnostic
    dps:
      - id: 17
        name: sensor
        type: integer
        unit: Wh
        class: total_increasing
        optional: true
      - id: 25
        type: integer
        name: calibration
        optional: true

  # DP 18 — Instantaneous current (mA, Tuya scale=0 — no division needed)
  # DP 23 (electric_coe) attached as calibration
  - entity: sensor
    category: diagnostic
    class: current
    dps:
      - id: 18
        name: sensor
        type: integer
        class: measurement
        unit: mA
      - id: 23
        type: integer
        name: calibration
        optional: true

  # DP 19 — Instantaneous power (W, Tuya scale=1 → raw/10 → tuya-local scale: 10)
  # DP 24 (power_coe) attached as calibration
  - entity: sensor
    category: diagnostic
    class: power
    dps:
      - id: 19
        name: sensor
        type: integer
        class: measurement
        unit: W
        mapping:
          - scale: 10
      - id: 24
        type: integer
        name: calibration
        optional: true

  # DP 20 — Instantaneous voltage (V, Tuya scale=1 → raw/10 → tuya-local scale: 10)
  # DP 22 (voltage_coe) attached as calibration
  - entity: sensor
    category: diagnostic
    class: voltage
    dps:
      - id: 20
        name: sensor
        type: integer
        class: measurement
        unit: V
        mapping:
          - scale: 10
      - id: 22
        type: integer
        name: calibration
        optional: true

  # DP 26 — Fault bitmap (ov_cr, ov_vol, ov_pwr, ls_cr, ls_vol, ls_pow)
  # First DP entry drives the boolean OK/Problem state.
  # Second entry exposes the raw bitfield as the fault_code attribute.
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 26
        type: bitfield
        name: sensor
        optional: true
        persist: false
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 26
        type: bitfield
        name: fault_code
        optional: true
