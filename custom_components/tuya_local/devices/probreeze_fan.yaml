name: "Ventilator — Pro Breeze 40\" Bladeless Tower Fan"
products:
  - id: yrzylxax1qspdgpp
entities:
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: Manuell
          - dps_val: rhythm
            value: Nature
          - dps_val: sleep
            value: Ruhemodus
          - dps_val: smart
            value: Auto
      - id: 101
        type: boolean
        name: oscillate
      - id: 102
        type: integer
        name: speed
        range:
          min: 1
          max: 6
  - entity: light
    name: Display-Licht
    icon: "mdi:led-on"
    dps:
      - id: 106
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: true
          - dps_val: true
            value: false
  - entity: switch
    name: Ton
    icon: "mdi:volume-high"
    dps:
      - id: 28
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: true
          - dps_val: true
            value: false
