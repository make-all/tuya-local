name: "Ventilator — Pro Breeze 40\" Bladeless Tower Fan"
products:
  - id: yrzylxax1qspdgpp
entities:
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: Manuell
          - dps_val: rhythm
            value: Nature
          - dps_val: sleep
            value: Ruhemodus
          - dps_val: smart
            value: Auto
      - id: 101
        type: boolean
        name: oscillate
      - id: 102
        type: integer
        name: speed
        range:
          min: 1
          max: 6
  - entity: light
    name: Display-Licht
    icon: "mdi:led-on"
    dps:
      - id: 106
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: true
          - dps_val: true
            value: false
  - entity: switch
    name: Ton
    icon: "mdi:volume-high"
    dps:
      - id: 28
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: true
          - dps_val: true
            value: false
  - entity: select
    name: Timer
    icon: "mdi:timer-outline"
    # Hier definieren wir, welche Werte Home Assistant im Dropdown anzeigt:
    options:
      - "Aus"
      - "1 Stunde"
      - "2 Stunden"
      - "3 Stunden"
      - "4 Stunden"
      - "5 Stunden"
      - "6 Stunden"
      - "7 Stunden"
    dps:
      - id: 18
        type: string
        name: select_option
        mapping:
          - dps_val: cancel
            value: "Aus"
          - dps_val: 1h
            value: "1 Stunde"
          - dps_val: 2h
            value: "2 Stunden"
          - dps_val: 3h
            value: "3 Stunden"
          - dps_val: 4h
            value: "4 Stunden"
          - dps_val: 5h
            value: "5 Stunden"
          - dps_val: 6h
            value: "6 Stunden"
          - dps_val: 7h
            value: "7 Stunden"
