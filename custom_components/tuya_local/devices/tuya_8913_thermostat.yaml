name: Thermostat
products:
  - id: agjmb2taqrv9gvfe
    manufacturer: Tuya
    model: "8913"
entities:
  - entity: climate
    translation_only_key: thermostat
    dps:
      - id: 1
        name: hvac_mode
        type: boolean
        mapping:
          - dps_val: true
            value: heat
          - dps_val: false
            value: "off"
      - id: 2
        name: temperature
        type: integer
        unit: C
        range:
          min: 50
          max: 990
        mapping:
          - scale: 10
            step: 5
      - id: 3
        type: integer
        name: current_temperature
        unit: C
        range:
          min: -90
          max: 990
        mapping:
          - scale: 10
            step: 1
      - id: 4
        type: string
        name: preset_mode
        mapping:
          - dps_val: manual
            value: none
          - dps_val: auto
            value: home
      - id: 5
        type: string
        name: hvac_action
        mapping:
          - dps_val: heating
            value: heating
          - dps_val: idle
            value: idle
  - entity: lock
    translation_key: child_lock
    category: config
    dps:
      - id: 9
        type: boolean
        name: lock
  - entity: binary_sensor
    category: diagnostic
    class: problem
    dps:
      - id: 11
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 11
        name: fault_code
        type: bitfield
  - entity: number
    name: Maximum temperature
    category: config
    class: temperature
    icon: "mdi:thermometer-chevron-up"
    dps:
      - id: 15
        type: integer
        name: value
        unit: C
        range:
          min: 6
          max: 99
        mapping:
          - scale: 1
            step: 1
  - entity: number
    name: Minimum temperature
    category: config
    class: temperature
    icon: "mdi:thermometer-chevron-down"
    dps:
      - id: 16
        type: integer
        name: value
        unit: C
        range:
          min: 5
          max: 99
        mapping:
          - scale: 1
            step: 1
  - entity: number
    name: Calibration offset
    category: config
    icon: "mdi:arrow-collapse-up"
    dps:
      - id: 19
        type: integer
        name: value
        unit: °
        range:
          min: -9
          max: 9
        mapping:
          - scale: 1
  - entity: number
    name: Calibration of NTC
    category: config
    icon: "mdi:arrow-collapse-up"
    dps:
      - id: 101
        type: integer
        name: value
        unit: °
        range:
          min: -9
          max: 9
        mapping:
          - scale: 1
  - entity: switch
    translation_key: sleep
    category: config
    dps:
      - id: 103
        type: boolean
        name: switch
  - entity: switch
    name: Programming Key
    category: config
    dps:
      - id: 104
        type: boolean
        name: switch
  - entity: select
    name: Sensor selection
    category: config
    icon: "mdi:home-thermometer"
    dps:
      - id: 110
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "INT"
            value: Internal
          - dps_val: "OUT"
            value: External
          - dps_val: "ALL"
  - entity: sensor
    name: current_temperature
    class: temperature
    dps:
      - id: 3
        type: integer
        name: sensor
        unit: C
        mapping:
          - scale: 10
            step: 1
