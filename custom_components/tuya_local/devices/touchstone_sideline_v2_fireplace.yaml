name: Touchstone Sideline electric fireplace
products:
  - id: pkgk72uonlqlzcil
    manufacturer: Touchstone
    model: Sideline (red/blue flame variant)
entities:
  - entity: switch
    translation_key: power
    icon: "mdi:fireplace"
    dps:
      - id: 1
        type: boolean
        name: switch

  - entity: climate
    name: Heater
    dps:
      - id: 5
        type: string
        name: hvac_mode
        mapping:
          - dps_val: "0"
            value: "off"
          - dps_val: "1"
            value: "heat"
          - dps_val: "2"
            value: "heat"
      - id: 5
        type: string
        name: preset_mode
        mapping:
          - dps_val: "0"
            value: "none"
          - dps_val: "1"
            value: "low"
          - dps_val: "2"
            value: "high"
      - id: 14
        type: integer
        name: temperature
        range:
          min: 60
          max: 88
      - id: 15
        type: integer
        name: current_temperature
      - id: 13
        type: string
        name: temperature_unit
        mapping:
          - dps_val: "f"
            value: F
          - dps_val: "c"
            value: C

  - entity: select
    name: Flame color
    icon: "mdi:fire"
    dps:
      - id: 101
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "Red + Blue"
          - dps_val: "2"
            value: "Red"
          - dps_val: "3"
            value: "Blue"

  - entity: select
    name: Flame brightness
    icon: "mdi:brightness-6"
    category: config
    dps:
      - id: 102
        type: string
        name: option
        mapping:
          - dps_val: "0"
            value: "Off"
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"

  - entity: select
    name: Flame speed
    icon: "mdi:speedometer"
    category: config
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"

  - entity: select
    name: Ember color
    icon: "mdi:campfire"
    dps:
      - id: 104
        type: string
        name: option
        mapping:
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
          - dps_val: "6"
            value: "6"
          - dps_val: "7"
            value: "7"
          - dps_val: "8"
            value: "8"
          - dps_val: "9"
            value: "9"
          - dps_val: "10"
            value: "10"
          - dps_val: "11"
            value: "11"
          - dps_val: "12"
            value: "12"

  - entity: select
    name: Ember brightness
    icon: "mdi:brightness-7"
    category: config
    dps:
      - id: 109
        type: string
        name: option
        mapping:
          - dps_val: "L5"
            value: "Off"
          - dps_val: "L0"
            value: "1"
          - dps_val: "L1"
            value: "2"
          - dps_val: "L2"
            value: "3"
          - dps_val: "L3"
            value: "4"
          - dps_val: "L4"
            value: "5"

  - entity: select
    name: Timer
    icon: "mdi:timer"
    category: config
    dps:
      - id: 106
        type: string
        name: option
        mapping:
          - dps_val: "cancel"
            value: "Cancel"
          - dps_val: "0"
            value: "Cancel"
          - dps_val: "30"
            value: "30m"
          - dps_val: "1H"
            value: "1h"
          - dps_val: "2H"
            value: "2h"
          - dps_val: "3H"
            value: "3h"
          - dps_val: "4H"
            value: "4h"
          - dps_val: "5H"
            value: "5h"
          - dps_val: "6H"
            value: "6h"
          - dps_val: "7H"
            value: "7h"
          - dps_val: "8H"
            value: "8h"
