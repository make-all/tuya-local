name: Fan
products:
  - id: udqi9qir8xu7fxmd
    manufacturer: Medion
    model: P25 SF (MD100144)
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 3
        type: integer
        name: speed
        range:
          min: 1
          max: 10
      - id: 2
        type: string
        name: oscillate
        mapping:
          - dps_val: "3Dmode"
            value: true
          - dps_val: normal
            value: false
          - value: false
            hidden: true
      - id: 2
        type: string
        name: preset_mode
        mapping:
          - dps_val: normal
            value: normal
          - dps_val: nature
            value: nature
          - dps_val: sleep
            value: sleep
          - dps_val: auto
            value: auto
          - dps_val: "3Dmode"
            value: 3D Mode

  - entity: select
    name: Vertical oscillation
    icon: "mdi:arrow-up-down-bold-outline"
    category: config
    dps:
      - id: 6
        type: string
        name: option
        mapping:
          - dps_val: Run
            value: "On"
          - dps_val: Stop
            value: "Off"

  - entity: select
    name: Horizontal swing
    icon: "mdi:arrow-left-right-bold-outline"
    category: config
    dps:
      - id: 7
        type: string
        name: option
        mapping:
          - dps_val: Cancel
            value: "Off"
          - dps_val: "0"
            value: "0°"
          - dps_val: "30"
            value: "30°"
          - dps_val: "90"
            value: "90°"
          - dps_val: "120"
            value: "120°"
          - dps_val: "180"
            value: "180°"
          - dps_val: "350"
            value: "350°"

  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 22
        type: string
        name: option
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "1h"
            value: "1h"
          - dps_val: "2h"
            value: "2h"
          - dps_val: "3h"
            value: "3h"
          - dps_val: "4h"
            value: "4h"
          - dps_val: "5h"
            value: "5h"
          - dps_val: "6h"
            value: "6h"
          - dps_val: "7h"
            value: "7h"
          - dps_val: "8h"
            value: "8h"
          - dps_val: "9h"
            value: "9h"
          - dps_val: "10h"
            value: "11h"
          - dps_val: "12h"
            value: "12h"

  - entity: switch
    translation_key: sound
    category: config
    dps:
      - id: 102
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: true
          - dps_val: true
            value: false

  - entity: switch
    translation_key: Child safety lock
    icon: mdi:lock
    category: config
    dps:
      - id: 14
        type: boolean
        name: switch
        mapping:
          - dps_val: true
            value: true
          - dps_val: false
            value: false

  - entity: switch
    translation_key: Display
    icon: mdi:display
    category: config
    dps:
      - id: 101
        type: boolean
        name: switch
        mapping:
          - dps_val: false
            value: false
          - dps_val: true
            value: true

  - entity: switch
    translation_key: Ambient light
    icon: mdi:lightbulb
    category: config
    dps:
      - id: 15
        type: boolean
        name: switch
        mapping:
          - dps_val: true
            value: true
          - dps_val: false
            value: false

  - entity: select
    translation_key: Brightness
    icon: mdi:brightness-6
    category: config
    dps:
      - id: 103
        type: string
        name: option
        mapping:
          - dps_val: "Low"
            value: "Low"
          - dps_val: "Medium"
            value: "Medium"
          - dps_val: "High"
            value: "High"
