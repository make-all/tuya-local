name: Simple switch with timer
products:
  - id: eetmtcempdyxgpx5
    manufacturer: Nexxt
    model: 220v smartplug
  - id: eoyy79zjaco4j8c8
    # https://mygeeni.com/products/geeni-gn-ww117-199-dot-smart-wi-fi-plug-pack-of-1-white
    manufacturer: Geeni
    model: WW117 Smart Plug
  - id: 45gg9a0jfyzj1z1d
    name: Mini smart switch
  - id: qlrnevw57ezct7ta
    name: Wall switch
  - id: flcvzjtnkhsreazp
    manufacturer: GIRIER
    name: USB adaptor
  - id: lbqau5negh2zizit
    manufacturer: Kruidvat
    name: Outdoor smartplug
  - id: uyvxoqhmac1dhvlm
    manufacturer: Moes House
  - id: a1yn4awusjnwmmvj
    model: CB2S
  - id: bnkpnv0werwabryt
    name: 1CH WiFi USB Switch Module
  - id: vv0g9jsdtspogawu
    model: "WiFi+BLE 1 Gang"
    # has additional dps 49 and 50 for remote management
entities:
  - entity: switch
    dps:
      - id: 1
        name: switch
        type: boolean
  - entity: time
    category: config
    translation_key: timer
    dps:
      - id: 9
        name: second
        type: integer
        range:
          min: 0
          max: 86400
  - entity: select
    translation_key: initial_state
    hidden: unavailable
    category: config
    dps:
      - id: 38
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: "on"
            value: "on"
          - dps_val: "off"
            value: "off"
          - dps_val: memory
            value: memory
      - id: 38
        type: string
        name: available
        optional: true
        mapping:
          - dps_val: null
            value: false
          - value: true
  - entity: text
    name: Inching
    category: config
    icon: "mdi:toggle-switch"
    hidden: true
    dps:
      - id: 44
        name: value
        type: string
        optional: true
