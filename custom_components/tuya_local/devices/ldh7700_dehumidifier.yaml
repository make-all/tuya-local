name: Dehumidifier
products:
  - id: msopwdnvklxbrnw9
    model: LDH-7700
entities:
  - entity: humidifier
    class: dehumidifier
    translation_key: extended
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 2
        type: integer
        name: humidity
        range:
          min: 30
          max: 80
        mapping:
          - step: 5
      - id: 5
        type: string
        name: mode
        mapping:
          - dps_val: Continuities
            value: continuous
          - dps_val: Sleep
            value: sleep
          - dps_val: Auto
            value: auto
      - id: 6
        type: integer
        name: current_humidity
  - entity: fan
    dps:
      - id: 1
        type: boolean
        name: switch
      - id: 5
        type: string
        name: available
        mapping:
          - dps_val: Continuities
            value: true
          - value: false
      - id: 4
        type: string
        name: speed
        mapping:
          - dps_val: low
            value: 50
          - dps_val: high
            value: 100
  - entity: switch
    translation_key: ionizer
    dps:
      - id: 10
        type: boolean
        name: switch
  - entity: lock
    translation_key: child_lock
    dps:
      - id: 16
        type: boolean
        name: lock
  - entity: sensor
    class: temperature
    dps:
      - id: 7
        type: integer
        name: sensor
        unit: C
        class: measurement
  - entity: binary_sensor
    class: problem
    dps:
      - id: 19
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 19
        type: bitfield
        name: fault_code
