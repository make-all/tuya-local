name: Spa
products:
  - id: jbxvi3pbxjjlmec2
    manufacturer: JOYONWAY
    model: PB562

entities:
  # --- THERMOSTAT ---
  - entity: climate
    translation_key: thermostat
    dps:
      - id: 3
        type: integer
        name: temperature
        range:
          min: 15
          max: 40
      - id: 24
        type: integer
        name: current_temperature

  # --- HEATER (read only) ---
  - entity: sensor
    name: Heating state
    icon: mdi:fire
    dps:
      - id: 111
        type: boolean
        name: sensor

  # --- PUMPS & BLOWER ---
  - entity: switch
    name: Jet pump
    dps:
      - id: 104
        type: boolean
        name: switch

  - entity: switch
    name: Blower
    dps:
      - id: 125
        type: boolean
        name: switch

  # --- LIGHT ---
  - entity: light
    name: LED
    dps:
      - id: 123
        type: boolean
        name: switch

  # --- SCHEDULES (MINUTES FROM MIDNIGHT) ---
  - entity: number
    name: Heating start
    icon: mdi:clock-start
    dps:
      - id: 127
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Heating end
    icon: mdi:clock-end
    dps:
      - id: 128
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Filtration start
    icon: mdi:clock-start
    dps:
      - id: 137
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Filtration end
    icon: mdi:clock-end
    dps:
      - id: 138
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  # --- SENSORS ---
  - entity: sensor
    class: power
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: W

  - entity: sensor
    class: voltage
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: V

  - entity: sensor
    name: Fault
    dps:
      - id: 45
        type: integer
        name: sensor
