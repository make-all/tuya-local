name: Spa
products:
  - id: jbxvi3pbxjjlmec2
    manufacturer: JOYONWAY
    model: PB562
entities:
  # --- THERMOSTAT (CLIMATE) ---
  - entity: climate
    name: Thermostat
    dps:
      - id: 3
        type: integer
        name: temperature
        range:
          min: 15
          max: 40
      - id: 24
        type: integer
        name: current_temperature
      - id: 111
        type: boolean
        name: hvac_action
        mapping:
          - dpsval: true
            value: heating
          - dpsval: false
            value: idle
      - id: 111
        type: boolean
        name: hvac_mode
        mapping:
          - dpsval: true
            value: heat
          - dpsval: false
            value: heat
        hidden: true

  # --- PUMPS & LIGHTS ---
  - entity: switch
    name: Jet pump
    dps:
      - id: 104
        type: boolean
        name: switch

  - entity: switch
    name: Blower
    dps:
      - id: 125
        type: boolean
        name: switch

  - entity: light
    translation_key: light
    dps:
      - id: 123
        type: boolean
        name: switch

  # --- SCHEDULES (MINUTES FROM MIDNIGHT) ---
  - entity: number
    name: Heating start
    icon: mdi:clock-start
    dps:
      - id: 127
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Heating end
    icon: mdi:clock-end
    dps:
      - id: 128
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Filtration start
    icon: mdi:clock-start
    dps:
      - id: 137
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  - entity: number
    name: Filtration end
    icon: mdi:clock-end
    dps:
      - id: 138
        type: integer
        name: value
        range:
          min: 0
          max: 1439

  # --- SENSORS ---
  - entity: sensor
    name: Power
    class: power
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: W

  - entity: sensor
    name: Voltage
    class: voltage
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: V

  - entity: sensor
    name: Fault
    dps:
      - id: 45
        type: integer
        name: sensor
