name: Humidifier
products:
  - id: 7owpshi3cabjwphk
    manufacturer: cado
    model: HM-C630i
  - id: aghute7o9fv4xdpo
    manufacturer: cado
    model: HM-C700i
entities:
  - entity: humidifier
    dps:
      - id: 10
        type: boolean
        name: switch
      - id: 2
        type: string
        name: mode
        mapping:
          - dps_val: "0"
            value: auto
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
  - entity: light
    category: config
    dps:
      - id: 5
        type: boolean
        name: switch
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 9
        type: bitfield
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - value: true
      - id: 9
        type: bitfield
        name: fault_code
  - entity: sensor
    class: temperature
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: "\u00B0C"
        class: measurement
        readonly: true
  - entity: sensor
    class: humidity
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: "%"
        class: measurement
        readonly: true
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 107
        name: option
        type: string
        optional: true
