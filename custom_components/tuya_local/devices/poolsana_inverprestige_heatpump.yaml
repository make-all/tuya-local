name: Pool heat pump
products:
  - id: e1k8cr2o
    manufacturer: PoolSana
    model: InverPRESTIGE 9
entities:
  - entity: climate
    translation_key: pool_heatpump
    dps:
      - id: 1
        type: boolean
        name: hvac_mode
        mapping:
          - dps_val: false
            value: "off"
          - dps_val: true
            constraint: mode
            conditions:
              - dps_val: cool
                value: cool
              - dps_val: auto
                value: auto
              - dps_val: heat
                value: heat
              - dps_val: h_powerful
                value: heat
              - dps_val: h_silent
                value: heat
      - id: 4
        type: string
        name: mode
        hidden: true
      - id: 2
        type: integer
        name: temperature
        range:
          min: 5
          max: 40
      - id: 3
        type: integer
        name: current_temperature
      - id: 4
        type: string
        name: preset_mode
        mapping:
          - dps_val: heat
            value: comfort
          - dps_val: h_powerful
            value: boost
          - dps_val: h_silent
            value: eco

  # --- TEMPERATUREN (Standard & Intern) ---
  - entity: sensor
    class: temperature
    name: Inlet temperature
    category: diagnostic
    dps:
      - id: 101
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Outlet temperature
    category: diagnostic
    dps:
      - id: 102
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Ambient temperature
    category: diagnostic
    dps:
      - id: 103
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Exhaust temperature
    category: diagnostic
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Suction temperature
    category: diagnostic
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Heating coil temperature
    category: diagnostic
    dps:
      - id: 106
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Cooling coil temperature
    category: diagnostic
    dps:
      - id: 107
        type: integer
        name: sensor
        unit: "°C"

  - entity: sensor
    class: temperature
    name: Heatsink temperature
    category: diagnostic
    dps:
      - id: 111
        type: integer
        name: sensor
        unit: "°C"

  # --- ELEKTRISCHE WERTE & FREQUENZEN ---
  - entity: sensor
    class: current
    name: Compressor current
    category: diagnostic
    dps:
      - id: 110
        type: integer
        name: sensor
        unit: "A"

  - entity: sensor
    class: voltage
    name: DC Bus voltage
    category: diagnostic
    dps:
      - id: 112
        type: integer
        name: sensor
        unit: "V"

  - entity: sensor
    class: frequency
    name: Compressor frequency
    category: diagnostic
    dps:
      - id: 113
        type: integer
        name: sensor
        unit: "Hz"

  # --- MECHANIK & SYSTEM (Lüfter, Ventile, Firmware) ---
  - entity: sensor
    name: DC Fan speed
    category: diagnostic
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: "rpm"

  - entity: sensor
    name: Main EEV steps
    category: diagnostic
    dps:
      - id: 108
        type: integer
        name: sensor
        unit: "step"

  - entity: sensor
    name: EVI EEV steps
    category: diagnostic
    dps:
      - id: 109
        type: integer
        name: sensor
        unit: "step"

  - entity: sensor
    name: PCB Version
    category: diagnostic
    dps:
      - id: 115
        type: integer
        name: sensor

  # --- FAULT / FEHLER-REGISTER ---
  - entity: sensor
    name: Fault status
    category: diagnostic
    dps:
      - id: 21
        type: bitfield
        name: sensor
