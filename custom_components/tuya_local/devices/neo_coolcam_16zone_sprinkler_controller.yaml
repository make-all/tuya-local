  - entity: select
    name: Weather delay
    translation_key: timer
    icon: "mdi:weather-pouring"
    category: config
    dps:
      - id: 37
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: cancel
            value: cancel
          - dps_val: "24h"
            value: "1d"
          - dps_val: "48h"
            value: "2d"
          - dps_val: "72h"
            value: "3d"

  - entity: text
    translation_key: schedule
    category: config
    hidden: true
    dps:
      - id: 38
        type: string
        name: value
        optional: true

  - entity: sensor
    translation_key: status
    class: enum
    category: diagnostic
    dps:
      - id: 39
        type: string
        name: sensor
        optional: true
        mapping:
          - dps_val: idle
            value: idle
          - dps_val: auto
            value: auto
          - dps_val: manual
            value: manual

  - entity: switch
    name: Weather
    category: config
    dps:
      - id: 42
        type: boolean
        name: switch
        optional: true

  - entity: button
    name: Skip
    dps:
      - id: 43
        type: boolean
        name: button
        optional: true

  - entity: select
    name: Irrigation mode
    icon: "mdi:sprinkler-variant"
    category: config
    dps:
      - id: 44
        type: string
        name: option
        optional: true
        mapping:
          - dps_val: Order1
            value: Independent valves
          - dps_val: Order2
            value: Master valve

  - entity: text
    name: Irrigation restriction schedule
