name: Solar microinverter (dual MPPT)
products:
  - id: dlwqvcfv08b4iosh
    manufacturer: Sukflow
    model: NBQ1000-EU
entities:
  - entity: switch
    dps:
      - id: 6
        type: boolean
        name: switch

  - entity: sensor
    class: voltage
    name: PV1 Voltage
    dps:
      - id: 114
        type: integer
        name: sensor
        unit: V
        mapping:
          - scale: 100

  - entity: sensor
    class: current
    name: PV1 Current
    dps:
      - id: 115
        type: integer
        name: sensor
        unit: A
        mapping:
          - scale: 100

  - entity: sensor
    class: voltage
    name: PV2 Voltage
    dps:
      - id: 117
        type: integer
        name: sensor
        unit: V
        mapping:
          - scale: 100

  - entity: sensor
    class: current
    name: PV2 Current
    dps:
      - id: 118
        type: integer
        name: sensor
        unit: A
        mapping:
          - scale: 100

  - entity: sensor
    class: voltage
    name: AC Voltage
    dps:
      - id: 104
        type: integer
        name: sensor
        unit: V
        mapping:
          - scale: 100

  - entity: sensor
    class: current
    name: AC Current
    dps:
      - id: 105
        type: integer
        name: sensor
        unit: A
        mapping:
          - scale: 100

  - entity: sensor
    class: temperature
    dps:
      - id: 107
        type: integer
        name: sensor
        unit: C

  - entity: sensor
    class: frequency
    dps:
      - id: 116
        type: integer
        name: sensor
        unit: Hz

  - entity: sensor
    class: energy
    dps:
      - id: 108
        type: integer
        name: sensor
        unit: Wh
        class: total_increasing
        mapping:
          - scale: 100

  - entity: sensor
    name: Serial Number
    category: diagnostic
    dps:
      - id: 111
        type: string
        name: sensor
