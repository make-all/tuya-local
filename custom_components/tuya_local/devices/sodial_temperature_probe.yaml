name: Probe thermometer
products:
  - id: eprxtogzeseoze3o
    manufacturer: Sodial
entities:
  - entity: sensor
    class: temperature
    dps:
      - id: 1
        type: integer
        name: sensor
        class: measurement
        mapping:
          - scale: 10
      - id: 9
        type: string
        optional: true
        name: unit
        mapping:
          - dps_val: f
            value: F
          - value: C
  - entity: select
    translation_key: temperature_unit
    category: config
    dps:
      - id: 9
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: c
            value: celsius
          - dps_val: f
            value: fahrenheit
