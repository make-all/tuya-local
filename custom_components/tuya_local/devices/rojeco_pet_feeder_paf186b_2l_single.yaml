name: Pet feeder
products:
  - id: xatwi1ep0ntk551r
    manufacturer: Rojeco
    model: PAF-186B
entities:
  - entity: text
    translation_key: meal_plan
    category: config
    hidden: true
    dps:
      - id: 1
        type: base64
        name: value
        optional: true
  - entity: button
    name: Feed 1 portion
    icon: "mdi:food-drumstick"
    dps:
      - id: 3
        type: integer
        name: button
        optional: true
        persist: false
        mapping:
          - dps_val: 1
            value: true
  - entity: button
    name: Feed 2 portions
    icon: "mdi:numeric-2-circle"
    dps:
      - id: 3
        type: integer
        name: button
        optional: true
        persist: false
        mapping:
          - dps_val: 2
            value: true
  - entity: button
    name: Feed 3 portions
    icon: "mdi:numeric-3-circle"
    dps:
      - id: 3
        type: integer
        name: button
        optional: true
        persist: false
        mapping:
          - dps_val: 3
            value: true
  - entity: button
    name: Feed 5 portions
    icon: "mdi:numeric-5-circle"
    dps:
      - id: 3
        type: integer
        name: button
        optional: true
        persist: false
        mapping:
          - dps_val: 5
            value: true
  - entity: number
    name: Custom feed amount
    category: config
    hidden: true
    icon: "mdi:counter"
    dps:
      - id: 3
        name: value
        type: integer
        optional: true
        persist: false
        unit: portions
        range:
          min: 1
          max: 40
  - entity: sensor
    translation_key: status
    class: enum
    icon: "mdi:paw"
    category: diagnostic
    dps:
      - id: 4
        type: string
        name: sensor
        mapping:
          - dps_val: standby
            value: standby
          - dps_val: feeding
            value: feeding
          - dps_val: done
            value: feeding_complete
  - entity: button
    translation_key: factory_reset
    category: config
    hidden: true
    dps:
      - id: 9
        type: boolean
        optional: true
        name: button
  - entity: sensor
    icon: "mdi:paw"
    name: Feed report
    category: diagnostic
    dps:
      - id: 15
        name: sensor
        type: integer
        unit: portions
