name: Ceiling fan
products:
  - id: 3dqkjstvaybnlaye
    manufacturer: Brilliant Smart
    model: Ceiling fan remote controller
entities:
  - entity: fan
    translation_key: fan_with_presets
    dps:
      - id: 101
        type: boolean
        name: switch
      - id: 103
        type: string
        name: speed
        mapping:
          - dps_val: "1"
            value: 33
          - dps_val: "2"
            value: 66
          - dps_val: "3"
            value: 100
      - id: 102
        type: string
        name: preset_mode
        mapping:
          - dps_val: Nature
            value: nature
          - dps_val: Normal
            value: normal
          - dps_val: Sleep
            value: sleep
          - dps_val: WakeUp
            value: fresh
  - entity: light
    dps:
      - id: 115
        type: boolean
        name: switch
      - id: 116
        name: brightness
        type: integer
        range:
          min: 1
          max: 100
  - entity: binary_sensor
    class: problem
    category: diagnostic
    dps:
      - id: 67
        type: bitfield
        optional: true
        name: sensor
        mapping:
          - dps_val: 0
            value: false
          - dps_val: null
            value: false
          - value: true
      - id: 67
        type: bitfield
        optional: true
        name: fault_code
  - entity: select
    translation_key: timer
    category: config
    dps:
      - id: 122
        type: string
        optional: true
        name: option
        mapping:
          - dps_val: "0"
            value: cancel
          - dps_val: "1"
            value: "10m"
          - dps_val: "2"
            value: "30m"
          - dps_val: "3"
            value: "1h"
          - dps_val: "4"
            value: "2h"
          - dps_val: "5"
            value: "3h"
          - dps_val: "6"
            value: "4h"
  - entity: sensor
    translation_key: time_remaining
    class: duration
    category: diagnostic
    dps:
      - id: 123
        type: integer
        name: sensor
        unit: min
