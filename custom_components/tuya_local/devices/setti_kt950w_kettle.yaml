name: Smart kettle Setti KT950W
primary_entity:
  entity: climate
  dps:
    - id: 1
      type: boolean
      name: hvac_mode
      mapping:
        - dps_val: false
          value: "off"
        - dps_val: true
          value: heat
    - id: 2
      type: integer
      name: current_temperature
      readonly: true
      unit: C
    - id: 10
      type: integer
      name: temperature
      mapping:
        - scale: 1
          step: 5
      range:
        min: 40
        max: 100
      
