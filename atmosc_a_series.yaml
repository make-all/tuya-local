name: AtmosC A Series Air Purifier
products:
  - id: acgosool
    name: AtmosC A Series
entities:
  - entity: fan
    icon: "mdi:air-purifier"
    dps:
      - id: 1
        name: switch
        type: boolean
      - id: 4
        name: preset_mode
        type: string
        mapping:
          - dps_val: "1"
            value: "1"
          - dps_val: "2"
            value: "2"
          - dps_val: "3"
            value: "3"
          - dps_val: "4"
            value: "4"
          - dps_val: "5"
            value: "5"
          - dps_val: "6"
            value: "6"
          - dps_val: "7"
            value: "7"
          - dps_val: "8"
            value: "8"
  - entity: select
    translation_key: mode
    icon: "mdi:tune"
    category: config
    dps:
      - id: 3
        name: option
        type: string
        mapping:
          - dps_val: "Manual"
            value: "Manual"
          - dps_val: "Auto"
            value: "Auto"
          - dps_val: "Sleep"
            value: "Sleep"
  - entity: sensor
    name: PM2.5
    class: pm25
    dps:
      - id: 2
        name: sensor
        class: measurement
        type: integer
        unit: ugm3
  - entity: switch
    name: Anion
    category: config
    icon: "mdi:atom"
    dps:
      - id: 6
        name: switch
        type: boolean
  - entity: switch
    name: UV
    category: config
    icon: "mdi:lightbulb-on"
    dps:
      - id: 9
        name: switch
        type: boolean
  - entity: lock
    translation_key: child_lock
    category: config
    icon: "mdi:hand-back-right-off"
    dps:
      - id: 7
        name: lock
        type: boolean
  - entity: sensor
    name: Filter
    category: diagnostic
    icon: "mdi:air-filter"
    dps:
      - id: 17
        name: sensor
        type: integer
